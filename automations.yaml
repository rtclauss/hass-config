- id: '1774820218135'
  alias: den_ceiling_bond_state_reconcile
  description: 'Repair Bond tracked state for the Den ceiling light using the Den
    motion/illuminance sensor. At night, if the room is bright while occupied, the
    Den flood lights, Den lamp, Kitchen lights, and Tiki Room lights are all off,
    and Bond thinks the ceiling light is off, mark it on. If the room is dark for
    several minutes and Bond thinks the ceiling light is on, mark it off. After midnight,
    run an overnight failsafe: if the Den has been unoccupied for at least an hour,
    those other lights are all off, and illuminance is still clearly bright, force
    the ceiling light off by correcting Bond tracked state and then sending an off
    command. This only sends an off command in that overnight failsafe path.'
  triggers:
  - platform: state
    entity_id: binary_sensor.den_motion_occupancy
    to: 'on'
  - platform: numeric_state
    entity_id: sensor.den_motion_illuminance
    above: 100
    for: 00:01:00
  - platform: numeric_state
    entity_id: sensor.den_motion_illuminance
    below: 10
    for: 00:05:00
  - platform: time_pattern
    minutes: /30
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: time
        after: 00:30:00
      - condition: sun
        before: sunrise
      - condition: state
        entity_id: binary_sensor.den_motion_occupancy
        state: 'off'
        for: 01:00:00
      - condition: state
        entity_id: light.den_flood_switch
        state: 'off'
      - condition: state
        entity_id: light.den_lamp
        state: 'off'
      - condition: state
        entity_id: light.kitchen_all
        state: 'off'
      - condition: state
        entity_id: light.tiki_room_lights_tiki_room_strip
        state: 'off'
      - condition: numeric_state
        entity_id: sensor.den_motion_illuminance
        above: 100
      sequence:
      - data:
          entity_id: light.den_ceiling
          power_state: true
        action: bond.set_light_power_tracked_state
      - delay: 00:00:02
      - target:
          entity_id: light.den_ceiling
        action: light.turn_off
      - delay: 00:00:02
      - data:
          entity_id: light.den_ceiling
          power_state: false
        action: bond.set_light_power_tracked_state
    - conditions:
      - condition: sun
        after: sunset
        before: sunrise
      - condition: state
        entity_id: binary_sensor.den_motion_occupancy
        state: 'on'
      - condition: state
        entity_id: light.den_ceiling
        state: 'off'
      - condition: state
        entity_id: light.den_flood_switch
        state: 'off'
      - condition: state
        entity_id: light.den_lamp
        state: 'off'
      - condition: state
        entity_id: light.kitchen_all
        state: 'off'
      - condition: state
        entity_id: light.tiki_room_lights_tiki_room_strip
        state: 'off'
      - condition: numeric_state
        entity_id: sensor.den_motion_illuminance
        above: 100
      sequence:
      - data:
          entity_id: light.den_ceiling
          power_state: true
        action: bond.set_light_power_tracked_state
    - conditions:
      - condition: sun
        after: sunset
        before: sunrise
      - condition: state
        entity_id: light.den_ceiling
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.den_motion_illuminance
        below: 10
      sequence:
      - data:
          entity_id: light.den_ceiling
          power_state: false
        action: bond.set_light_power_tracked_state
  mode: restart
- id: '1775314501816'
  alias: Fan Off When Timer Ends
  description: Turns off a fan when its corresponding timer expires
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.owner_suite_fan_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.owner_suite_bathroom_exhaust_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.office_ceiling_fan_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.basement_bathroom_exhaust_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.den_ceiling_fan_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.guest_room_fan_timer
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.guest_bathroom_exhaust_timer
  actions:
  - variables:
      fan_map:
        timer.owner_suite_fan_timer: fan.owner_suite
        timer.owner_suite_bathroom_exhaust_timer: fan.owner_suite_bathroom_exhaust
        timer.office_ceiling_fan_timer: fan.office_ceiling_fan
        timer.basement_bathroom_exhaust_timer: fan.basement_bathroom_exhaust
        timer.den_ceiling_fan_timer: fan.den_ceiling
        timer.guest_room_fan_timer: fan.guest_room
        timer.guest_bathroom_exhaust_timer: fan.guest_bathroom_exhaust
  - action: fan.turn_off
    target:
      entity_id: '{{ fan_map[trigger.event.data.entity_id] }}'
  mode: parallel
  max: 7
