services:
  loki:
    image: grafana/loki:2.9.10
    container_name: loki
    restart: unless-stopped
    # data/ is owned by root (no sudo available to chown to uid 10001)
    user: "0:0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - ./data:/loki
    command: -config.file=/etc/loki/local-config.yaml
