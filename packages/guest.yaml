########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - id: turn_off_guest_mode_when_guest_wifi_inactive
    alias: turn_off_guest_mode_when_guest_wifi_inactive
    trigger:
      - trigger: state
        entity_id: binary_sensor.guest_on_wifi
        to: "off"
        for:
          hours: 16
    # condition:
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.guest_mode
      - action: script.house_transition
        data:
          mode: >-
            {% if is_state('binary_sensor.bayesian_zeke_home', 'off') %}
              away
            {% else %}
              {{ states('input_select.house_mode') }}
            {% endif %}
          reason: guest_mode_disabled
          apply_lights: false
          apply_security: false
          apply_media: true
          apply_trip_policy: false
      - action: notify.all
        data:
          message: Guest Mode Deactivated

  - id: turn_on_guest_mode_when_guest_wifi_active
    alias: turn_on_guest_mode_when_guest_wifi_active
    mode: restart
    trigger:
      - trigger: state
        entity_id: binary_sensor.guest_on_wifi
        to: "on"
        for:
          minutes: 10
    condition:
      - condition: state
        entity_id: input_boolean.guest_mode
        state: "off"
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Guest Mode Activated"
          message: "Leave enabled?"
          data:
            actions:
              - action: "ENABLE_GUEST"
                title: "Yes"
                activationMode: background
                authenticationRequired: false
                destructive: false
                behavior: default
              - action: "DISABLE_GUEST"
                title: "No"
                activationMode: background
                authenticationRequired: false
                destructive: false
                behavior: default
      - wait_for_trigger:
          - trigger: event
            event_type: mobile_app_notification_action
            id: enable_guest
            event_data:
              action: ENABLE_GUEST
          - trigger: event
            event_type: mobile_app_notification_action
            id: disable_guest
            event_data:
              action: DISABLE_GUEST
        timeout:
          hours: 1
        continue_on_timeout: false
      - condition: template
        value_template: "{{ wait.trigger.id == 'enable_guest' }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.guest_mode
      - action: script.house_transition
        data:
          mode: >-
            {% if is_state('binary_sensor.bayesian_zeke_home', 'off') %}
              away
            {% else %}
              {{ states('input_select.house_mode') }}
            {% endif %}
          reason: guest_mode_enabled
          apply_lights: false
          apply_security: false
          apply_media: true
          apply_trip_policy: false

  - id: climate_guest_mode_day
    alias: climate_guest_mode_day
    trigger:
      - trigger: state
        entity_id: input_boolean.guest_mode
        to: "on"
        for:
          seconds: 20
      - trigger: time
        at: 07:00:00
    condition:
      - condition: time
        after: "06:00:00"
        before: "00:00:00"
      - condition: state
        entity_id:
          - input_boolean.guest_mode
        state: "on"
    action:
      - action: script.house_transition
        data:
          mode: >-
            {% if is_state('binary_sensor.bayesian_zeke_home', 'off') %}
              away
            {% else %}
              {{ states('input_select.house_mode') }}
            {% endif %}
          reason: guest_climate_day_refresh
          apply_lights: false
          apply_security: false
          apply_media: false
          apply_trip_policy: false

  - id: climate_guest_mode_night
    alias: climate_guest_mode_night
    trigger:
      - trigger: state
        entity_id: input_boolean.guest_mode
        to: "on"
        for:
          seconds: 20
      - trigger: time
        at: 00:00:00
    condition:
      - condition: time
        after: "00:00:00"
        before: "07:00:00"
      - condition: state
        entity_id:
          - input_boolean.guest_mode
        state: "on"
    action:
      - action: script.house_transition
        data:
          mode: >-
            {% if is_state('binary_sensor.bayesian_zeke_home', 'off') %}
              away
            {% else %}
              {{ states('input_select.house_mode') }}
            {% endif %}
          reason: guest_climate_night_refresh
          apply_lights: false
          apply_security: false
          apply_media: false
          apply_trip_policy: false

