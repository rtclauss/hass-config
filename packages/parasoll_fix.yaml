# IKEA PARASOLL (E2013) — battery drain & drop-off fix
#
# Root cause (github.com/Koenkk/zigbee2mqtt/issues/22579):
#   1. Battery drain: Z2M writes an aggressive genPollCtrl check-in interval.
#   2. Drop off: a regression removed the ssIasZone cluster binding, so the
#      device stops sending contact-state changes after a few hours.
#
# This package pairs with zigbee2mqtt/external_converters/parasoll.js.
# Z2M 2.x auto-scans the external_converters/ subdirectory — no configuration.yaml
# entry is needed.
# Deployment order:
#   1. Ensure zigbee2mqtt/external_converters/parasoll.js is present.
#   2. Restart Zigbee2MQTT.  Devices should show "PARASOLL door/window sensor (patched)".
#   3. Run script.parasoll_reconfigure_all from Developer Tools or the UI.
#   4. For sensors that are fully unresponsive: pull the battery, reinsert, then
#      the automation below handles them automatically as they re-join.

################################################################
## Helpers
################################################################

input_text:
  parasoll_configure_state:
    name: "PARASOLL Configure State"
    # Compact JSON: {"<last4_ieee>": <mod_hour>, ...}
    # mod_hour = floor(unix_time / 3600) % 10000  — 4-digit cyclical counter
    #            that wraps every ~416 days; cooldown checks use modular diff.
    # Key is the last 4 hex chars of the device IEEE address, giving 65 536
    # possible values — collision is extremely unlikely across ~20 home devices.
    # Capacity: 21 devices fit within the 255-char HA state limit.
    # Written only on a confirmed Z2M configure success.
    # Used to gate contact_change reconfigure (>6 h) and bridge_event
    # notifications (>1 h since last successful configure).
    max: 255
    initial: "{}"

################################################################
## Scripts
################################################################

script:
  parasoll_reconfigure_all:
    alias: "PARASOLL - Reconfigure All"
    description: >
      For every joined PARASOLL sensor: presses the identify button to nudge the
      device awake, then sends a Z2M reconfigure command so the patched converter
      settings (ssIasZone binding, no genPollCtrl) are applied.  Both commands are
      queued by Z2M for sleepy devices and processed together on the next check-in.
      Sensors that are completely dead still need a battery pull first.
    mode: single
    sequence:
      - variables:
          parasoll_devices: >
            {% set ns = namespace(devices=[]) %}
            {% for entity in states.binary_sensor %}
              {% if device_attr(entity.entity_id, 'model') == 'PARASOLL door/window sensor (patched)' %}
                {% set ids = device_attr(entity.entity_id, 'identifiers') | list %}
                {% for id_tuple in ids %}
                  {% if id_tuple[0] == 'mqtt' %}
                    {% set ieee = id_tuple[1] | replace('zigbee2mqtt_', '') %}
                    {% set identify_btn = device_entities(device_id(entity.entity_id))
                                          | select('match', 'button\\..*identify')
                                          | first | default('') %}
                    {% if ieee not in (ns.devices | map(attribute='ieee') | list) %}
                      {% set ns.devices = ns.devices + [{'ieee': ieee, 'identify': identify_btn}] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endfor %}
            {{ ns.devices }}
      - repeat:
          for_each: "{{ parasoll_devices }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ repeat.item.identify != '' }}"
              then:
                - action: button.press
                  target:
                    entity_id: "{{ repeat.item.identify }}"
            - delay:
                milliseconds: 500
            # Unbind genPollCtrl — devices paired with the stock converter
            # retain this binding even after the patched converter is loaded.
            # genPollCtrl is the cluster that writes an aggressive check-in
            # interval and is the primary cause of rapid battery drain.
            - action: mqtt.publish
              data:
                topic: zigbee2mqtt/bridge/request/device/unbind
                payload: >
                  {"from": "{{ repeat.item.ieee }}", "from_endpoint": "1",
                   "to": "Coordinator",
                   "clusters": ["genPollCtrl"]}
            - delay:
                milliseconds: 500
            - action: mqtt.publish
              data:
                topic: zigbee2mqtt/bridge/request/device/configure
                payload: '{"id": "{{ repeat.item.ieee }}"}'
            - delay:
                milliseconds: 1500

################################################################
## Automations
################################################################

automation:
  - alias: "PARASOLL - Auto-Reconfigure on Join or Announce"
    id: parasoll_auto_reconfigure_on_join
    description: >
      Reconfigures PARASOLL sensors on three events:
        • device_interview  — brand-new join, model E2013 (always reconfigures)
        • device_announce   — re-join after battery pull / reconnect (always reconfigures)
        • contact_change    — any Z2M message with a contact field from a known
                              PARASOLL device (skipped if configured within 6 h)
      Notifications gated by 1 h since last successful configure per device;
      contact_change is always silent. No hardcoded entity list.
    mode: queued
    max: 10
    trigger:
      - platform: mqtt
        topic: zigbee2mqtt/bridge/event
        id: bridge_event
      # Multi-level wildcard so friendly names containing "/" (e.g.
      # "Office/Window" → zigbee2mqtt/Office/Window) are matched.
      # Bridge sub-topics are excluded in the condition below.
      - platform: mqtt
        topic: "zigbee2mqtt/#"
        id: contact_change
    condition:
      - condition: template
        value_template: >
          {% if trigger.id == 'contact_change' %}
            {% if 'contact' not in trigger.payload_json
               or trigger.topic.startswith('zigbee2mqtt/bridge') %}
              false
            {% else %}
              {% set fname = trigger.topic | replace('zigbee2mqtt/', '') %}
              {% set ns = namespace(found=false) %}
              {% for entity in states.binary_sensor %}
                {% if device_attr(entity.entity_id, 'model') == 'PARASOLL door/window sensor (patched)'
                   and device_attr(entity.entity_id, 'name') == fname %}
                  {% set ns.found = true %}
                {% endif %}
              {% endfor %}
              {{ ns.found }}
            {% endif %}
          {% else %}
            {% set type = trigger.payload_json.type %}
            {% set ieee = trigger.payload_json.data.ieee_address %}
            {% if type == 'device_interview' %}
              {{ trigger.payload_json.data.get('definition', {}).get('model', '') == 'E2013' }}
            {% elif type == 'device_announce' %}
              {% set ns = namespace(found=false) %}
              {% for entity in states.binary_sensor %}
                {% if device_attr(entity.entity_id, 'model') == 'PARASOLL door/window sensor (patched)' %}
                  {% set ids = device_attr(entity.entity_id, 'identifiers') | list %}
                  {% for id_tuple in ids %}
                    {% if id_tuple[0] == 'mqtt' and id_tuple[1] == 'zigbee2mqtt_' ~ ieee %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
              {% endfor %}
              {{ ns.found }}
            {% else %}
              {{ false }}
            {% endif %}
          {% endif %}
    action:
      # Join/announce: wait for Z2M to finish interview setup.
      # Contact-change: no delay — device is awake right now; every ms counts
      # before it goes back to sleep and Z2M loses the unbind command.
      - delay:
          milliseconds: "{{ 5000 if trigger.id == 'bridge_event' else 0 }}"

      # ── Resolve device identity ──────────────────────────────────────────────
      - variables:
          _silent: "{{ trigger.id == 'contact_change' }}"
          _ieee: >
            {% if trigger.id == 'bridge_event' %}
              {{ trigger.payload_json.data.ieee_address }}
            {% else %}
              {% set fname = trigger.topic | replace('zigbee2mqtt/', '') %}
              {% set ns = namespace(value='') %}
              {% for entity in states.binary_sensor %}
                {% if device_attr(entity.entity_id, 'model') == 'PARASOLL door/window sensor (patched)'
                   and device_attr(entity.entity_id, 'name') == fname %}
                  {% for id_tuple in device_attr(entity.entity_id, 'identifiers') | list %}
                    {% if id_tuple[0] == 'mqtt' %}
                      {% set ns.value = id_tuple[1] | replace('zigbee2mqtt_', '') %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
              {% endfor %}
              {{ ns.value }}
            {% endif %}
          _name: >
            {% if trigger.id == 'bridge_event' %}
              {{ trigger.payload_json.data.friendly_name }}
            {% else %}
              {{ trigger.topic | replace('zigbee2mqtt/', '') }}
            {% endif %}
          parasoll_identify_btn: >
            {% set ns = namespace(entity='') %}
            {% for entity in states.button %}
              {% if 'identify' in entity.entity_id %}
                {% for id_tuple in device_attr(entity.entity_id, 'identifiers') | list %}
                  {% if id_tuple[0] == 'mqtt' and id_tuple[1] == 'zigbee2mqtt_' ~ _ieee %}
                    {% set ns.entity = entity.entity_id %}
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endfor %}
            {{ ns.entity }}

      # ── Check per-device cooldowns ───────────────────────────────────────────
      # Store format: {"<last4_ieee>": <mod_hour>}
      # mod_hour = floor(unix/3600) % 10000.  Diff uses modular arithmetic to
      # handle the ~416-day wraparound: (cur - prev) % 10000.
      # Only a successful configure response updates the store, so a queued or
      # failed configure leaves the slot empty and the next trigger retries.
      # Notifications are gated by the same timestamp (1 h window); if configure
      # keeps failing the user still receives alerts — which is the desired
      # signal for a stuck device.
      - variables:
          _store: >
            {{ (states('input_text.parasoll_configure_state') or '{}') | from_json }}
          _key: "{{ _ieee[-4:] }}"
          _cur_h: "{{ (now().timestamp() / 3600) | int % 10000 }}"
          _prev_h: "{{ _store.get(_ieee[-4:], 0) | int }}"
          _hours_since: "{{ (_cur_h | int - _prev_h | int) % 10000 }}"
          # bridge_event always reconfigures — device just re-joined and lost settings.
          # contact_change skips if configured within the last 6 h.
          _needs_configure: >
            {% if trigger.id == 'bridge_event' %}
              true
            {% else %}
              {{ _hours_since | int >= 6 }}
            {% endif %}
          # Suppress notifications within 1 h of the last successful configure.
          # contact_change is always silent regardless.
          _can_notify: "{{ not _silent and _hours_since | int >= 1 }}"

      # ── Skip if settings are likely still current ─────────────────────────────
      - if:
          - condition: template
            value_template: "{{ _needs_configure }}"
        then:
          # Press identify only on join/announce to nudge the device awake.
          # On contact_change the device is already awake — no need.
          - if:
              - condition: template
                value_template: "{{ parasoll_identify_btn != '' and not _silent }}"
            then:
              - action: button.press
                target:
                  entity_id: "{{ parasoll_identify_btn }}"
              - delay:
                  seconds: 2

          - if:
              - condition: template
                value_template: "{{ _can_notify }}"
            then:
              - action: notify.mobile_app_wethop
                data:
                  title: "PARASOLL"
                  message: "Reconfiguring {{ _name }}…"

          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/bridge/request/device/unbind
              payload: >
                {"from": "{{ _ieee }}",
                 "from_endpoint": "1", "to": "Coordinator",
                 "clusters": ["genPollCtrl"]}
          - delay:
              milliseconds: 500
          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/bridge/request/device/configure
              payload: '{"id": "{{ _ieee }}"}'
          - wait_for_trigger:
              - platform: mqtt
                topic: zigbee2mqtt/bridge/response/device/configure
                value_template: "{{ value_json.data.get('id') == _ieee }}"
            timeout:
              seconds: 60
            continue_on_timeout: true

          # ── Update persistent store on success ────────────────────────────────
          - variables:
              _configure_ok: >
                {% set resp = wait.trigger.payload_json if wait.trigger else none %}
                {{ resp is not none and resp.get('status') == 'ok' }}
          - if:
              - condition: template
                value_template: "{{ _configure_ok }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.parasoll_configure_state
                data:
                  value: >
                    {% set store = (states('input_text.parasoll_configure_state') or '{}') | from_json %}
                    {{ dict(store, **{_ieee[-4:]: (now().timestamp() / 3600) | int % 10000}) | tojson }}

          - if:
              - condition: template
                value_template: "{{ _can_notify }}"
            then:
              - action: notify.mobile_app_wethop
                data:
                  title: "PARASOLL"
                  message: >
                    {% set resp = wait.trigger.payload_json if wait.trigger else none %}
                    {% if resp and resp.get('status') == 'ok' %}
                      ✓ {{ _name }} — all settings applied
                    {% elif resp %}
                      ✗ {{ _name }} — {{ resp.get('data', {}).get('error', 'configure failed') }}
                    {% else %}
                      ⏳ {{ _name }} — configure queued (sleepy; settings apply on next wakeup)
                    {% endif %}
