  - alias: fan_off_when_timer_ends
    id: fan_off_when_timer_ends
    description: >
      Turns off a fan when its corresponding timer expires. Each fan has a
      dedicated timer helper (timer.XXX_fan_timer / timer.XXX_exhaust_timer).
      Start the timer from the dashboard timer-bar-card; when it fires, this
      automation turns the fan off.
    mode: parallel
    max: 7
    triggers:
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.owner_suite_fan_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.owner_suite_bathroom_exhaust_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.office_ceiling_fan_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.basement_bathroom_exhaust_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.den_ceiling_fan_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.guest_room_fan_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.guest_bathroom_exhaust_timer
    actions:
      - variables:
          fan_map:
            timer.owner_suite_fan_timer: fan.owner_suite
            timer.owner_suite_bathroom_exhaust_timer: fan.owner_suite_bathroom_exhaust
            timer.office_ceiling_fan_timer: fan.office_ceiling_fan
            timer.basement_bathroom_exhaust_timer: fan.basement_bathroom_exhaust
            timer.den_ceiling_fan_timer: fan.den_ceiling
            timer.guest_room_fan_timer: fan.guest_room
            timer.guest_bathroom_exhaust_timer: fan.guest_bathroom_exhaust
      - action: fan.turn_off
        target:
          entity_id: "{{ fan_map[trigger.event.data.entity_id] }}"

  - alias: bedroom_fan_control
    id: bedroom_fan_control
    trigger:
      - trigger: state
        entity_id: binary_sensor.bedroom_occupancy
        to: "on"
        id: bedroom-occupied
      - trigger: state
        entity_id: binary_sensor.bedroom_occupancy
        to: "off"
        for:
          minutes: 10
        id: bedroom-unoccupied
    condition:
      - condition: state
        entity_id:
          - binary_sensor.bayesian_bed_occupancy
        # entity_id: input_boolean.chatgpt_bed_occupied
        state: "off"
        # enabled: false
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: bedroom-occupied
            sequence:
              - action: fan.turn_on
                data:
                  entity_id: fan.owner_suite
                  percentage: 67
                  #speed: "medium"  # TODO have this change depending on the season: low in winter, medium spring/fall, high in summer
                  #speed: smart
          - conditions:
              - condition: trigger
                id: bedroom-unoccupied
            sequence:
              - action: fan.turn_off
                data:
                  entity_id: fan.owner_suite
                  #speed: "medium"  # TODO have this change depending on the season: low in winter, medium spring/fall, high in summer
                  #speed: smart

  # - alias: turn_off_fan_if_bedroom_unoccupied
  #   id: turn_off_fan_if_bedroom_unoccupied
  #   trigger:
  #     - platform: state
  #       entity_id: binary_sensor.bedroom_occupancy
  #       to: "off"
  #       for: "00:10:00"
  #   condition:
  #     - condition: state
  #       entity_id: binary_sensor.bayesian_bed_occupancy
  #       state: "off"
  #       # enabled: false
  #   action:
  #     - action: fan.turn_off
  #       data:
  #         entity_id: fan.owner_suite

  - alias: toggle_office_fan
    id: toggle_office_fan
    trigger:
      - trigger: state
        entity_id: binary_sensor.office_occupancy_2
        to: "on"
        id: office-occupied
        enabled: false
      - trigger: state
        entity_id: binary_sensor.office_motion_occupancy
        to: "on"
        id: office-occupied
        enabled: false
      - trigger: state
        entity_id: binary_sensor.office_occupancy_2
        to: "off"
        for:
          minutes: 30
        id: office-unoccupied
        enabled: false
      - trigger: state
        entity_id: binary_sensor.office_motion_occupancy
        to: "off"
        for:
          minutes: 30
        id: office-unoccupied
        enabled: false
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: office-occupied
            sequence:
              - action: fan.turn_on
                data:
                  entity_id: fan.office_ceiling_fan
      - choose:
          - conditions:
              - condition: trigger
                id: office-unoccupied
            sequence:
              - action: fan.turn_off
                data:
                  entity_id: fan.office_ceiling_fan

