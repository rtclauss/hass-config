# Home Assistant package that mirrors an iPhone wake-up alarm into Home Assistant helpers.
# The webhook data from iOS Shortcuts lands here and becomes the canonical alarm state used by workday and wake-up automations.

################################################################
## Packages / iOS Wakeup
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    package.node_anchors:
      customize: &customize
        package: "ios_wakeup"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################

    automation.sync_phone_wakeup_alarm_from_ios_shortcut:
      <<: *customize
      friendly_name: "Sync Phone Wake-up Alarm"
      icon: mdi:cellphone-message

################################################
## Automation
################################################

automation:
  - id: sync_phone_wakeup_alarm_from_ios_shortcut
    alias: sync_phone_wakeup_alarm_from_ios_shortcut
    description: Receive the nightly iOS Shortcut wake-up alarm sync and forward it to the wake-up scheduler.
    trigger:
      - trigger: webhook
        webhook_id: ios_phone_wakeup_alarm_sync
        allowed_methods:
          - POST
        local_only: false
    mode: single
    variables:
      alarm_time_raw: >-
        {% set alarm_time = '' %}
        {% if trigger.json is defined and trigger.json.alarm_time is defined %}
          {% set alarm_time = trigger.json.alarm_time %}
        {% elif trigger.data is defined and trigger.data.alarm_time is defined %}
          {% set alarm_time = trigger.data.alarm_time %}
        {% elif trigger.query is defined and trigger.query.alarm_time is defined %}
          {% set alarm_time = trigger.query.alarm_time %}
        {% endif %}
        {{ alarm_time | string | trim }}
      alarm_enabled_raw: >-
        {% set alarm_enabled = '' %}
        {% if trigger.json is defined and trigger.json.alarm_enabled is defined %}
          {% set alarm_enabled = trigger.json.alarm_enabled %}
        {% elif trigger.data is defined and trigger.data.alarm_enabled is defined %}
          {% set alarm_enabled = trigger.data.alarm_enabled %}
        {% elif trigger.query is defined and trigger.query.alarm_enabled is defined %}
          {% set alarm_enabled = trigger.query.alarm_enabled %}
        {% endif %}
        {{ alarm_enabled }}
      meeting_time_raw: >-
        {% set meeting_time = '' %}
        {% if trigger.json is defined and trigger.json.meeting_time is defined %}
          {% set meeting_time = trigger.json.meeting_time %}
        {% elif trigger.data is defined and trigger.data.meeting_time is defined %}
          {% set meeting_time = trigger.data.meeting_time %}
        {% elif trigger.query is defined and trigger.query.meeting_time is defined %}
          {% set meeting_time = trigger.query.meeting_time %}
        {% endif %}
        {{ meeting_time | string | trim }}
      meeting_enabled_raw: >-
        {% set meeting_enabled = '' %}
        {% if trigger.json is defined and trigger.json.meeting_enabled is defined %}
          {% set meeting_enabled = trigger.json.meeting_enabled %}
        {% elif trigger.data is defined and trigger.data.meeting_enabled is defined %}
          {% set meeting_enabled = trigger.data.meeting_enabled %}
        {% elif trigger.query is defined and trigger.query.meeting_enabled is defined %}
          {% set meeting_enabled = trigger.query.meeting_enabled %}
        {% endif %}
        {{ meeting_enabled }}
      alarm_state_provided: >-
        {{ alarm_time_raw != '' or (alarm_enabled_raw | string | trim) != '' }}
      alarm_time: >-
        {% set raw = alarm_time_raw %}
        {% if raw %}
          {{ raw[0:5] }}
        {% else %}
          {{ '' }}
        {% endif %}
      alarm_enabled: >-
        {% set raw = alarm_enabled_raw | string | lower | trim %}
        {% if raw != '' %}
          {{ raw in ['true', '1', 'on', 'yes'] }}
        {% else %}
          {{ alarm_time_raw != '' }}
        {% endif %}
      meeting_state_provided: >-
        {{ meeting_time_raw != '' or (meeting_enabled_raw | string | trim) != '' }}
      meeting_time: >-
        {% set raw = meeting_time_raw %}
        {% if raw %}
          {{ raw[0:5] }}
        {% else %}
          {{ '' }}
        {% endif %}
      meeting_enabled: >-
        {% set raw = meeting_enabled_raw | string | lower | trim %}
        {% if raw != '' %}
          {{ raw in ['true', '1', 'on', 'yes'] }}
        {% else %}
          {{ meeting_time_raw != '' }}
        {% endif %}
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ alarm_state_provided }}"
            sequence:
              - action: script.set_wakeup_from_phone_alarm
                data:
                  alarm_time: "{{ alarm_time }}"
                  alarm_enabled: "{{ alarm_enabled }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ meeting_state_provided }}"
            sequence:
              - action: script.set_next_work_meeting_from_phone
                data:
                  meeting_time: "{{ meeting_time }}"
                  meeting_enabled: "{{ meeting_enabled }}"
