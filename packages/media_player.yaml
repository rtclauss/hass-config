########################
# Scripts
########################
script:
  music_assistant_pause_house_audio:
    alias: "Pause whole-home MA audio"
    sequence:
      - action: media_player.media_pause
        continue_on_error: true
        target:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2
            - media_player.den_sonos_2
            - media_player.tiki_room_2

  music_assistant_prepare_bedroom_group:
    alias: "Prepare bedroom Music Assistant group"
    mode: restart
    sequence:
      - alias: "Split bedroom wake-up players before regrouping"
        continue_on_error: true
        action: media_player.unjoin
        target:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.den_sonos_2
            - media_player.office_sonos_2
      - if:
          - alias: "Check if guests are here."
            condition: state
            entity_id: input_boolean.guest_mode
            state: "off"
        then:
          - alias: "Join bedroom suite into one group"
            continue_on_error: true
            action: media_player.join
            target:
              entity_id:
                - media_player.bedroom_sonos_2
            data:
              group_members:
                - media_player.bathroom_sonos_2
                - media_player.den_sonos_2
                - media_player.office_sonos_2
        else:
          - alias: "Limit wake-up audio to bedroom and bathroom"
            continue_on_error: true
            action: media_player.join
            target:
              entity_id:
                - media_player.bedroom_sonos_2
            data:
              group_members:
                - media_player.bathroom_sonos_2

  music_assistant_try_join_bedroom_group_after_play:
    alias: "Try joining bedroom Music Assistant followers after playback"
    mode: restart
    sequence:
      - delay:
          seconds: 2
      - action: script.turn_on
        target:
          entity_id: script.music_assistant_prepare_bedroom_group

  music_assistant_prepare_arrival_group:
    alias: "Prepare arrival Music Assistant group"
    sequence:
      - alias: "Split arrival players before regrouping"
        continue_on_error: true
        action: media_player.unjoin
        target:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.den_sonos_2
            - media_player.office_sonos_2
            - media_player.tiki_room_2
      - if:
          - alias: "Check if guests are here."
            condition: state
            entity_id: input_boolean.guest_mode
            state: "off"
        then:
          - alias: "Join whole-house arrival group"
            continue_on_error: true
            action: media_player.join
            target:
              entity_id:
                - media_player.den_sonos_2
            data:
              group_members:
                - media_player.bedroom_sonos_2
                - media_player.bathroom_sonos_2
                - media_player.office_sonos_2
                - media_player.tiki_room_2
        else:
          - alias: "Keep arrival audio in bedroom suite only"
            continue_on_error: true
            action: media_player.join
            target:
              entity_id:
                - media_player.bedroom_sonos_2
            data:
              group_members:
                - media_player.bathroom_sonos_2

  music_assistant_prepare_house_party_group:
    alias: "Prepare house party Music Assistant group"
    sequence:
      - alias: "Join the whole Sonos house group"
        continue_on_error: true
        action: media_player.join
        target:
          entity_id:
            - media_player.den_sonos_2
        data:
          group_members:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2
            - media_player.tiki_room_2

  music_assistant_play_item:
    alias: "Play Music Assistant item"
    fields:
      entity_id:
        description: "Music Assistant media_player entity"
      media_item:
        description: "Music Assistant URI, open.spotify.com URL, or plain item name"
      media_type:
        description: "Optional Music Assistant media type"
      enqueue:
        description: "Music Assistant enqueue mode"
    variables:
      raw_item: "{{ media_item | trim }}"
      raw_media_type: "{{ media_type | default('') | trim }}"
      raw_enqueue: "{{ enqueue | default('replace') }}"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ raw_media_type != '' }}"
            sequence:
              - action: music_assistant.play_media
                continue_on_error: true
                target:
                  entity_id: "{{ entity_id }}"
                data:
                  media_id: "{{ raw_item }}"
                  media_type: "{{ raw_media_type }}"
                  enqueue: "{{ raw_enqueue }}"
        default:
          - action: music_assistant.play_media
            continue_on_error: true
            target:
              entity_id: "{{ entity_id }}"
            data:
              media_id: "{{ raw_item }}"
              enqueue: "{{ raw_enqueue }}"

  music_assistant_play_spotify_uri:
    alias: "Play Spotify item via Music Assistant"
    fields:
      entity_id:
        description: "Music Assistant media_player entity"
      spotify_uri:
        description: "Spotify URI or open.spotify.com URL"
      enqueue:
        description: "Music Assistant enqueue mode"
    variables:
      raw_uri: "{{ spotify_uri | trim }}"
      normalized_uri: >-
        {% if raw_uri.startswith('https://open.spotify.com/') %}
          {% set path = raw_uri.split('open.spotify.com/')[1].split('?')[0] %}
          {{ 'spotify:' ~ path.replace('/', ':') }}
        {% else %}
          {{ raw_uri }}
        {% endif %}
    sequence:
      - action: script.music_assistant_play_item
        data:
          entity_id: "{{ entity_id }}"
          media_item: "{{ normalized_uri }}"
          enqueue: "{{ enqueue | default('replace') }}"

  music_assistant_search_music:
    alias: "Search Music Assistant"
    sequence:
      - variables:
          query: "{{ states('input_text.music_assistant_search_query') | trim }}"
          media_type: "{{ states('input_select.music_assistant_search_media_type') | trim }}"
          config_entry: "{{ config_entry_id('media_player.bedroom_sonos_2') }}"
          selected_provider: "{{ states('input_select.music_assistant_provider_filter') | trim }}"
          requested_provider_filter: >-
            {% if selected_provider in ['', 'unknown', 'unavailable', 'All providers'] %}
              {{ '' }}
            {% else %}
              {{ selected_provider | lower }}
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ query == '' }}"
            sequence:
              - action: input_select.set_options
                target:
                  entity_id: input_select.music_assistant_search_results
                data:
                  options:
                    - "No results found"
          - conditions:
              - condition: template
                value_template: "{{ query.startswith('spotify:') or query.startswith('http') or '://' in query }}"
            sequence:
              - variables:
                  direct_provider_token: >-
                    {% if query.startswith('spotify:') %}
                      spotify
                    {% elif '://' in query %}
                      {{ query.split('://', 1)[0] | lower }}
                    {% else %}
                      {{ '' }}
                    {% endif %}
                  direct_provider_name: "{{ direct_provider_token.split('--', 1)[0] }}"
                  direct_options: >-
                    {% set requested_provider_name = requested_provider_filter.split('--', 1)[0] %}
                    {% if requested_provider_filter == '' or requested_provider_filter == direct_provider_token or requested_provider_name == direct_provider_name %}
                      {{ ['Direct URI || ' ~ query] }}
                    {% else %}
                      {{ ['No results found'] }}
                    {% endif %}
              - action: input_select.set_options
                target:
                  entity_id: input_select.music_assistant_search_results
                data:
                  options: "{{ direct_options }}"
        default:
          - action: music_assistant.search
            continue_on_error: true
            response_variable: search_results
            data:
              config_entry_id: "{{ config_entry }}"
              name: "{{ query }}"
              media_type: "{{ media_type }}"
              limit: 20
          - variables:
              provider_tokens: >-
                {% set search_response = search_results | default({}, true) %}
                {% set ns = namespace(tokens=[]) %}
                {% for bucket in ['tracks', 'albums', 'artists', 'playlists', 'radio', 'audiobooks', 'podcasts', 'items'] %}
                  {% for item in search_response.get(bucket, []) %}
                    {% set uri = item.uri | default(item.media_id | default('')) %}
                    {% if uri %}
                      {% if uri.startswith('library://') %}
                        {% set provider_token = 'library' %}
                      {% else %}
                        {% set provider_token = uri.split('://', 1)[0] | lower %}
                      {% endif %}
                      {% if provider_token not in ns.tokens %}
                        {% set ns.tokens = ns.tokens + [provider_token] %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endfor %}
                {{ ns.tokens }}
              effective_provider_filter: >-
                {% if requested_provider_filter in provider_tokens %}
                  {{ requested_provider_filter }}
                {% else %}
                  {{ '' }}
                {% endif %}
              provider_options: "{{ ['All providers'] + provider_tokens }}"
              search_options: >-
                {% set search_response = search_results | default({}, true) %}
                {% set ns = namespace(options=[], seen=[]) %}
                {% set requested_provider_name = effective_provider_filter.split('--', 1)[0] %}
                {% for bucket in ['tracks', 'albums', 'artists', 'playlists', 'radio', 'audiobooks', 'podcasts', 'items'] %}
                  {% for item in search_response.get(bucket, []) %}
                    {% set uri = item.uri | default(item.media_id | default('')) %}
                    {% if uri and uri not in ns.seen %}
                      {% if uri.startswith('library://') %}
                        {% set provider_token = 'library' %}
                      {% else %}
                        {% set provider_token = uri.split('://', 1)[0] | lower %}
                      {% endif %}
                      {% set provider_name = provider_token.split('--', 1)[0] %}
                      {% if effective_provider_filter == '' or effective_provider_filter == provider_token or requested_provider_name == provider_name %}
                        {% set label = item.name | default(uri) %}
                        {% if item.artists is defined and item.artists %}
                          {% set label = (item.artists | map(attribute='name') | join(', ')) ~ ' - ' ~ label %}
                        {% endif %}
                        {% set ns.options = ns.options + ['[' ~ provider_name ~ '] ' ~ label ~ ' || ' ~ uri] %}
                        {% set ns.seen = ns.seen + [uri] %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endfor %}
                {{ ns.options if ns.options else ['No results found'] }}
          - action: input_select.set_options
            target:
              entity_id: input_select.music_assistant_provider_filter
            data:
              options: "{{ provider_options }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ requested_provider_filter != '' and requested_provider_filter in provider_tokens }}"
                sequence:
                  - action: input_select.select_option
                    target:
                      entity_id: input_select.music_assistant_provider_filter
                    data:
                      option: "{{ requested_provider_filter }}"
            default:
              - action: input_select.select_option
                target:
                  entity_id: input_select.music_assistant_provider_filter
                data:
                  option: "All providers"
          - action: input_select.set_options
            target:
              entity_id: input_select.music_assistant_search_results
            data:
              options: "{{ search_options }}"

  music_assistant_play_selected_search_result:
    alias: "Play selected Music Assistant search result"
    fields:
      entity_id:
        description: "Music Assistant media_player entity"
      enqueue:
        description: "Music Assistant enqueue mode"
    variables:
      target_entity: "{{ entity_id | default('media_player.bedroom_sonos_2') }}"
      selected_option: "{{ states('input_select.music_assistant_search_results') | trim }}"
      selected_uri: >-
        {% if ' || ' in selected_option %}
          {{ selected_option.split(' || ', 1)[1] | trim }}
        {% else %}
          {{ selected_option }}
        {% endif %}
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ selected_uri not in ['', 'No results found'] }}"
            sequence:
              - action: script.music_assistant_play_item
                data:
                  entity_id: "{{ target_entity }}"
                  media_item: "{{ selected_uri }}"
                  enqueue: "{{ enqueue | default('add') }}"

  music_assistant_add_selected_search_result_to_playlist:
    alias: "Add selected Music Assistant search result to playlist"
    fields:
      playlist_target:
        description: "Playlist target script id or option label"
    variables:
      selected_option: "{{ states('input_select.music_assistant_search_results') | trim }}"
      selected_uri: >-
        {% if ' || ' in selected_option %}
          {{ selected_option.split(' || ', 1)[1] | trim }}
        {% else %}
          {{ selected_option }}
        {% endif %}
      target_option: "{{ playlist_target | default(states('input_select.music_assistant_playlist_target')) | trim }}"
      target_script: >-
        {% if ' || ' in target_option %}
          {{ target_option.split(' || ', 1)[1] | trim }}
        {% else %}
          {{ target_option }}
        {% endif %}
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ selected_uri not in ['', 'No results found'] and target_script != '' }}"
            sequence:
              - action: shell_command.music_assistant_append_playlist_item
                data:
                  target_script: "{{ target_script }}"
                  item_uri: "{{ selected_uri }}"
              - delay:
                  seconds: 1
              - action: script.reload
              - action: logbook.log
                data:
                  entity_id: "script.{{ target_script }}"
                  domain: script
                  name: Music Assistant Playlist Builder
                  message: "Added {{ selected_uri }} to {{ target_script }}"

  music_assistant_radio_wake_up:
    alias: "Radio wake-up via Music Assistant"
    fields:
      radio_uri:
        description: "Music Assistant radio URI"
      initial_delay:
        description: "Optional delay before playback starts"
      playback_entity_id:
        description: "Preferred Music Assistant player for wake-up playback"
      prepare_group_before_play:
        description: "Whether to prepare the bedroom wake-up zone before playback starts"
      regroup_after_play:
        description: "Whether to regroup the bedroom wake-up zone after playback starts"
    variables:
      playback_player: "{{ playback_entity_id | default('media_player.bedroom_sonos_2') }}"
      should_prepare_group_before_play: >-
        {{ prepare_group_before_play | default(playback_player == 'media_player.bedroom_sonos_2') | bool }}
      should_regroup_after_play: >-
        {{ regroup_after_play | default(false) | bool }}
    sequence:
      - if:
          - condition: template
            value_template: "{{ should_prepare_group_before_play }}"
        then:
          - action: script.music_assistant_prepare_bedroom_group
        else:
          - action: media_player.unjoin
            continue_on_error: true
            data:
              entity_id: "{{ playback_player }}"
      - if:
          - condition: template
            value_template: "{{ should_prepare_group_before_play }}"
        then:
          - action: media_player.volume_set
            continue_on_error: true
            data:
              entity_id:
                - media_player.bedroom_sonos_2
                - media_player.bathroom_sonos_2
              volume_level: 0.01
        else:
          - action: media_player.volume_set
            continue_on_error: true
            data:
              entity_id: "{{ playback_player }}"
              volume_level: 0.01
      - if:
          - condition: template
            value_template: "{{ (initial_delay | default(0) | int(0)) > 0 }}"
        then:
          - delay:
              seconds: "{{ initial_delay | default(0) | int(0) }}"
      - action: music_assistant.play_media
        continue_on_error: true
        target:
          entity_id: "{{ playback_player }}"
        data:
          media_id: "{{ radio_uri }}"
          media_type: radio
          enqueue: replace
      - if:
          - condition: template
            value_template: "{{ should_regroup_after_play }}"
        then:
          - action: script.turn_on
            target:
              entity_id: script.music_assistant_try_join_bedroom_group_after_play
      - repeat:
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ should_prepare_group_before_play }}"
                  sequence:
                    - alias: "Increase grouped wake-up volume by 0.01"
                      continue_on_error: true
                      action: media_player.volume_set
                      data:
                        entity_id:
                          - media_player.bedroom_sonos_2
                          - media_player.bathroom_sonos_2
                        volume_level: "{{ 0.01 * repeat.index }}"
              default:
                - alias: "Increase standalone wake-up volume by 0.01"
                  continue_on_error: true
                  action: media_player.volume_set
                  data:
                    entity_id: "{{ playback_player }}"
                    volume_level: "{{ 0.01 * repeat.index }}"
            - delay:
                seconds: "{{ (1/(tan(repeat.index/120))) | round(0, 'ceil', 5)}}"
          until: "{{ repeat.index == 30 }}"

