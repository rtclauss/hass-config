      - alias: "Play bedtime music"
        action: script.music_assistant_play_item
        data:
          entity_id: media_player.bedroom_sonos_2
          media_item: "{{ playlist }}"
          media_type: "{{ 'radio' if playlist.startswith('https://somafm.com/') else '' }}"
      - action: script.turn_on
        target:
          entity_id: script.music_assistant_try_join_bedroom_group_after_play
      - wait_for_trigger:
          - trigger: state
            entity_id: binary_sensor.owner_suite_bathroom_room_occupancy
            to: "on"
        timeout:
          minutes: 10 # TODO this as a variable that is passed by the caller. Different timeouts for tv off and for laying in bed automation
        continue_on_timeout: true
      - if:
          - condition: template
            value_template: "{{ wait.completed }}"
        then:
          - delay:
              minutes: 3
      - action: script.turn_on
        target:
          entity_id: script.spotify_bedtime_volume

  spotify_bedtime_volume:
    alias: "Spotify Bedtime Rampdown"
    sequence:
      - action: media_player.volume_set
        continue_on_error: true
        data:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.office_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.den_sonos_2
          volume_level: 0.1
      - delay:
          minutes: 2
      - action: media_player.volume_set
        continue_on_error: true
        data:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2
          volume_level: 0.07
      - delay:
          minutes: 2
      - action: media_player.volume_set
        data:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2
          volume_level: 0.05
      - delay:
          minutes: 2
      - action: media_player.volume_set
        continue_on_error: true
        data:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2
          volume_level: 0.01
      - delay:
          minutes: 1
      - alias: "Stop playback so the same track does not resume the next evening"
        continue_on_error: true
        action: media_player.media_stop
        target:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
            - media_player.office_sonos_2

