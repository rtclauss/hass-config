# Home Assistant package for Music Assistant, Sonos, and whole-home media behavior.
# Complex areas: it handles cube/button media controls, group preparation, wake-up and bedtime playback, and reusable scripts for generic Music Assistant search/playback flows.

################################################################
## Packages / Media Players
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "media_player"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Alarm Panels
    ################################################

    ################################################
    ## Automations
    ################################################

    ################################################
    ## Binary Sensors
    ################################################

    ################################################
    ## Cameras
    ################################################

    ################################################
    ## Device Trackers
    ################################################

    ################################################
    ## Frontend
    ################################################

    ################################################
    ## Groups
    ################################################

    ################################################
    ## Input Boolean
    ################################################

    ################################################
    ## Input Numbers
    ################################################

    ################################################
    ## Input Select
    ################################################

    ################################################
    ## iOS
    ################################################

    ################################################
    ## Light
    ################################################

    ################################################
    ## Media Player
    ################################################

    ################################################
    ## Plant
    ################################################

    ################################################
    ## Proximity
    ################################################

    ################################################
    ## Scripts
    ################################################

    ################################################
    ## Sensors
    ################################################

    ################################################
    ## Thermostats
    ################################################

    ################################################
    ## Zone
    ################################################

########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - id: bedroom_music_volume
    alias: bedroom_music_volume
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "rotate_left"
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "rotate_right"
      - trigger: state
        entity_id: sensor.owner_suite_cube_action_angle
        not_to:
          - None
          - "unknown"
          - "unavailable"
    action:
      - action: media_player.volume_set
        data:
          entity_id: media_player.bedroom_sonos_2
          # volume_level: >-
          # {{ (state_attr('media_player.bedroom', 'volume_level') + trigger.event.data.args.relative_degrees/1000) | round(2) | float(default=0) }}
          # Fixed: the inner float() call now carries its own default of 0 so that
          # transient "unknown"/"unavailable" sensor states (e.g. cube waking up)
          # do not raise a ValueError and abort the automation.
          volume_level: >-
            {{ (state_attr('media_player.bedroom_sonos_2', 'volume_level') + (float(trigger.to_state.state, 0)/1000)) | round(2) | float(default=0) }}

  - id: bedroom_music_play_pause
    alias: bedroom_music_play_pause
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "knock"
      - trigger: state
        entity_id: sensor.owner_suite_cube_action
        to: "tap"
    action:
      - action: media_player.media_play_pause
        data:
          entity_id: media_player.bedroom_sonos_2

  - id: bed_without_prep
    alias: bed_without_prep
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "knock"
      - trigger: state
        entity_id: binary_sensor.bayesian_bed_occupancy
        # entity_id: input_boolean.chatgpt_bed_occupied
        to: "on"
    condition:
      - and:
          - condition: time
            after: "22:00:00"
            before: "06:00:00"
          - condition: numeric_state
            entity_id: media_player.bedroom_sonos_2
            attribute: "volume_level"
            above: 0.01
          - condition: state
            entity_id:
              - media_player.bedroom_sonos_2
            state: "playing"
    action:
      - action: script.turn_on
        data:
          entity_id: script.night_tv_mode_switches
      - action: script.turn_off_owner_suite_inovelli_switch_leds
      - action: script.turn_on
        data:
          entity_id: script.spotify_bedtime_volume
      # - delay: "00:10:00"
      # - action: switch.turn_on
      #   entity_id: switch.sleep_mode

  - id: bedroom_music_select_playlist
    alias: bedroom_music_select_playlist
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "flip"
      - trigger: state
        entity_id: sensor.owner_suite_cube_action_to_side
        not_to:
          - "None"
          - "unknown"
          - "unavailable"
    action:
      - action: notify.all
        data:
          message: >-
            {{ "script.bedroom_playlist_" + (trigger.to_state.state | string) }}
      - action: script.turn_on
        data:
          entity_id: >-
            {{ "script.bedroom_playlist_" + (trigger.to_state.state | string) }}

  - id: bedroom_music_skip_track
    alias: bedroom_music_skip_track
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "slide"
      - trigger: state
        entity_id: sensor.owner_suite_cube_action
        to: "slide"
    action:
      - action: media_player.media_next_track
        data:
          entity_id: media_player.bedroom_sonos_2

  - id: bedroom_music_shuffle
    alias: bedroom_music_shuffle
    trigger:
      # - platform: event
      #   event_type: zha_event
      #   event_data:
      #     device_ieee: "00:15:8d:00:02:8f:66:12"
      #     command: "shake"
      - trigger: state
        entity_id: sensor.owner_suite_cube_action
        to: "shake"
    action:
      - action: media_player.shuffle_set
        data:
          entity_id: media_player.bedroom_sonos_2
          shuffle: >-
            {{ not (state_attr('media_player.bedroom_sonos_2', 'shuffle')) }}

  - id: den_sonos_control_actions
    alias: den_sonos_control_actions
    trigger:
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "toggle"
        id: toggle_play_pause
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "play_pause"
        id: play_pause
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "track_next"
        id: track_next
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "track_previous"
        id: track_previous
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "volume_up"
        id: volume_up
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "volume_up_hold"
        id: volume_up_hold
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "volume_down"
        id: volume_down
      - trigger: state
        entity_id:
          - sensor.den_sonos_controls_action
        to: "volume_down_hold"
        id: volume_down_hold
      # TODO Use Dots for shuffle and repeat
    action:
      - choose:
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: toggle_play_pause
                  - condition: trigger
                    id: play_pause
            sequence:
              - action: media_player.media_play_pause
                target:
                  entity_id: media_player.den_sonos_2
          - conditions:
              - condition: trigger
                id: track_next
            sequence:
              - action: media_player.media_next_track
                target:
                  entity_id: media_player.den_sonos_2
          - conditions:
              - condition: trigger
                id: track_previous
            sequence:
              - action: media_player.media_previous_track
                target:
                  entity_id: media_player.den_sonos_2
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: volume_up
                  - condition: trigger
                    id: volume_up_hold
            sequence:
              - action: media_player.volume_up
                target:
                  entity_id: media_player.den_sonos_2
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: volume_down
                  - condition: trigger
                    id: volume_down_hold
            sequence:
              - action: media_player.volume_down
                target:
                  entity_id: media_player.den_sonos_2

  - id: play_music_in_bathroom_via_nfc_tap
    alias: play_music_in_bathroom_via_nfc_tap
    trigger:
      - trigger: event
        event_type: tag_scanned
        event_data:
          device_id: FA07CA5F-46D6-45E8-BFFA-F021058CCA7A
          tag_id: 78025adc-36ac-4150-9514-9e68767ef13e
    action:
      - action: media_player.join
        data:
          group_members:
            - media_player.bathroom_sonos_2
        target:
          entity_id: media_player.bedroom_sonos_2

  - id: play_music_in_bathroom_when_up
    alias: play_music_in_bathroom_when_up
    trace:
      stored_traces: 20
    mode: single
    trigger:
      - trigger: state
        entity_id:
          - binary_sensor.owner_suite_bathroom_room_occupancy
        to: "on"
    condition:
      - alias: "Not in Bed"
        condition: state
        entity_id: binary_sensor.bayesian_bed_occupancy
        # entity_id: input_boolean.chatgpt_bed_occupied
        state: "off"
      - alias: "morning routine already started"
        condition: state
        entity_id: input_boolean.morning_routine
        state: "off"
      - or:
          - alias: "weekday morning time"
            condition: time
            after: "05:00:00"
            before: "10:30:00"
            weekday:
              - "mon"
              - "tue"
              - "wed"
              - "thu"
              - "fri"
          - alias: "weekend morning time"
            condition: time
            after: "07:00:00"
            before: "14:00:00"
            weekday:
              - "sat"
              - "sun"
    action:
      - variables:
          bathroom_was_playing: "{{ is_state('media_player.bathroom_sonos_2', 'playing') }}"
          bathroom_volume_above_min: "{{ state_attr('media_player.bathroom_sonos_2', 'volume_level') | float(0) > 0.1 }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.morning_routine
      - action: number.set_value
        target:
          entity_id:
            - number.owner_suite_closet_ledintensitywhenoff
            - number.owner_suite_fan_switch_ledintensitywhenoff
            - number.owner_suite_bathroom_vanity_ledintensitywhenoff
            - number.office_fan_switch_ledintensitywhenoff
            - number.guest_room_fan_switch_ledintensitywhenoff
        data:
          value: 1
      - choose:
          # If the bathroom already had audible playback, skip the long fade-in.
          - conditions:
              - condition: template
                value_template: "{{ bathroom_was_playing and bathroom_volume_above_min }}"
            sequence:
              - action: script.spotify_wake_up
                data:
                  playback_entity_id: media_player.bathroom_sonos_2
                  regroup_after_play: true
              - action: media_player.volume_set
                target:
                  entity_id: media_player.bathroom_sonos_2
                data:
                  volume_level: 0.30
        default:
          # Nothing is playing in the bathroom yet, so ease up the music.
          - alias: "Set Volume 0.1"
            action: media_player.volume_set
            target:
              entity_id: media_player.bathroom_sonos_2
            data:
              volume_level: 0.1
          - action: script.spotify_wake_up
            data:
              playback_entity_id: media_player.bathroom_sonos_2
              regroup_after_play: true
          - alias: "Repeat until desired volume reached"
            repeat:
              sequence:
                - alias: "Increase Volume by 0.01"
                  action: media_player.volume_set
                  target:
                    entity_id: media_player.bathroom_sonos_2
                  data:
                    volume_level: "{{ 0.01 * repeat.index }}"
                - delay:
                    # As time passes, the delay gets smaller and smaller. 60, 30s, 20s, 15s, 12s,..., 2s
                    seconds: "{{ (1/(tan(repeat.index/60))) | round(0, 'ceil', 5)}}"
              until: "{{repeat.index == 30}}"

  - id: recover_stuck_morning_audio_scripts
    alias: recover_stuck_morning_audio_scripts
    trace:
      stored_traces: 20
    mode: single
    trigger:
      - trigger: state
        entity_id: script.music_assistant_prepare_bedroom_group
        to: "on"
        for:
          minutes: 1
      - trigger: state
        entity_id:
          - script.spotify_wake_up
          - script.music_assistant_radio_wake_up
        to: "on"
        for:
          minutes: 3
    action:
      - action: logbook.log
        data:
          entity_id: "{{ trigger.entity_id }}"
          domain: script
          name: Morning audio recovery
          message: "Stopped a stalled morning audio script and cleared the wake-up latch."
      - action: script.turn_off
        continue_on_error: true
        target:
          entity_id:
            - script.music_assistant_prepare_bedroom_group
            - script.music_assistant_radio_wake_up
            - script.spotify_wake_up
      - action: input_boolean.turn_off
        continue_on_error: true
        target:
          entity_id: input_boolean.morning_routine

  - id: restart_sonos_unavailable
    alias: restart_sonos_unavailable
    trace:
      stored_traces: 20
    mode: single
    trigger:
      - trigger: state
        entity_id:
          - media_player.bedroom_sonos_2
          - media_player.bathroom_sonos_2
          - media_player.office_sonos_2
          - media_player.den_sonos_2
        to: "unavailable"
        for:
          minutes: 30
    action:
      - action: homeassistant.restart


