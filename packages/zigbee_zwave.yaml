# Home Assistant package for Zigbee and legacy Z-Wave device normalization.
# Complex areas: it gives contact, motion, and battery entities stable names and keeps the button and device-health logic that many other packages rely on.

################################################################
## Packages / Zigbee
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "zigbee"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

