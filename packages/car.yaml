# Home Assistant package for Tesla, charging, and garage-adjacent car automations.
# Complex areas: it blends trip timing, charging policy, location, and garage device recovery so the car behaves correctly before departures and after arrivals.

################################################################
## Packages / Car
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "car"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Alarm Panels
    ################################################

    ################################################
    ## Automations
    ################################################

    ################################################
    ## Binary Sensors
    ################################################

    ################################################
    ## Cameras
    ################################################

    ################################################
    ## Covers
    ################################################

    ################################################
    ## Device Trackers
    ################################################

    ################################################
    ## Groups
    ################################################

    ################################################
    ## Input Boolean
    ################################################
    # input_boolean.car_in_motion:
    #   <<: *customize
    #   icon: mdi:car
    #   class: motion

    ################################################
    ## Input Numbers
    ################################################

    ################################################
    ## Input Select
    ################################################

    ################################################
    ## iOS
    ################################################

    ################################################
    ## Light
    ################################################

    ################################################
    ## Scripts
    ################################################

    ################################################
    ## Sensors
    ################################################
    sensor.charge_complete:
      <<: *customize
      icon: mdi:robot-vacuum
      friendly_name: "Tesla Charge Complete Estimate"
    sensor.waze_next_trip_distance:
      <<: *customize
      icon: mdi:robot-vacuum
      friendly_name: "Distance to next destination"

################################################
## Thermostats
################################################

################################################
## Zone
################################################

########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - id: hydrate_home_address_input_text
    alias: hydrate_home_address_input_text
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.home_address
        data:
          value: !secret home_address

  - id: tesla_departure_planner_apply
    alias: tesla_departure_planner_apply
    mode: restart
    trigger:
      - trigger: time
        at: "21:35:00"
        id: nightly
      - trigger: time
        at: "04:30:00"
        id: early_morning
      - trigger: homeassistant
        event: start
        id: startup
      - trigger: state
        entity_id: binary_sensor.upcoming_trip_charging
        id: trip_change
      - trigger: state
        entity_id: binary_sensor.upcoming_trip_charging
        attribute: start_time
        id: trip_details_change
      - trigger: state
        entity_id: binary_sensor.upcoming_trip_charging
        attribute: all_day
        id: trip_details_change
      - trigger: state
        entity_id:
          - input_boolean.weekday_alarm_on
          - input_boolean.weekend_alarm_on
          - input_boolean.long_range_travel
          - input_datetime.weekday_alarm
          - input_datetime.weekend_alarm
          - select.daily_ev_charging
          - select.hourly_ev_charging
          - input_number.ev_electrical_rate
        id: planner_input
      - trigger: state
        entity_id: binary_sensor.nigori_parking_brake
        to: "on"
        for:
          minutes: 5
        id: parked_home
      - trigger: numeric_state
        entity_id: sensor.outside_temperature
        below: 20
        id: cold_snap
      - trigger: numeric_state
        entity_id: sensor.outside_temperature
        above: 20
        id: warm_snap
    condition:
      - condition: state
        entity_id: binary_sensor.nigori_parking_brake
        state: "on"
      - condition: zone
        entity_id: device_tracker.nigori_location_tracker
        zone: zone.home
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: startup
            sequence:
              - delay: "00:00:30"
      - variables:
          tesla_plan_json: >-
            {% set manual_override = is_state('input_boolean.long_range_travel', 'on') %}
            {% set weekday_alarm_enabled = is_state('input_boolean.weekday_alarm_on', 'on') %}
            {% set weekend_alarm_enabled = is_state('input_boolean.weekend_alarm_on', 'on') %}
            {% if weekday_alarm_enabled %}
              {% set alarm_time_raw = states('input_datetime.weekday_alarm') %}
              {% set alarm_source = 'weekday alarm' %}
            {% elif weekend_alarm_enabled %}
              {% set alarm_time_raw = states('input_datetime.weekend_alarm') %}
              {% set alarm_source = 'weekend alarm' %}
            {% else %}
              {% set alarm_time_raw = '' %}
              {% set alarm_source = 'alarm' %}
            {% endif %}
            {% set alarm_enabled = alarm_time_raw not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
            {% set outside_temp_f = states('sensor.outside_temperature') | float(default=999) %}
            {% set cold_weather = outside_temp_f <= 20 %}
            {% set trip_entry = state_attr('binary_sensor.upcoming_trip_charging', 'entry') | default('', true) %}
            {% set trip_distance_mi = state_attr('sensor.waze_next_trip_distance', 'distance') | float(default=0) %}
            {% set trip_duration_raw = state_attr('sensor.waze_next_trip_distance', 'duration') %}
            {% if trip_duration_raw is number %}
              {% set trip_duration = timedelta(minutes=trip_duration_raw) %}
            {% elif trip_duration_raw is string and trip_duration_raw | trim not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
              {% set trip_duration = trip_duration_raw | as_timedelta %}
            {% else %}
              {% set trip_duration = timedelta() %}
            {% endif %}
            {% set trip_duration_min = (trip_duration.days * 1440) + (trip_duration.seconds // 60) %}
            {% set trip_start_raw = state_attr('binary_sensor.upcoming_trip_charging', 'start_time') %}
            {% set trip_all_day = state_attr('binary_sensor.upcoming_trip_charging', 'all_day') in [true, 'true', 'True', 'on'] %}
            {% set has_calendar_departure = trip_start_raw not in [none, '', 'None'] %}
            {% set has_upcoming_trip = is_state('binary_sensor.upcoming_trip_charging', 'on') and has_calendar_departure %}
            {% if states('select.daily_ev_charging') not in ['unknown', 'unavailable'] %}
              {% set tariff = states('select.daily_ev_charging') %}
            {% else %}
              {% set tariff = states('select.hourly_ev_charging') %}
            {% endif %}
            {% set electrical_rate = states('input_number.ev_electrical_rate') | float(default=0) %}
            {% set location_name = states('device_tracker.nigori_location_tracker') | default('', true) | lower %}
            {% set location_label = location_name | replace('_', ' ') | title %}
            {% set preserve_default_charging_schedule = location_name in ['home', 'parents', 'occ', 'spcc'] %}
            {% set tariff_name = tariff | lower %}
            {% set tariff_display = tariff | replace('_', '-') | title %}
            {% set high_tariff = tariff_name in ['on_peak', 'on-peak', 'onpeak'] or electrical_rate >= 0.13 %}
            {% set departure_dt = none %}
            {% if has_calendar_departure %}
              {% set trip_start_dt = trip_start_raw | as_datetime | as_local %}
              {% set trip_buffer_min = 20 + (10 if cold_weather else 0) %}
              {% set departure_dt = trip_start_dt - trip_duration - timedelta(minutes=trip_buffer_min) %}
            {% elif alarm_enabled %}
              {% set alarm_base_dt = today_at(alarm_time_raw[:5]) %}
              {% set prep_buffer_min = 45 + (10 if cold_weather else 0) %}
              {% set candidate_departure = alarm_base_dt + timedelta(minutes=prep_buffer_min) %}
              {% if candidate_departure < now() + timedelta(minutes=15) %}
                {% set departure_dt = candidate_departure + timedelta(days=1) %}
              {% else %}
                {% set departure_dt = candidate_departure %}
              {% endif %}
            {% endif %}
            {% if has_upcoming_trip and trip_distance_mi >= 90 %}
              {% set charge_limit = 100 %}
            {% elif has_upcoming_trip %}
              {% set charge_limit = 90 %}
            {% elif has_calendar_departure %}
              {% set charge_limit = 80 %}
            {% elif alarm_enabled and cold_weather %}
              {% set charge_limit = 90 %}
            {% elif alarm_enabled and not high_tariff %}
              {% set charge_limit = 85 %}
            {% elif alarm_enabled %}
              {% set charge_limit = 80 %}
            {% else %}
              {% set charge_limit = 80 %}
            {% endif %}
            {% if manual_override %}
              {% set charge_limit = 100 %}
            {% endif %}
            {% set manage_tesla_schedule = (not preserve_default_charging_schedule) or charge_limit != 80 %}
            {% set departure_window_open = departure_dt is not none and departure_dt > now() %}
            {% set precondition = has_calendar_departure and departure_window_open and manage_tesla_schedule %}
            {% if trip_all_day %}
              {% set precondition = false %}
            {% endif %}
            {% set active = manual_override or has_calendar_departure or alarm_enabled %}
            {% if has_upcoming_trip %}
              {% set source = 'calendar trip' %}
            {% elif has_calendar_departure %}
              {% set source = 'calendar departure' %}
            {% elif alarm_enabled %}
              {% set source = alarm_source %}
            {% elif manual_override %}
              {% set source = 'manual override' %}
            {% else %}
              {% set source = 'default' %}
            {% endif %}
            {% if departure_dt is not none %}
              {% set departure_label = departure_dt.strftime('%a %I:%M %p') %}
              {% set departure_time = departure_dt.isoformat() %}
            {% else %}
              {% set departure_label = '' %}
              {% set departure_time = '' %}
            {% endif %}
            {% if manual_override and not has_upcoming_trip and not alarm_enabled %}
              {% set summary = 'Manual max-range override is on. Keep the Tesla at 100% charge.' %}
            {% elif has_upcoming_trip %}
              {% set summary = 'Plan Tesla for ' ~ (trip_entry if trip_entry else 'upcoming trip') ~ '. Set charge limit to ' ~ charge_limit ~ '% and ' ~ ('enable' if precondition else 'skip') ~ ' preconditioning for ' ~ departure_label ~ '. Distance ' ~ (trip_distance_mi | round(0)) ~ ' mi. EV tariff ' ~ tariff_display ~ ' at $' ~ ('%.4f' | format(electrical_rate)) ~ '/kWh.' %}
            {% elif has_calendar_departure %}
              {% set summary = 'Plan Tesla for ' ~ (trip_entry if trip_entry else 'upcoming calendar departure') ~ '. Keep the default ' ~ charge_limit ~ '% charge limit and ' ~ ('enable' if precondition else 'skip') ~ ' preconditioning for ' ~ departure_label ~ '. Distance ' ~ (trip_distance_mi | round(0)) ~ ' mi. EV tariff ' ~ tariff_display ~ ' at $' ~ ('%.4f' | format(electrical_rate)) ~ '/kWh.' %}
            {% elif alarm_enabled %}
              {% if charge_limit == 80 and high_tariff and not cold_weather %}
                {% set charge_limit_phrase = 'Keep the default 80% charge limit because the current EV tariff is higher' %}
              {% else %}
                {% set charge_limit_phrase = 'Set charge limit to ' ~ charge_limit ~ '%' %}
              {% endif %}
              {% if precondition %}
                {% set precondition_phrase = 'enable preconditioning for ' ~ departure_label %}
              {% else %}
                {% set precondition_phrase = 'skip cabin preconditioning until a real next-day departure is scheduled' %}
              {% endif %}
              {% set summary = 'Plan Tesla for ' ~ source ~ '. ' ~ charge_limit_phrase ~ ' and ' ~ precondition_phrase ~ '. Outside ' ~ (outside_temp_f | round(0)) ~ 'F. EV tariff ' ~ tariff_display ~ ' at $' ~ ('%.4f' | format(electrical_rate)) ~ '/kWh.' %}
            {% else %}
              {% set summary = 'No next-day departure plan detected. Restore the Tesla default charge limit to 80%.' %}
            {% endif %}
            {% if preserve_default_charging_schedule %}
              {% set summary = summary ~ ' Preserve the Tesla app charging schedule at ' ~ location_label ~ '.' %}
            {% endif %}
            {% if preserve_default_charging_schedule and not manage_tesla_schedule and departure_time != '' %}
              {% set summary = summary ~ ' No extra home charging override is needed.' %}
            {% endif %}
            {{ {
              'active': active,
              'source': source,
              'charge_limit': charge_limit,
              'precondition': precondition and departure_time != '',
              'departure_time': departure_time,
              'summary': summary,
              'location': location_name,
              'preserve_default_charging_schedule': preserve_default_charging_schedule,
              'manage_tesla_schedule': manage_tesla_schedule,
              'tariff': tariff,
              'electrical_rate': electrical_rate,
              'trip_distance_mi': trip_distance_mi,
              'trip_duration_min': trip_duration_min,
              'outside_temp_f': outside_temp_f,
              'high_tariff': high_tariff,
              'has_calendar_departure': has_calendar_departure
            } | to_json }}
          tesla_plan: "{{ tesla_plan_json | from_json }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('number.nigori_charge_limit') | int(default=-1) != tesla_plan.charge_limit | int(default=80) }}"
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.nigori_charge_limit
                data:
                  value: "{{ tesla_plan.charge_limit }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ tesla_plan.precondition and tesla_plan.departure_time != '' and tesla_plan.manage_tesla_schedule }}"
            sequence:
              - action: script.tesla_set_precondition_schedule_time
                data:
                  departure_time: "{{ tesla_plan.departure_time }}"
                  reason: "{{ tesla_plan.summary }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.tesla_managed_departure_time
                data:
                  value: "{{ tesla_plan.departure_time }}"
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states('input_text.tesla_managed_departure_time') not in ['', 'unknown', 'unavailable', 'none', 'None'] }}"
                sequence:
                  - action: script.tesla_set_precondition_schedule_time
                    data:
                      enabled: false
                      reason: "{{ tesla_plan.summary }}"
          - action: input_text.set_value
            target:
              entity_id: input_text.tesla_managed_departure_time
            data:
              value: ""
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id in ['nightly', 'trip_change'] and tesla_plan.active }}"
            sequence:
              - action: notify.all
                data:
                  data:
                    url: "/ryan-new-mushroom/tesla-v2"
                  message: "{{ tesla_plan.summary }}"

  - id: tesla_departure_schedule_cleanup
    alias: tesla_departure_schedule_cleanup
    mode: single
    trigger:
      - trigger: template
        id: departure_passed
        value_template: >-
          {% set stored_departure_text = states('input_text.tesla_managed_departure_time') | default('', true) | string | trim %}
          {{ stored_departure_text not in ['', 'unknown', 'unavailable', 'none', 'None'] and (stored_departure_text | as_datetime | as_local) <= now() }}
      - trigger: homeassistant
        event: start
        id: startup
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: startup
            sequence:
              - delay: "00:00:30"
      - variables:
          stored_departure_text: "{{ states('input_text.tesla_managed_departure_time') | default('', true) | string | trim }}"
          cleanup_reason: >-
            {% if stored_departure_text not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
              {% set stored_departure_dt = stored_departure_text | as_datetime | as_local %}
              Tesla-managed schedule for {{ stored_departure_dt.strftime('%a %I:%M %p') }} has passed.
            {% else %}
              Tesla-managed schedule has passed.
            {% endif %}
      - condition: template
        value_template: >-
          {{ stored_departure_text not in ['', 'unknown', 'unavailable', 'none', 'None'] and (stored_departure_text | as_datetime | as_local) <= now() }}
      - action: script.tesla_set_precondition_schedule_time
        data:
          enabled: false
          reason: "{{ cleanup_reason }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.tesla_managed_departure_time
        data:
          value: ""

  - id: do_restart_garage_door_esp
    alias: do_restart_garage_door_esp
    trigger:
      - trigger: time
        at: "04:00:00"
    condition: []
    action:
      - action: rest_command.restart_garage_opener

  - id: set_charging_rate
    alias: set_charging_rate
    trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        id: max_range
        event_data:
          action: MAX_RANGE
      - trigger: event
        event_type: mobile_app_notification_action
        id: normal_range
        event_data:
          action: NORMAL_RANGE
      - trigger: state
        id: max_range
        entity_id: input_boolean.long_range_travel
        from: "off"
        to: "on"
      - trigger: state
        id: normal_range
        entity_id: input_boolean.long_range_travel
        from: "on"
        to: "off"
    condition: []
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: max_range
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.nigori_charge_limit
                data:
                  value: >-
                    100
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.long_range_travel
          - conditions:
              - condition: trigger
                id: normal_range
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.nigori_charge_limit
                data:
                  value: >-
                    80
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.long_range_travel

  # - id: turn_off_max_range_charge_when_arrive_home
  #   alias: turn_off_max_range_charge_when_arrive_home
  #   trigger:
  #     - platform: zone
  #       entity_id: device_tracker.bayesian_zeke_home
  #       zone: zone.home
  #       event: enter
  #   condition:
  #     and:
  #       - alias: "Upcoming Trip in 24 hours so don't turn off max range when return home"
  #         condition: state
  #         entity_id: binary_sensor.upcoming_trip_charging
  #         state: "off"
  #       - alias: "I'm driving home"
  #         condition: state
  #         entity_id: sensor.wethop_activity
  #         state: "Automotive"
  #   action:
  #     - action: input_boolean.turn_off
  #       entity_id: input_boolean.long_range_travel
  #     - action: persistent_notification.create
  #       data_template:
  #         title: Max Charge Off
  #         message: "Turned off max charge"
  #         notification_id: low-battery-alert
  #     - action: notify.all
  #       data_template:
  #         message: >-
  #           Turned off max charge
  #     - action: script.turn_on
  #       entity_id: script.tesla_set_charge_limit_soc
  #     # TODO enable
  #     # once https://github.com/home-assistant/core/pull/66162
  #     # is released in 2022.2 or 2022.3
  #     - action: script.tesla_set_precondition_schedule_time
  #     - action: notify.all
  #       data_template:
  #         message: >-
  #           Set car precondition time!

  # - id: set_tesla_charge_limit_on_change
  #   alias: set_tesla_charge_limit_on_change
  #   trigger:
  #     - platform: state
  #       entity_id: number.nigori_charge_limit
  #   action:
  #     - alias: "Update SOC Limit"
  #       action: script.turn_on
  #       entity_id: script.tesla_set_charge_limit_soc

  - id: garage_door_reminder
    alias: Close forgotten garage door
    trigger:
      - trigger: state
        entity_id: cover.garage_door
        to: open
    condition:
      - condition: time
        after: "23:30:00"
    action:
      - action: notify.all
        data:
          message: Close the garage door.

  - alias: Tesla set polling time short on startup if charger is connected
    id: tesla_short_polling_charger_connected
    description: When HA starts up. We adjust the Polling Interval down from the configured value if we are connected to a charger
    trigger:
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: binary_sensor.nigori_charging
        state: "on"
    action:
      - delay: "00:01:00"
      - action: tesla_custom.polling_interval
        data:
          scan_interval: 30

  - alias: Tesla set polling time short on startup if car is driving
    id: tesla_short_polling_driving
    description: When HA starts up. We adjust the Polling Interval down from the configured value if we are driving
    trigger:
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: binary_sensor.nigori_parking_brake
        state: "off"
    action:
      - delay: "00:01:00"
      - action: tesla_custom.polling_interval
        data:
          scan_interval: 30

  - alias: Tesla set polling time long when charger is disconnected
    description: We adjust the Polling Interval up to the configured value if we are disconnecting from the charger
    id: tesla_long_polling_charger_disconnected
    trigger:
      - trigger: state
        entity_id: binary_sensor.nigori_charging
        to: "off"
        for:
          minutes: 15
    condition:
      - condition: state
        entity_id: binary_sensor.nigori_parking_brake
        state: "on"
    action:
      - action: tesla_custom.polling_interval
        data:
          scan_interval: 660

  - alias: Tesla set polling time long when car is parked
    description: We adjust the Polling Interval up to the configured value when we are parked if the charger is not connected
    id: tesla_long_polling_charger_diconnected_parked
    trigger:
      - trigger: state
        entity_id: binary_sensor.nigori_parking_brake
        to: "on"
        for:
          minutes: 15
    condition:
      - condition: state
        entity_id: binary_sensor.nigori_charging
        state: "off"
    action:
      - action: tesla_custom.polling_interval
        data:
          scan_interval: 660

  - alias: Tire Rotations
    description: We adjust the Polling Interval up to the configured value when we are parked if the charger is not connected
    id: tire_rotation
    trigger:
      - trigger: numeric_state
        entity_id: sensor.nigori_odometer
        value_template: >-
          {{ state | int % 6250  }}
        below: 20
    condition:
    action:
      - action: notify.all
        data:
          message: >
            Time to rotate the car's tires.

########################
# Binary Sensors
########################
binary_sensor: []

########################
# Cameras
########################
camera: []

########################
# Cover
########################
cover: []

########################
# Device Trackers
########################
device_tracker: []
  # replaced with tesla
  # - platform: traccar
  #   host: !secret traccar_ip
  #   port: 80
  #   username: !secret traccar_user
  #   password: !secret traccar_password
  #   monitored_conditions: ["dirOfTravel"]
  #   event: ["ignition_on", "ignition_off"]
  #   scan_interval: 10

########################
# Groups
########################
group: {}

########################
# Input Booleans
########################
input_boolean: {}
  # car_in_motion:

########################
# Input Numbers
########################
# Tesla Custom Integration v3 has this built in
# input_number:
#   nigori_charge_limit:
#     name: Nigori Charge Limit
#     min: 0
#     max: 100
#     step: 5
#     icon: mdi:battery
#     unit_of_measurement: "%"

########################
# Input Select
########################
input_select: {}

########################
# Input Text
########################
input_text:
  home_address:
    max: 255
    initial: ""
  tesla_managed_departure_time:
    initial: ""

########################
# iOS
########################
ios: {}

########################
# Light
########################
light: []

########################
# REST Command
########################
rest_command:
  restart_garage_opener:
    url: http://10.254.254.247/button/restart/press
    method: POST
    payload: true

########################
# Scenes
########################
scene: []

########################
# Scripts
########################
script:
  tesla_set_precondition_schedule_time:
    alias: Tesla Set Precondition Schedule Time
    mode: restart
    fields:
      enabled:
        description: Whether Tesla scheduled departure should be enabled or disabled.
        example: true
      departure_time:
        description: Desired Tesla departure time from home in ISO datetime format.
        example: "2026-03-21T08:05:00-05:00"
      reason:
        description: Optional reason to include in the logbook entry.
        example: "Weekday alarm departure plan"
    sequence:
      - variables:
          schedule_enabled: "{{ enabled | default(true) not in [false, 'false', 'False', 'off', 0, '0'] }}"
          requested_departure_text: "{{ departure_time | default('', true) | string | trim }}"
          location_name: "{{ states('device_tracker.nigori_location_tracker') | default('', true) | lower }}"
          location_label: >-
            {% if location_name not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
              {{ location_name | replace('_', ' ') | title }}
            {% else %}
              current location
            {% endif %}
          effective_departure_text: >-
            {% if requested_departure_text != '' %}
              {{ (requested_departure_text | as_datetime | as_local).isoformat() }}
            {% elif state_attr('binary_sensor.upcoming_trip_charging', 'start_time') not in [none, '', 'None'] %}
              {% set upcoming_start = state_attr('binary_sensor.upcoming_trip_charging', 'start_time') | as_datetime | as_local %}
              {% set travel_duration_raw = state_attr('sensor.waze_next_trip_distance', 'duration') %}
              {% if travel_duration_raw is number %}
                {% set travel_duration = timedelta(minutes=travel_duration_raw) %}
              {% elif travel_duration_raw is string and travel_duration_raw | trim not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
                {% set travel_duration = travel_duration_raw | as_timedelta %}
              {% else %}
                {% set travel_duration = timedelta() %}
              {% endif %}
              {% set fallback_departure = upcoming_start - travel_duration - timedelta(minutes=19) %}
              {% if upcoming_start > now() and fallback_departure > now() %}
                {{ fallback_departure.isoformat() }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          effective_reason: "{{ reason | default('Tesla departure planner', true) }}"
          departure_offset_from_midnight: >-
            {% if effective_departure_text != '' %}
              {% set effective_departure_dt = effective_departure_text | as_datetime | as_local %}
              {{ (effective_departure_dt.hour * 60) + effective_departure_dt.minute }}
            {% else %}
              0
            {% endif %}
          preserve_default_charging_schedule: "{{ location_name in ['home', 'parents', 'occ', 'spcc'] }}"
          stored_managed_departure_text: "{{ states('input_text.tesla_managed_departure_time') | default('', true) | string | trim }}"
          stored_managed_departure_ts: "{{ as_timestamp(stored_managed_departure_text, default=0) | int(0) }}"
          tesla_departure_ts: "{{ state_attr('binary_sensor.nigori_scheduled_departure', 'Departure timestamp') | int(0) }}"
          tesla_scheduled_charging_active: "{{ is_state('binary_sensor.nigori_scheduled_charging', 'on') }}"
          tesla_off_peak_charging_enabled: "{{ state_attr('binary_sensor.nigori_scheduled_departure', 'Off peak charging enabled') in [true, 'true', 'True', 'on'] }}"
          tesla_managed_departure_matches: >-
            {{ stored_managed_departure_ts > 0 and tesla_departure_ts > 0 and ((stored_managed_departure_ts - tesla_departure_ts) | abs) <= 300 }}
          safe_to_clear_tesla_schedule: >-
            {{ preserve_default_charging_schedule not in [true, 'true', 'True'] or (tesla_managed_departure_matches in [true, 'true', 'True'] and tesla_scheduled_charging_active not in [true, 'true', 'True'] and tesla_off_peak_charging_enabled not in [true, 'true', 'True']) }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not schedule_enabled }}"
            sequence:
              - action: logbook.log
                data:
                  entity_id: script.tesla_set_precondition_schedule_time
                  domain: script
                  name: Tesla scheduled departure planner
                  message: >-
                    {{ effective_reason }}{% if safe_to_clear_tesla_schedule in [true, 'true', 'True'] %} Clearing Tesla scheduled departure.{% else %} Preserve the Tesla app charging schedule at {{ location_label }} and skip clearing Tesla schedule state because the live Tesla schedule does not match the last HA-managed protected-location departure.{% endif %}
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ safe_to_clear_tesla_schedule in [true, 'true', 'True'] }}"
                    sequence:
                      - action: tesla_custom.api
                        data:
                          command: SCHEDULED_DEPARTURE
                          parameters:
                            path_vars:
                              vehicle_id: "{{ state_attr('binary_sensor.nigori_online', 'id') }}"
                            enable: false
                            wake_if_asleep: true
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ requested_departure_text == '' }}"
                sequence:
                  - alias: Check if this is not an all-day event
                    condition: state
                    entity_id: binary_sensor.upcoming_trip_charging
                    attribute: all_day
                    state: off
          - alias: Check that a departure time exists
            condition: template
            value_template: "{{ effective_departure_text != '' }}"
          - action: logbook.log
            data:
              entity_id: script.tesla_set_precondition_schedule_time
              domain: script
              name: Tesla scheduled departure planner
              message: >-
                {% set effective_departure_dt = effective_departure_text | as_datetime | as_local %}
                {{ effective_reason }} Departure at {{ effective_departure_dt.strftime('%a %H:%M') }}.{% if preserve_default_charging_schedule in [true, 'true', 'True'] %} Preserve the Tesla app charging schedule at {{ location_label }}.{% endif %}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ preserve_default_charging_schedule in [true, 'true', 'True'] }}"
                sequence:
                  - alias: Set Scheduled Departure Time Without Touching Tesla-App Charging Defaults
                    action: tesla_custom.api
                    data:
                      command: SCHEDULED_DEPARTURE
                      parameters:
                        path_vars:
                          vehicle_id: "{{ state_attr('binary_sensor.nigori_online', 'id') }}"
                        enable: true
                        departure_time: "{{ departure_offset_from_midnight }}"
                        preconditioning_enabled: true
                        preconditioning_weekdays_only: false
                        wake_if_asleep: true
            default:
              - alias: Set Scheduled Departure Time With HA-Managed Off-Peak Charging
                action: tesla_custom.api
                data:
                  command: SCHEDULED_DEPARTURE
                  parameters:
                    path_vars:
                      vehicle_id: "{{ state_attr('binary_sensor.nigori_online', 'id') }}"
                    enable: true
                    departure_time: "{{ departure_offset_from_midnight }}"
                    preconditioning_enabled: true
                    preconditioning_weekdays_only: false
                    off_peak_charging_enabled: true
                    off_peak_charging_weekdays_only: true
                    end_off_peak_time: 360
                    wake_if_asleep: true

  # tesla_set_charge_limit_soc:
  #   alias: Tesla Set Charge Limit SOC
  #   mode: restart
  #   sequence:
  #     - action: tesla_custom.api
  #       data:
  #         command: CHANGE_CHARGE_LIMIT
  #         parameters:
  #           path_vars:
  #             vehicle_id: "{{ state_attr('binary_sensor.nigori_online', 'id') }}"
  #           percent: "{{ states('input_number.nigori_charge_limit') | int(default=90) }}"
  #           wake_if_asleep: true

########################
# Sensor
########################
sensor: []

########################
# Template
########################
template:
  - binary_sensor:
      - name: upcoming_trip_charging
        unique_id: upcoming_trip_charging
        availability: >-
          {{ state_attr("sensor.waze_next_trip_distance", "distance") != None }}
        attributes:
          entry: >-
            {% set now_local = now() %}
            {% set horizon = now_local + timedelta(hours=24) %}
            {% set ns = namespace(start=none, entry='None') %}
            {% set personal_start_raw = state_attr('calendar.ryan_claussen', 'start_time') %}
            {% if personal_start_raw not in [none, ''] %}
              {% set personal_start = personal_start_raw | as_datetime | as_local %}
              {% if personal_start is not none and personal_start > now_local and personal_start < horizon %}
                {% set ns.start = personal_start %}
                {% set ns.entry = 'Personal: ' ~ (state_attr('calendar.ryan_claussen', 'message') | default('', true)) %}
              {% endif %}
            {% endif %}
            {% set work_start_raw = state_attr('binary_sensor.work_trip_today', 'start_time') %}
            {% if work_start_raw not in [none, ''] %}
              {% set work_start = work_start_raw | as_datetime | as_local %}
              {% if work_start is not none and work_start > now_local and work_start < horizon and (ns.start is none or work_start < ns.start) %}
                {% set ns.start = work_start %}
                {% set ns.entry = 'Work: ' ~ (state_attr('binary_sensor.work_trip_today', 'message') | default('', true)) %}
              {% endif %}
            {% endif %}
            {% set curling_start_raw = state_attr('calendar.curling', 'start_time') %}
            {% if curling_start_raw not in [none, ''] %}
              {% set curling_start = curling_start_raw | as_datetime | as_local %}
              {% if curling_start is not none and curling_start > now_local and curling_start < horizon and (ns.start is none or curling_start < ns.start) %}
                {% set ns.start = curling_start %}
                {% set ns.entry = 'Curling: ' ~ (state_attr('calendar.curling', 'message') | default('', true)) %}
              {% endif %}
            {% endif %}
            {{ ns.entry }}
          start_time: >-
            {% set now_local = now() %}
            {% set horizon = now_local + timedelta(hours=24) %}
            {% set ns = namespace(start=none, value='None') %}
            {% set personal_start_raw = state_attr('calendar.ryan_claussen', 'start_time') %}
            {% if personal_start_raw not in [none, ''] %}
              {% set personal_start = personal_start_raw | as_datetime | as_local %}
              {% if personal_start is not none and personal_start > now_local and personal_start < horizon %}
                {% set ns.start = personal_start %}
                {% set ns.value = personal_start_raw %}
              {% endif %}
            {% endif %}
            {% set work_start_raw = state_attr('binary_sensor.work_trip_today', 'start_time') %}
            {% if work_start_raw not in [none, ''] %}
              {% set work_start = work_start_raw | as_datetime | as_local %}
              {% if work_start is not none and work_start > now_local and work_start < horizon and (ns.start is none or work_start < ns.start) %}
                {% set ns.start = work_start %}
                {% set ns.value = work_start_raw %}
              {% endif %}
            {% endif %}
            {% set curling_start_raw = state_attr('calendar.curling', 'start_time') %}
            {% if curling_start_raw not in [none, ''] %}
              {% set curling_start = curling_start_raw | as_datetime | as_local %}
              {% if curling_start is not none and curling_start > now_local and curling_start < horizon and (ns.start is none or curling_start < ns.start) %}
                {% set ns.start = curling_start %}
                {% set ns.value = curling_start_raw %}
              {% endif %}
            {% endif %}
            {{ ns.value }}
          all_day: >-
            {% set now_local = now() %}
            {% set horizon = now_local + timedelta(hours=24) %}
            {% set ns = namespace(start=none, value='None') %}
            {% set personal_start_raw = state_attr('calendar.ryan_claussen', 'start_time') %}
            {% if personal_start_raw not in [none, ''] %}
              {% set personal_start = personal_start_raw | as_datetime | as_local %}
              {% if personal_start is not none and personal_start > now_local and personal_start < horizon %}
                {% set ns.start = personal_start %}
                {% set ns.value = state_attr('calendar.ryan_claussen', 'all_day') %}
              {% endif %}
            {% endif %}
            {% set work_start_raw = state_attr('binary_sensor.work_trip_today', 'start_time') %}
            {% if work_start_raw not in [none, ''] %}
              {% set work_start = work_start_raw | as_datetime | as_local %}
              {% if work_start is not none and work_start > now_local and work_start < horizon and (ns.start is none or work_start < ns.start) %}
                {% set ns.start = work_start %}
                {% set ns.value = state_attr('binary_sensor.work_trip_today', 'all_day') %}
              {% endif %}
            {% endif %}
            {% set curling_start_raw = state_attr('calendar.curling', 'start_time') %}
            {% if curling_start_raw not in [none, ''] %}
              {% set curling_start = curling_start_raw | as_datetime | as_local %}
              {% if curling_start is not none and curling_start > now_local and curling_start < horizon and (ns.start is none or curling_start < ns.start) %}
                {% set ns.start = curling_start %}
                {% set ns.value = state_attr('calendar.curling', 'all_day') %}
              {% endif %}
            {% endif %}
            {{ ns.value }}
        state: >-
          {% set now_local = now() %}
          {% set horizon = now_local + timedelta(hours=24) %}
          {% set ns = namespace(start=none, eligible=false) %}
          {% set personal_start_raw = state_attr('calendar.ryan_claussen', 'start_time') %}
          {% set personal_description = state_attr('calendar.ryan_claussen', 'description') | default('', true) | lower %}
          {% if personal_start_raw not in [none, ''] and 'nocharge' not in personal_description %}
            {% set personal_start = personal_start_raw | as_datetime | as_local %}
            {% if personal_start is not none and personal_start > now_local and personal_start < horizon %}
              {% set ns.start = personal_start %}
              {% set ns.eligible = true %}
            {% endif %}
          {% endif %}
          {% set work_start_raw = state_attr('binary_sensor.work_trip_today', 'start_time') %}
          {% set work_description = state_attr('binary_sensor.work_trip_today', 'description') | default('', true) | lower %}
          {% if work_start_raw not in [none, ''] and 'nocharge' not in work_description %}
            {% set work_start = work_start_raw | as_datetime | as_local %}
            {% if work_start is not none and work_start > now_local and work_start < horizon and (ns.start is none or work_start < ns.start) %}
              {% set ns.start = work_start %}
              {% set ns.eligible = true %}
            {% endif %}
          {% endif %}
          {% set curling_start_raw = state_attr('calendar.curling', 'start_time') %}
          {% set curling_description = state_attr('calendar.curling', 'description') | default('', true) | lower %}
          {% if curling_start_raw not in [none, ''] and 'nocharge' not in curling_description %}
            {% set curling_start = curling_start_raw | as_datetime | as_local %}
            {% if curling_start is not none and curling_start > now_local and curling_start < horizon and (ns.start is none or curling_start < ns.start) %}
              {% set ns.start = curling_start %}
              {% set ns.eligible = true %}
            {% endif %}
          {% endif %}
          {{ ns.eligible and (state_attr("sensor.waze_next_trip_distance", "distance") | int(0) > 45) }}
      - default_entity_id: binary_sensor.tesla_daily_plan_active
        unique_id: tesla_daily_plan_active
        name: Tesla Daily Plan Active
        state: >-
          {{ is_state('input_boolean.long_range_travel', 'off') }}
  - sensor:
      - name: charge_complete
        unique_id: charge_complete
        device_class: timestamp
        availability: >-
          {% set charge_time_left_raw = state_attr('sensor.nigori_charging_rate','time_left') %}
          {{ states.sensor.nigori_charging_rate.last_updated is defined and charge_time_left_raw not in [none, '', 'None', 'unknown', 'unavailable'] }}
        state: >-
          {% set charge_time_left_raw = state_attr('sensor.nigori_charging_rate','time_left') %}
          {% if states.sensor.nigori_charging_rate.last_updated is defined and charge_time_left_raw not in [none, '', 'None', 'unknown', 'unavailable'] %}
            {% if charge_time_left_raw is number %}
              {% set charge_time_left = timedelta(hours=charge_time_left_raw) %}
            {% else %}
              {% set charge_time_left = charge_time_left_raw | as_timedelta %}
            {% endif %}
            {{ (states.sensor.nigori_charging_rate.last_updated + charge_time_left).isoformat() }}
          {% else %}
            {{ now().isoformat() }}
          {% endif %}
      # I don't think this is used by anything.
      # - name: next_trip_distance
      #   unit_of_measurement: "mi"
      #   availability: >-
      #     {{ state_attr("sensor.waze_next_trip_distance", "distance") != None }}
      #   state: >-
      #     {{ state_attr("sensor.waze_next_trip_distance", "distance") | int }}
      - default_entity_id: sensor.calendar_destination
        unique_id: calendar_destination
        name: Next Calendar Destination
        state: >-
          {% if state_attr("calendar.ryan_claussen", "start_time")  != None %}
            {% set personal_meeting_time = (state_attr("calendar.ryan_claussen", "start_time") | as_datetime|as_local) %}
          {% else %}
            {% set personal_meeting_time = as_datetime(13596565062) %}
          {% endif %}

          {% if state_attr("binary_sensor.work_trip_today", "start_time") not in [none, ''] %}
            {% set work_meeting_upcoming = state_attr("binary_sensor.work_trip_today", "start_time")| as_datetime|as_local %}
          {% else %}
            {% set work_meeting_upcoming = as_datetime(13596565062) %}
          {% endif %}

          {% if state_attr("calendar.curling", "start_time")  != None %}
            {% set curling_upcoming = (state_attr("calendar.curling", "start_time")| as_datetime|as_local) %}
          {% else %}
            {% set curling_upcoming = as_datetime(13596565062) %}
          {% endif %}

          {% if (personal_meeting_time < curling_upcoming) %}
            {% if (personal_meeting_time < work_meeting_upcoming) %}
              {% if (personal_meeting_time - now())< timedelta(hours=24) and state_attr('calendar.ryan_claussen', 'location') != "" %}
                {{ state_attr('calendar.ryan_claussen', 'location') }}
              {% else %}
                {{states("input_text.home_address")}}
              {% endif %}
            {% else %}
                {{ state_attr('binary_sensor.work_trip_today', 'location') }}
            {% endif %}
          {% else %}
            {% if (curling_upcoming < work_meeting_upcoming) %}
              {% if (curling_upcoming - now())< timedelta(hours=24) and state_attr('calendar.curling', 'location') != "" %}
                {{ state_attr('calendar.curling', 'location') }}
              {% else %}
                {{states("input_text.home_address")}}
              {% endif %}
            {% else %}
            {% if (curling_upcoming - now())< timedelta(hours=24) and state_attr('binary_sensor.work_trip_today', 'location') not in [none, ''] %}
                {{ state_attr('binary_sensor.work_trip_today', 'location') }}
              {% else %}
                {{states("input_text.home_address")}}
              {% endif %}
            {% endif %}
          {% endif %}
########################
# Zone
########################
zone: {}
