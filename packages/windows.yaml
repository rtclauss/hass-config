########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - id: close_owner_suite_blinds_at_night
    alias: close_owner_suite_blinds_at_night
    description: Close the owner suite blinds near sunset and catch up after brief evening cover reconnects.
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:45:00
        id: sunset
      - trigger: state
        entity_id: cover.owner_suite_blinds_ha
        from: "unavailable"
        to: "open"
        id: recovery
      - trigger: state
        entity_id: cover.owner_suite_blinds_ha
        from: "unknown"
        to: "open"
        id: recovery
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: sunset
            sequence:
              - variables:
                  blind_close_delay_minutes: "{{ range(0, 48) | random | int }}"
              - delay:
                  minutes: "{{ blind_close_delay_minutes }}"
              - action: cover.close_cover
                target:
                  entity_id: cover.owner_suite_blinds_ha
                  # entity_id: cover.owner_suite_blinds when z2m starts working again
                  # https://github.com/Koenkk/zigbee2mqtt/issues/19124
          - conditions:
              - condition: trigger
                id: recovery
              - condition: sun
                after: sunset
                after_offset: -00:45:00
                before: sunset
                before_offset: "+00:02:00"
            sequence:
              - delay:
                  minutes: 1
              - action: cover.close_cover
                target:
                  entity_id: cover.owner_suite_blinds_ha
                  # entity_id: cover.owner_suite_blinds when z2m starts working again
                  # https://github.com/Koenkk/zigbee2mqtt/issues/19124

# opening is set up in workday.yaml via wake_up_script

