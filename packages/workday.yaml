# Home Assistant package for workday-specific routines.
# Complex areas: it ties together wake-up timing, office-lighting behavior, work-presence helpers, and automation branches that should only run on workdays.

################################################################
## Packages / Workday
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "workday"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    automation.arrive_at_work:
      <<: *customize
      friendly_name: "Arrive at work"

    automation.vacuum_while_working:
      <<: *customize
      friendly_name: "Vacuum while at work"
      icon: mdi:robot-vacuum

    automation.turn_off_office_lamp_when_work_tp_camera_active:
      <<: *customize
      friendly_name: "Turn off Rear Office Lamp when Camera On"

    automation.turn_on_office_lamp_when_work_tp_camera_inactive:
      <<: *customize
      friendly_name: "Turn on Rear Office Lamp when Camera Off"

    automation.alarm_snooze:
      <<: *customize
      friendly_name: "Snooze"
      icon: mdi:alarm-snooze

    automation.cancel_alarms:
      <<: *customize
      friendly_name: "Cancel alarms"
      icon: mdi:alarm-off

    automation.alarm_wake_up:
      <<: *customize
      friendly_name: "Wake up"
      icon: mdi:alarm

    automation.toggle_lava_lamp_workday:
      <<: *customize
      friendly_name: "Toggle lava lamps for work wake-up"
      icon: mdi:lava-lamp

    ################################################
    ## Scripts
    ################################################

    script.set_wakeup_from_phone_alarm:
      <<: *customize
      friendly_name: "Set Wakeup From Phone Alarm"
      icon: mdi:cellphone

    ################################################
    ## Binary Sensors
    ################################################

    ################################################
    ## Input Datetime
    ################################################

    input_boolean.morning_routine:
      <<: *customize
      friendly_name: "Morning routine"

    input_boolean.weekday_alarm_on:
      <<: *customize
      friendly_name: "Weekday alarm on"

    input_boolean.weekend_alarm_on:
      <<: *customize
      friendly_name: "Weekend alarm on"

    input_boolean.wakeup_alarm_firing:
      <<: *customize
      friendly_name: "Wakeup alarm firing"

    input_boolean.snooze_status:
      <<: *customize
      friendly_name: "Snooze status"

    input_boolean.special_meeting:
      <<: *customize
      friendly_name: "Special meeting"

    input_datetime.weekday_alarm:
      <<: *customize

    input_datetime.weekend_alarm:
      <<: *customize

    input_datetime.next_work_meeting:
      <<: *customize
      friendly_name: "Next work meeting"
      icon: mdi:briefcase

################################################
## Automation
################################################
automation:
  - id: arrive_at_work
    alias: arrive_at_work
    trigger:
      - trigger: zone
        entity_id: device_tracker.bayesian_zeke_home
        event: enter
        # zone: zone.work
        zone: zone.rochester
    condition:
      condition: state
      entity_id: "binary_sensor.workday_sensor"
      state: "on"
    action:
      - action: climate.set_preset_mode
        enabled: false
        target:
          entity_id: climate.my_ecobee
        data:
          preset_mode: "away_indefinitely"
      - action: notify.all
        data:
          data:
            url: "/ryan-new-mushroom/climate"
          message: "Arriving at work. Setting Ecobee Away."

  - id: turn_off_morning_routine
    alias: turn_off_morning_routine
    trigger:
      - trigger: time
        at: "00:00:01"
    action:
      - action: input_boolean.turn_off
        data:
          entity_id: input_boolean.morning_routine

  - id: alarm_snooze
    alias: alarm_snooze
    trigger:
      - trigger: event
        event_type: zha_event
        event_data:
          device_ieee: "00:15:8d:00:01:f2:a7:0a"
          command: "click"
          args:
            click_type: "single"
    condition:
      - condition: state
        entity_id: input_boolean.wakeup_alarm_firing
        state: "true"
      - condition: state
        entity_id: device_tracker.bayesian_zeke_home
        state: "home"
      - condition: state
        entity_id: input_boolean.master_bed_occupancy
        state: "on"
    action:
      - action: script.turn_on
        target:
          entity_id: script.snooze_script

  - id: cancel_alarms
    alias: cancel_alarms
    trigger:
      - trigger: event
        event_type: zha_event
        event_data:
          device_ieee: "00:15:8d:00:01:f2:a7:0a"
          command: "click"
          args:
            click_type: "double"
    action:
      - action: media_player.media_stop
        data:
          entity_id: media_player.bedroom_sonos_2

  - id: alarm_wake_up
    alias: alarm_wake_up
    trigger:
      - trigger: time
        at: input_datetime.weekday_alarm
        id: weekday-alarm
      - trigger: time
        at: input_datetime.weekend_alarm
        id: weekend-alarm
      - trigger: time
        at: input_datetime.next_work_meeting
        id: meeting-alarm
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: device_tracker.bayesian_zeke_home
          state: "home"
        - condition: state
          entity_id: binary_sensor.planned_vacation_calendar
          state: "off"
        - condition: state
          entity_id: input_boolean.master_bed_occupancy
          state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: weekday-alarm
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: "on"
              - condition: state
                entity_id: input_boolean.weekday_alarm_on
                state: "on"
              - condition: state
                entity_id: input_boolean.special_meeting
                state: "off"
            sequence:
              - parallel:
                  - action: script.turn_on
                    target:
                      entity_id: script.wake_up_script
                  - action: script.turn_on
                    target:
                      entity_id: script.sonos_mpr_news_wake_up
          - conditions:
              - condition: trigger
                id: weekend-alarm
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: "off"
              - condition: state
                entity_id: input_boolean.weekend_alarm_on
                state: "on"
            sequence:
              - parallel:
                  - action: script.turn_on
                    target:
                      entity_id: script.wake_up_script
                  - action: script.turn_on
                    data:
                      entity_id: >-
                        {%- set script = ["script.sonos_the_current_wake_up",
                          "script.sonos_ksdj_wake_up"
                          ] -%}
                        {% set pindex = (range(0, (script | length - 1)) | random) -%}
                        {{ script[pindex] }}
          - conditions:
              - condition: trigger
                id: meeting-alarm
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: "on"
              - condition: state
                entity_id: input_boolean.special_meeting
                state: "on"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.special_meeting
              - action: script.turn_on
                target:
                  entity_id: script.wake_up_script
              - action: media_player.media_pause
                data:
                  entity_id: media_player.bedroom_sonos_2
              - delay:
                  seconds: 2
              - action: media_player.shuffle_set
                data:
                  entity_id: media_player.bedroom_sonos_2
                  shuffle: false
              - delay:
                  seconds: 2
              - action: media_player.volume_set
                data:
                  entity_id: media_player.bedroom_sonos_2
                  volume_level: 0.2
              - delay:
                  seconds: 2
              - action: script.music_assistant_play_spotify_uri
                data:
                  entity_id: media_player.bedroom_sonos_2
                  spotify_uri: "https://open.spotify.com/track/2Mik4RyMTMGXscX9QGiDoX?si=TBH_9RezQA6d1Y1w5iahHQ"

  - id: toggle_lava_lamp_workday
    alias: toggle_lava_lamp_workday
    trigger:
      - trigger: template
        id: lava-lamp-off
        value_template: >-
          {% set forward_time = states.input_datetime.next_work_meeting.state[0:2] | int + 9 %}
          {% set nine_hoursforward = strptime(forward_time ~ ":" ~ states.input_datetime.next_work_meeting.state[3:5], '%H:%M') %}
          {% set formatted_time = strptime(states('sensor.time'), '%H:%M') %}
          {{ formatted_time == nine_hoursforward }}
      - trigger: template
        id: lava-lamp-on
        value_template: >-
          {% set back_time = states.input_datetime.next_work_meeting.state[0:2] | int - 1 %}
          {% set one_hourback = strptime(back_time ~ ":" ~ states.input_datetime.next_work_meeting.state[3:5], '%H:%M') %}
          {% set formatted_time = strptime(states('sensor.time'), '%H:%M') %}
          {{ formatted_time == one_hourback }}
    condition:
      - condition: state
        entity_id: binary_sensor.workday_sensor
        state: "on"
      - condition: state
        entity_id: input_boolean.special_meeting
        state: "on"
      - condition: state
        entity_id: device_tracker.bayesian_zeke_home
        state: "home"
      - condition: state
        entity_id:
          - input_boolean.guest_mode
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: lava-lamp-on
            sequence:
              - action: light.turn_on
                data:
                  entity_id: light.office_red_lava_lamp
              - action: light.turn_on
                data:
                  entity_id: light.northern_light_lava_lamp
          - conditions:
              - condition: trigger
                id: lava-lamp-off
            sequence:
              - action: light.turn_off
                data:
                  entity_id: light.office_red_lava_lamp
              - action: light.turn_off
                data:
                  entity_id: light.northern_light_lava_lamp

  - id: turn_off_office_lamp_when_work_tp_camera_active
    alias: turn_off_office_lamp_when_work_tp_camera_active
    description: Turn off office ceiling when work laptop camera turns on.
    trigger:
      - trigger: state
        entity_id: binary_sensor.f7m69c_5d3d6e76_camera_in_use
        to: "on"
      - trigger: state
        entity_id: binary_sensor.f7m69c_5d3d6e76_camera_in_use
        to: "on"
        for:
          seconds: 15
    action:
      - action: retry.actions
        data:
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.office_ceiling
          initial_grace_period: 5
          expected_state:
            - "off"
      - action: script.music_assistant_pause_house_audio
      - delay:
          seconds: 5
      - action: light.turn_off
        target:
          entity_id: light.office_ceiling

  - id: turn_on_office_lamp_when_work_tp_camera_inactive
    alias: turn_on_office_lamp_when_work_tp_camera_inactive
    description: Turn on office ceiling when work laptop camera turns off.
    trigger:
      - trigger: state
        entity_id: binary_sensor.f7m69c_5d3d6e76_camera_in_use
        to: "off"
      - trigger: state
        entity_id: binary_sensor.f7m69c_5d3d6e76_camera_in_use
        to: "off"
        for:
          seconds: 15
    action:
      - action: light.turn_on
        data:
          entity_id: light.office_ceiling

  - id: vacuum_while_working
    alias: vacuum_while_working
    description: Run one full-floor pass on the main and upstairs levels while Ryan is away.
    trigger:
      # - platform: state
      #   entity_id: device_tracker.bayesian_zeke_home
      #   to: 'Work'
      - entity_id: device_tracker.bayesian_zeke_home
        event: enter
        trigger: zone
        # zone: zone.work
        zone: zone.rochester
      # - platform: event
      #   event_type: ios.notification_action_fired
      #   event_data:
      #     actionName: VACUUM_HOUSE
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: VACUUM_HOUSE
    condition:
      - condition: state
        entity_id: input_boolean.guest_mode
        state: "off"
    action:
      - action: script.vacuum_main_and_upstairs_levels

########################
# Scripts
########################
script:
  set_wakeup_from_phone_alarm:
    alias: Set Wakeup From Phone Alarm
    description: Set the next wakeup time from the phone alarm synced by iOS.
    mode: single
    fields:
      alarm_time:
        description: Alarm time from iOS, in HH:mm or HH:mm:ss format.
        example: "07:30"
      alarm_enabled:
        description: Whether the phone has a wake-up alarm enabled for tomorrow.
        example: "true"
    sequence:
      - variables:
          alarm_time_text: "{{ alarm_time | default('') | string | trim }}"
          sync_alarm_enabled: >-
            {% set raw = alarm_enabled | default('') %}
            {% set has_alarm_time = alarm_time | default('') | string | trim != '' %}
            {% if raw is boolean %}
              {{ raw }}
            {% elif raw | string | trim != '' %}
              {{ raw | string | lower | trim in ['true', '1', 'on', 'yes'] }}
            {% else %}
              {{ has_alarm_time }}
            {% endif %}
          normalized_alarm_time: >-
            {% if alarm_time_text != '' %}
              {% set parts = alarm_time_text.split(':') %}
              {{ '%02d:%02d' | format(parts[0] | int, parts[1] | int) }}
            {% else %}
              {{ '' }}
            {% endif %}
          meeting_alarm_time: >-
            {% if alarm_time_text != '' %}
              {% set meeting_time = today_at(normalized_alarm_time) - timedelta(minutes=5) %}
              {{ meeting_time.strftime('%H:%M:%S') }}
            {% else %}
              00:00:00
            {% endif %}
          tomorrow_start: "{{ (now().date() + timedelta(days=1)).isoformat() }}T00:00:00"
          day_after_tomorrow_start: "{{ (now().date() + timedelta(days=2)).isoformat() }}T00:00:00"
      - action: calendar.get_events
        target:
          entity_id: calendar.mn_holidays
        data:
          start_date_time: "{{ tomorrow_start }}"
          end_date_time: "{{ day_after_tomorrow_start }}"
        response_variable: tomorrow_holidays
      - variables:
          tomorrow_is_weekday: "{{ (now() + timedelta(days=1)).weekday() < 5 }}"
          tomorrow_is_holiday: >-
            {{ (tomorrow_holidays.events | default([]) | length) > 0 }}
          tomorrow_is_workday: >-
            {{ tomorrow_is_weekday and not tomorrow_is_holiday }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sync_alarm_enabled and tomorrow_is_workday }}"
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.weekday_alarm
                data:
                  time: "{{ normalized_alarm_time }}"
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.next_work_meeting
                data:
                  time: "{{ meeting_alarm_time }}"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.weekday_alarm_on
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.special_meeting
          - conditions:
              - condition: template
                value_template: "{{ sync_alarm_enabled and not tomorrow_is_workday }}"
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.weekend_alarm
                data:
                  time: "{{ normalized_alarm_time }}"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.weekend_alarm_on
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ not tomorrow_is_workday }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.weekend_alarm_on

  snooze_script:
    alias: Snooze Tasks
    sequence:
      - action: light.turn_off
        data:
          entity_id:
            - light.owner_suite_lamps
            - light.bed_lightstrip
      - action: media_player.media_stop
        continue_on_error: true
        data:
          entity_id: media_player.bedroom_sonos_2
      - delay:
          minutes: 8
      - action: script.turn_on
        entity_id: script.wake_up_script
      - action: media_player.media_play
        continue_on_error: true
        data:
          entity_id: media_player.bedroom_sonos_2

  sonos_ksdj_wake_up:
    alias: Sonos KSDJ Wake Up
    sequence:
      - action: script.music_assistant_radio_wake_up
        data:
          radio_uri: "library://radio/12"

  sonos_mpr_news_wake_up:
    alias: Sonos MPR News Wake Up
    sequence:
      - action: script.music_assistant_radio_wake_up
        data:
          radio_uri: "tunein--S3NwgspV://radio/s34350"
          initial_delay: 5

  sonos_the_current_wake_up:
    alias: Sonos The Current Wake Up
    sequence:
      - action: script.music_assistant_radio_wake_up
        data:
          radio_uri: "tunein--S3NwgspV://radio/s20620"

  wake_up_script:
    alias: Common Wake Up Tasks
    sequence:
      - alias: Have we already done this?
        condition: state
        entity_id:
          - input_boolean.wakeup_alarm_firing
        state: "off"
      - action: input_boolean.turn_on
        data:
          entity_id: input_boolean.wakeup_alarm_firing
      - alias: "Turn on light at dimmest setting. Adaptive Lighting will apply"
        continue_on_error: true
        action: light.turn_on
        data:
          entity_id:
            - light.owner_suite_lamps
            - light.bed_lightstrip
          color_temp_kelvin: 2700
          brightness_pct: 1
      - delay:
          seconds: 5
      - alias: "Ramp bedroom lights up to full wake-up brightness"
        continue_on_error: true
        action: light.turn_on
        data:
          entity_id:
            - light.owner_suite_lamps
            - light.bed_lightstrip
          color_temp_kelvin: 6500
          brightness_pct: 100
          transition: 300
      - delay:
          minutes: 1
      - action: switch.turn_off
        data:
          entity_id:
            - switch.sleep_mode
      - alias: "Slowly Open Blinds"
        continue_on_error: true
        repeat:
          until: "{{ (repeat.index * 2) == 80 }}"
          sequence:
            - action: cover.set_cover_position
              data:
                entity_id: cover.owner_suite_blinds_ha
                position: "{{ repeat.index * 2 }}"
            - delay:
                seconds: "{{ (75/(log(repeat.index + 1, 5))) | round(0, 'ceil', 5) }}"
      - alias: "Turn on Adaptive Brightness for bedroom"
        continue_on_error: true
        action: switch.turn_on
        entity_id:
          - switch.adaptive_lighting_adapt_brightness_owner_suite
          - switch.adaptive_lighting_adapt_color_owner_suite

########################
# Binary Sensors
########################
binary_sensor: []
  # Moved to UI configuration
  # - platform: workday
  #   country: US
  #   province: !secret home_state

########################
# Input Booleans
########################
input_boolean:
  morning_routine:
  weekday_alarm_on:
  weekend_alarm_on:
  wakeup_alarm_firing:
  snooze_status:
    initial: false
  special_meeting:

################################################
## Input Datetime
################################################
input_datetime:
  weekday_alarm:
    has_date: false
    has_time: true
  weekend_alarm:
    has_date: false
    has_time: true
  next_work_meeting:
    has_date: false
    has_time: true

################################################
## Sensor
################################################
sensor:
  - platform: time_date
    display_options:
      - time
