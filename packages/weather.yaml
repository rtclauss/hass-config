## Sensors
################################################
sensor:
  # - platform: wunderground
  #   api_key: !secret wunderground_api_key
  #   monitored_conditions:
  #     - alerts
  #     - dewpoint_f
  #     - feelslike_f
  #     - heat_index_f
  #     - observation_time
  #     - precip_today_in
  #     - precip_1d_in
  #     - precip_1d
  #     - pressure_mb
  #     - pressure_trend
  #     - relative_humidity
  #     - temp_f
  #     - temp_high_1d_f
  #     - temp_low_1d_f
  #     - weather
  #     - weather_1d
  #     - weather_1n
  #     - weather_2d
  #     - weather_2n
  #     - weather_3d
  #     - weather_3n
  #     - weather_1h
  #     - weather_2h
  #     - weather_3h
  #     - weather_4h
  #     - weather_5h
  #     - weather_6h
  #     - wind_mph
  #     - wind_dir
  #     - wind_1d_mph

  #  - visibility
  #  - ozone

  # Follow the Tesla's coordinates so rain detection works away from home.
  - platform: rest
    name: nigori_precip_next_2hr
    unique_id: nigori_precip_next_2hr
    resource_template: >-
      {% set latitude = state_attr('device_tracker.nigori_location_tracker', 'latitude') | float(default=none) %}
      {% set longitude = state_attr('device_tracker.nigori_location_tracker', 'longitude') | float(default=none) %}
      {% if latitude is number and longitude is number %}
        https://api.open-meteo.com/v1/forecast?latitude={{ '%.4f' | format(latitude) }}&longitude={{ '%.4f' | format(longitude) }}&hourly=precipitation_probability&forecast_hours=2&timezone=auto
      {% else %}
        {% set home_lat = state_attr('zone.home', 'latitude') | float(default=none) %}
        {% set home_lon = state_attr('zone.home', 'longitude') | float(default=none) %}
        {% if home_lat is number and home_lon is number %}
          https://api.open-meteo.com/v1/forecast?latitude={{ '%.4f' | format(home_lat) }}&longitude={{ '%.4f' | format(home_lon) }}&hourly=precipitation_probability&forecast_hours=2&timezone=auto
        {% endif %}
      {% endif %}
    scan_interval: 900
    timeout: 20
    unit_of_measurement: "%"
    value_template: >-
      {% set probabilities = value_json.hourly.precipitation_probability if value_json.hourly is defined and value_json.hourly.precipitation_probability is defined else [] %}
      {% set ns = namespace(max_probability = -1) %}
      {% for probability in probabilities %}
        {% set probability_value = probability | int(default=-1) %}
        {% if probability_value > ns.max_probability %}
          {% set ns.max_probability = probability_value %}
        {% endif %}
      {% endfor %}
      {{ ns.max_probability }}

