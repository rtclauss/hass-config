# Home Assistant package for forecast data, weather alerts, and rain-driven notifications.
# Complex areas: it combines forecast precipitation, falling-pressure sensors, and NWS alert feeds to decide when to warn about open windows, storms, or the Tesla.

################################################################
## Packages / Weather
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "weather"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################
    automation.alert_car_windows_open_pressure_dropping:
      <<: *customize
      friendly_name: "Close car window rain alert"
      icon: mdi:window-closed

    automation.alert_house_windows_open_pressure_dropping:
      <<: *customize
      friendly_name: "Close house window rain alert"
      icon: mdi:window-closed

    automation.window_open_departure_rain_warning:
      <<: *customize
      friendly_name: "Departure rain warning"
      icon: mdi:weather-pouring

    automation.window_open_home_rain_warning:
      <<: *customize
      friendly_name: "Home rain warning"
      icon: mdi:weather-pouring

    automation.window_open_cool_weather_reminder:
      <<: *customize
      friendly_name: "Check for open windows"
      icon: mdi:window-open-variant

    automation.notify_tornado_warning_alert:
      <<: *customize
      friendly_name: Tornado Warning
      icon: mdi:alert

    automation.notify_weather_alert:
      <<: *customize
      friendly_name: Weather Alerts
      icon: mdi:alert-outline

    ################################################
    ## Binary Sensors
    ################################################

    ################################################
    ## Groups
    ################################################

    ################################################
    ## Input Boolean
    ################################################

    ################################################
    ## Input Numbers
    ################################################

    ################################################
    ## Scripts
    ################################################

    ################################################
    ## Sensors
    ################################################
    sensor.precip_next_6h:
      <<: *customize
      friendly_name: Precipitation % in next 6 hours
      icon: mdi:weather-pouring
    sensor.active_weather_entity_id:
      <<: *customize
      friendly_name: Active weather entity
      icon: mdi:weather-partly-cloudy
    sensor.precip_next_15m:
      <<: *customize
      friendly_name: Precipitation % in next 15 minutes
      icon: mdi:weather-pouring
    sensor.precip_next_12h:
      <<: *customize
      friendly_name: Precipitation % in next 12 hours
      icon: mdi:weather-pouring
    sensor.nigori_precip_next_2hr:
      <<: *customize
      friendly_name: Tesla Precipitation % in next 2 hours
      icon: mdi:weather-pouring
    sensor.dark_sky_temperature:
      <<: *customize
      friendly_name: Outside Temperature
    sensor.dark_sky_precip:
      <<: *customize
      friendly_name: Precipitation Type
      icon: mdi:weather-hail
    sensor.dark_sky_precip_intensity:
      <<: *customize
      friendly_name: Precipitation Intensity
      icon: mdi:weather-pouring
    sensor.tomorrow_io_the_brewery_cloud_cover:
      <<: *customize
      friendly_name: Cloud Cover
      icon: mdi:weather-cloudy
    sensor.dark_sky_humidity:
      <<: *customize
      friendly_name: Humidity
      icon: mdi:thermometer-lines
    sensor.nws_dakota_county_alerts_active_alerts:
      <<: *customize
      friendly_name: Weather Alerts
    sensor.nws_dakota_county_alerts_alert_1:
      <<: *customize
      friendly_name: Weather Alert 1
    sensor.nws_dakota_county_alerts_alert_2:
      <<: *customize
      friendly_name: Weather Alert 2
    sensor.nws_dakota_county_alerts_alert_3:
      <<: *customize
      friendly_name: Weather Alert 3
    sensor.nws_dakota_county_alerts_alert_4:
      <<: *customize
      friendly_name: Weather Alert 4
    sensor.nws_dakota_county_alerts_alert_5:
      <<: *customize
      friendly_name: Weather Alert 5
    sensor.nws_dakota_county_alerts_alerts_are_active:
      <<: *customize
      friendly_name: Weather Alerts Are Active

    ################################################
    ## Weather
    ################################################

################################################
## Automation
################################################
automation:
  - id: alert_car_windows_open_pressure_dropping
    alias: alert_car_windows_open_pressure_dropping
    mode: single
    trigger:
      - trigger: numeric_state
        entity_id: sensor.nigori_precip_next_2hr
        above: 50
        for:
          minutes: 5
    condition:
      - condition: numeric_state
        entity_id: sensor.nigori_precip_next_2hr
        above: 50
      - condition: state
        entity_id: binary_sensor.nigori_parking_brake
        state: "on"
      - condition: state
        entity_id: cover.nigori_windows
        state: "open"
      - condition: not
        conditions:
          - condition: state
            entity_id: sensor.season
            state: "winter"
    action:
      - choose:
          - conditions:
              - alias: "Check if we already notified within the last hour"
                condition: template
                value_template: >-
                  {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.alert_car_windows_open_pressure_dropping', 'last_triggered'), 0)) > 3600 }}
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Tesla Windows"
                  message: >-
                    Rain is expected near the parked Tesla within the next two hours. Home
                    Assistant is closing the open windows using the vehicle's current location
                    forecast.
      - action: cover.close_cover
        target:
          entity_id: cover.nigori_windows

  - id: alert_house_windows_open_pressure_dropping
    alias: alert_house_windows_open_pressure_dropping
    trigger:
      - trigger: state
        entity_id:
          - binary_sensor.pressure_falling_quickly
          - binary_sensor.pressure_falling_v_rapidly
        from: "off"
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.any_window_open
        state: "on"
      - alias: "Check if we already notified within the last 4 hours"
        condition: template
        value_template: >-
          {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.alert_house_windows_open_pressure_dropping', 'last_triggered'), 0)) > 14400 }}
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Open Window"
          message: "Pressure is dropping quickly and a window is open. Close the windows."
          data:
            tag: window-pressure-drop
            persistent: true
            ttl: 0
            priority: high

  - id: notify_tornado_warning_alert
    alias: notify_tornado_warning_alert
    trigger:
      - trigger: numeric_state
        entity_id: sensor.nws_alerts
        above: 0
    condition:
      - condition: template
        value_template: >-
          {% set alert_type = state_attr('sensor.nws_alerts', 'TYPE') | default('', true) %}
          {% set description = state_attr('sensor.nws_alerts', 'Description') | default('', true) %}
          {{ alert_type == "TOR" or description == "Tornado Warning" }}
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.bayesian_zeke_home
                state: "on"
            sequence:
              - action: light.turn_on
                data:
                  entity_id:
                    - light.dining_room_all
                    - light.basement_great_room
                    - light.owner_suite_all
                  flash: long
              - action: light.turn_on
                data:
                  entity_id: all
      - action: notify.mobile_app_wethop
        data:
          title: "Tornado Warning"
          message: "Go to the basement now."
          data:
            tag: tornado-warning
            persistent: true
            ttl: 0
            priority: high
            channel: alarm_stream
            push:
              sound:
                name: default
                critical: 1
                volume: 1.0
      - action: notify.mobile_app_faro
        data:
          title: "Tornado Warning"
          message: "Go to the basement now."
          data:
            tag: tornado-warning
            persistent: true
            ttl: 0
            priority: high
            channel: alarm_stream
            push:
              sound:
                name: default
                critical: 1
                volume: 1.0

  - id: notify_weather_alert
    alias: notify_weather_alert
    trigger:
      - trigger: numeric_state
        entity_id: sensor.nws_alerts
        above: 0
    condition:
      - condition: template
        value_template: >-
          {% set alert_type = state_attr('sensor.nws_alerts', 'TYPE') | default('', true) %}
          {% set description = state_attr('sensor.nws_alerts', 'Description') | default('', true) %}
          {{ not (alert_type == "TOR" or description == "Tornado Warning") }}
    action:
      - action: notify.all
        data:
          message: >-
            {{ state_attr('sensor.nws_alerts', 'Description') }}

  - id: window_open_departure_rain_warning
    alias: window_open_departure_rain_warning
    mode: single
    trigger:
      - id: trip_on
        trigger: state
        entity_id: input_boolean.trip
        to: "on"
      - id: leave_home
        trigger: zone
        entity_id: device_tracker.bayesian_zeke_home
        zone: zone.home
        event: leave
      - id: leave_neighborhood
        trigger: zone
        entity_id: device_tracker.bayesian_zeke_home
        zone: zone.neighborhood
        event: leave
    condition:
      - condition: state
        entity_id: binary_sensor.any_window_open
        state: "on"
      - condition: numeric_state
        entity_id: sensor.precip_next_12h
        above: 40
      - alias: "Check if we already notified within the last hour"
        condition: template
        value_template: >-
          {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.window_open_departure_rain_warning', 'last_triggered'), 0)) > 3600 }}
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Rain warning"
          message: >-
            {% if trigger.id == 'trip_on' %}
              Trip mode is on and
            {% elif trigger.id == 'leave_home' %}
              You're leaving home and
            {% else %}
              You're leaving the neighborhood and
            {% endif %}
            rain is likely in the next 12 hours. Close the windows before you go.
          data:
            tag: window-rain-departure
            persistent: true
            ttl: 0
            priority: high

  - id: window_open_home_rain_warning
    alias: window_open_home_rain_warning
    mode: single
    trigger:
      - id: rain_soon
        trigger: numeric_state
        entity_id: sensor.precip_next_15m
        above: 40
      - id: window_opened
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "on"
        for:
          minutes: 1
    condition:
      - condition: state
        entity_id: binary_sensor.bayesian_zeke_home
        state: "on"
      - condition: state
        entity_id: input_boolean.trip
        state: "off"
      - condition: state
        entity_id: binary_sensor.any_window_open
        state: "on"
      - condition: numeric_state
        entity_id: sensor.precip_next_15m
        above: 40
      - alias: "Check if we already notified within the last hour"
        condition: template
        value_template: >-
          {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.window_open_home_rain_warning', 'last_triggered'), 0)) > 3600 }}
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Rain warning"
          message: "Rain is likely in the next 15 minutes and a window is open. Close the windows."
          data:
            tag: window-rain-home
            persistent: true
            ttl: 0
            priority: high

  - id: window_open_cool_weather_reminder
    alias: window_open_cool_weather_reminder
    mode: single
    trigger:
      - id: outside_cool
        trigger: numeric_state
        entity_id: sensor.outside_temperature
        below: 65
      - id: window_open
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "on"
        for:
          minutes: 5
      - id: aux_on
        trigger: state
        entity_id: binary_sensor.ecobee_aux
        to: "on"
        for:
          minutes: 10
      - id: time_high
        trigger: numeric_state
        entity_id: sensor.ecobee_time_to_target_minutes
        above: 90
    condition:
      - condition: state
        entity_id: binary_sensor.bayesian_zeke_home
        state: "on"
      - condition: state
        entity_id: input_boolean.trip
        state: "off"
      - condition: numeric_state
        entity_id: sensor.outside_temperature
        below: 65
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.any_window_open
            state: "on"
          - condition: state
            entity_id: binary_sensor.ecobee_aux
            state: "on"
          - condition: numeric_state
            entity_id: sensor.ecobee_time_to_target_minutes
            above: 90
      - alias: "Check if we already reminded within the last 2 hours"
        condition: template
        value_template: >-
          {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.window_open_cool_weather_reminder', 'last_triggered'), 0)) > 7200 }}
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Check windows"
          message: "It's cool outside and either a window is open or the climate is working hard. Check for open windows."

    ## Automation to trigger a UI notification when there is an active weather alert.
    ## nws_dakota_county_alerts_alert_1 should always contain most recent alert.
  - alias: Weather Alert UI Notification - 1
    trigger:
      - trigger: state
        entity_id: sensor.nws_dakota_county_alerts_alert_1_last_changed
      - trigger: homeassistant
        event: start
    condition:
      - condition: and
        conditions:
          - condition: state
            entity_id: sensor.nws_dakota_county_alerts_alerts_are_active
            state: "Yes"
          - condition: template
            value_template: "{{ (as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_sent'))) < 3600 }}"
          - condition: template
            value_template: "{{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_id') not in states('input_text.nws_dakota_county_alerts_triggered_ui_alert_ids') }}"
    action:
      - action: script.nws_dakota_county_alerts_popup_on_wx_alert
        data:
          title: >
            {% if (states('sensor.nws_dakota_county_alerts_alert_1') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_effective'))|float) <= 3600) %}
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'display_title') }}
            {% else %}
              Weather Alerts
            {% endif %}
          message: >
            {% if (states('sensor.nws_dakota_county_alerts_alert_1') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_effective'))|float) <= 3600) %}
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'display_message') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_1') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_effective'))|float) > 3600) %}
              <hr>Alert: <br>{{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'display_title') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_2') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_2', 'alert_effective'))|float) <= 3600) %}
              <hr>{{ state_attr('sensor.nws_dakota_county_alerts_alert_2', 'display_title') }}<br>
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_2', 'display_message') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_2') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_2', 'alert_effective'))|float) > 3600) %}
              <hr>Alert: <br>{{ state_attr('sensor.nws_dakota_county_alerts_alert_2', 'display_title') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_3') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_3', 'alert_effective'))|float) <= 3600) %}
              <hr>{{ state_attr('sensor.nws_dakota_county_alerts_alert_3', 'display_title') }}<br>
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_3', 'display_message') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_3') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_3', 'alert_effective'))|float) > 3600) %}
              <hr>Alert: <br>{{ state_attr('sensor.nws_dakota_county_alerts_alert_3', 'display_title') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_4') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_4', 'alert_effective'))|float) <= 3600) %}
              <hr>{{ state_attr('sensor.nws_dakota_county_alerts_alert_4', 'display_title') }}<br>
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_4', 'display_message') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_4') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_4', 'alert_effective'))|float) > 3600) %}
              <hr>Alert: <br>{{ state_attr('sensor.nws_dakota_county_alerts_alert_4', 'display_title') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_5') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_5', 'alert_effective'))|float) <= 3600) %}
              <hr>{{ state_attr('sensor.nws_dakota_county_alerts_alert_5', 'display_title') }}<br>
              {{ state_attr('sensor.nws_dakota_county_alerts_alert_5', 'display_message') }}
            {% endif %}
            {% if (states('sensor.nws_dakota_county_alerts_alert_5') == 'on') and ((as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_5', 'alert_effective'))|float) > 3600) %}
              <hr>Alert: <br>{{ state_attr('sensor.nws_dakota_county_alerts_alert_5', 'display_title') }}
            {% endif %}
      - action: input_text.set_value
        data:
          entity_id: input_text.nws_dakota_county_alerts_triggered_ui_alert_ids
          value: "{{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_2', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_3', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_4', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_5', 'alert_id') }}"

    ## Automation to dismiss UI notification if there are no active alerts for 30 minutes
    ## Disable or remove this automation if you don't want notifications to auto-dismiss
  - alias: Weather Alert UI Notification Auto-dismiss - 1
    trigger:
      - trigger: state
        entity_id: sensor.nws_dakota_county_alerts_alerts_are_active
        to: "No"
        for:
          minutes: 30
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: sensor.nws_dakota_county_alerts_alerts_are_active
        state: "No"
    action:
      - action: persistent_notification.dismiss
        data:
          notification_id: "nws_dakota_county_alerts_alert"

  ## Automation to push alerts via Pushbullet service
  ## Disable or remove this automation if you don't use Pushbullet
  - alias: Weather Alerts Pushbullet Notification - 1
    trigger:
      - trigger: state
        entity_id: sensor.nws_dakota_county_alerts_alert_1_last_changed
    condition:
      - condition: and
        conditions:
          - condition: state
            entity_id: sensor.nws_dakota_county_alerts_alerts_are_active
            state: "Yes"
          - condition: template
            value_template: "{{ (as_timestamp(now()) - as_timestamp(state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_sent'))) < 3600 }}"
          - condition: template
            value_template: "{{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_id') not in states('input_text.nws_dakota_county_alerts_triggered_pushbullet_alert_ids') }}"
          - condition: template
            value_template: >-
              {% set alert_type = state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_event') | default('', true) %}
              {{ 'Flood' not in alert_type and 'Tornado Warning' not in alert_type }}
    action:
      - action: notify.mobile_app_wethop
        data:
          message: >
            Current NWS Weather Alerts:

            {% if states('sensor.nws_dakota_county_alerts_alerts_are_active') == "No" %}
            No alerts at this time for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}.
            {% endif %}
            {% if states.sensor.nws_dakota_county_alerts_alert_1.state == "on" %}
            {{ states.sensor.nws_dakota_county_alerts_alert_1.attributes.display_title }} for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}

            {% endif %}
            {% if states.sensor.nws_dakota_county_alerts_alert_2.state == "on" %}
            {{ states.sensor.nws_dakota_county_alerts_alert_2.attributes.display_title }} for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}

            {% endif %}
            {% if states.sensor.nws_dakota_county_alerts_alert_3.state == "on" %}
            {{ states.sensor.nws_dakota_county_alerts_alert_3.attributes.display_title }} for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}

            {% endif %}
            {% if states.sensor.nws_dakota_county_alerts_alert_4.state == "on" %}
            {{ states.sensor.nws_dakota_county_alerts_alert_4.attributes.display_title }} for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}

            {% endif %}
            {% if states.sensor.nws_dakota_county_alerts_alert_5.state == "on" %}
            {{ states.sensor.nws_dakota_county_alerts_alert_5.attributes.display_title }} for {{ state_attr('sensor.nws_dakota_county_alerts', 'friendly_name') }}
            {% endif %}
      - action: input_text.set_value
        data:
          entity_id: input_text.nws_dakota_county_alerts_triggered_pushbullet_alert_ids
          value: "{{ state_attr('sensor.nws_dakota_county_alerts_alert_1', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_2', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_3', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_4', 'alert_id') }} {{ state_attr('sensor.nws_dakota_county_alerts_alert_5', 'alert_id') }}"

########################
# Binary Sensors
########################
binary_sensor: []

########################
# Input Booleans
########################
input_boolean: {}

########################
# Input Numbers
########################
input_number: {}

########################
# Input Text
########################
input_text:
  nws_dakota_county_alerts_triggered_ui_alert_ids:
    name: Triggered Weather Alert IDs - UI
    icon: mdi:information-variant
    max: 255
    initial: ""

  nws_dakota_county_alerts_triggered_pushbullet_alert_ids:
    name: Triggered Weather Alert IDs - Pushbullet
    icon: mdi:information-variant
    max: 255
    initial: ""

########################
# Groups
########################
group: {}

########################
# Scenes
########################
scene: []

########################
# Scripts
########################
script:
  ## Script creates UI notification and is called via automation defined above
  nws_dakota_county_alerts_popup_on_wx_alert:
    alias: Weather Alert Pop Up - 1
    sequence:
      ## Dismiss any current alert so the UI isn't filled
      ## up with these if there are more then one.
      ## Only show the most recent alert
      - action: persistent_notification.dismiss
        data:
          notification_id: "nws_dakota_county_alerts_alert"
      ## Create a new persistent notification only while at least one alert is active.
      - if:
          - condition: not
            conditions:
              - condition: state
                entity_id: sensor.nws_dakota_county_alerts
                state: "0"
        then:
          - action: persistent_notification.create
            data:
              notification_id: "nws_dakota_county_alerts_alert"
              message: "{{ message }}"
              title: "{{ title }}"

