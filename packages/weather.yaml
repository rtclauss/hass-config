    - name: active_weather_entity_id
      unique_id: active_weather_entity_id
      icon: mdi:weather-partly-cloudy
      state: >-
        {% set preferred = 'weather.tomorrow_io_the_brewery_daily' %}
        {% set preferred_forecast = state_attr(preferred, 'forecast') or [] %}
        {% if preferred_forecast | count > 0 %}
          {{ preferred }}
        {% else %}
          {% set chosen = namespace(entity_id='') %}
          {% for weather in states.weather %}
            {% set forecast = state_attr(weather.entity_id, 'forecast') or [] %}
            {% if forecast | count > 0 and chosen.entity_id == '' %}
              {% set chosen.entity_id = weather.entity_id %}
            {% endif %}
          {% endfor %}
          {{ chosen.entity_id or preferred }}
        {% endif %}
      attributes:
        temperature: >-
          {% set preferred = 'weather.tomorrow_io_the_brewery_daily' %}
          {% set preferred_forecast = state_attr(preferred, 'forecast') or [] %}
          {% if preferred_forecast | count > 0 %}
            {% set weather_entity = preferred %}
          {% else %}
            {% set chosen = namespace(entity_id='') %}
            {% for weather in states.weather %}
              {% set forecast = state_attr(weather.entity_id, 'forecast') or [] %}
              {% if forecast | count > 0 and chosen.entity_id == '' %}
                {% set chosen.entity_id = weather.entity_id %}
              {% endif %}
            {% endfor %}
            {% set weather_entity = chosen.entity_id or preferred %}
          {% endif %}
          {{ state_attr(weather_entity, 'temperature') | int(default=0) }}
        humidity: >-
          {% set preferred = 'weather.tomorrow_io_the_brewery_daily' %}
          {% set preferred_forecast = state_attr(preferred, 'forecast') or [] %}
          {% if preferred_forecast | count > 0 %}
            {% set weather_entity = preferred %}
          {% else %}
            {% set chosen = namespace(entity_id='') %}
            {% for weather in states.weather %}
              {% set forecast = state_attr(weather.entity_id, 'forecast') or [] %}
              {% if forecast | count > 0 and chosen.entity_id == '' %}
                {% set chosen.entity_id = weather.entity_id %}
              {% endif %}
            {% endfor %}
            {% set weather_entity = chosen.entity_id or preferred %}
          {% endif %}
          {{ state_attr(weather_entity, 'humidity') | int(default=0) }}
        forecast_json: >-
          {% set preferred = 'weather.tomorrow_io_the_brewery_daily' %}
          {% set preferred_forecast = state_attr(preferred, 'forecast') or [] %}
          {% if preferred_forecast | count > 0 %}
            {% set weather_entity = preferred %}
          {% else %}
            {% set chosen = namespace(entity_id='') %}
            {% for weather in states.weather %}
              {% set forecast = state_attr(weather.entity_id, 'forecast') or [] %}
              {% if forecast | count > 0 and chosen.entity_id == '' %}
                {% set chosen.entity_id = weather.entity_id %}
              {% endif %}
            {% endfor %}
            {% set weather_entity = chosen.entity_id or preferred %}
          {% endif %}
          {{ (state_attr(weather_entity, 'forecast') or []) | tojson }}

    - name: outside_humidity
      unique_id: outside_humidity
      device_class: humidity
      unit_of_measurement: "%"
      state: "{{ state_attr('sensor.active_weather_entity_id', 'humidity') | int(default=0) }}"

    - name: outside_temperature
      unique_id: outside_temperature
      device_class: temperature
      unit_of_measurement: "°F"
      state: "{{ state_attr('sensor.active_weather_entity_id', 'temperature') | int(default=0) }}"

    - name: precip_next_15m
      unique_id: precip_next_15m
      unit_of_measurement: "%"
      state: >-
        {% set forecasts = (state_attr('sensor.active_weather_entity_id', 'forecast_json') | default('[]', true) | from_json) | sort(attribute='datetime') %}
        {% set ns = namespace(probability = -1) %}
        {% for forecast in forecasts %}
          {% if as_datetime(forecast.datetime) < (utcnow() + timedelta(minutes=15)) %}
            {% if forecast.precipitation_probability | int(default=-1) > ns.probability %}
              {% set ns.probability = forecast.precipitation_probability | int(default=-1) %}
            {% endif %}
          {% else %}
            {% break %}
          {% endif %}
        {% endfor %}
        {{ ns.probability }}

