automation:
  - id: reconcile_owner_suite_adaptive_lighting
    alias: reconcile_owner_suite_adaptive_lighting
    description: >
      Reapply the Adaptive Lighting baselines after Home Assistant starts so
      kitchen, den, basement, dining-room, and owner-suite tuning survive restarts
      while preserving each room's intended scene and task-lighting behavior.
      The runtime dining-room Adaptive Lighting switch now uses the current dining-room entity id.
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - delay: "00:00:30"
      - action: adaptive_lighting.change_switch_settings
        data:
          entity_id: switch.dining_room_adaptive_lighting_dining_room
          use_defaults: current
          include_config_in_attributes: true
          take_over_control: true
          adapt_only_on_bare_turn_on: true
          only_once: false
          initial_transition: 1
          transition: 5
          detect_non_ha_changes: false
      - action: adaptive_lighting.change_switch_settings
        data:
          entity_id: switch.adaptive_lighting_kitchen
          use_defaults: current
          include_config_in_attributes: true
          take_over_control: true
          adapt_only_on_bare_turn_on: true
          only_once: true
          initial_transition: 1
          transition: 3
          detect_non_ha_changes: false
      - action: adaptive_lighting.change_switch_settings
        data:
          entity_id: switch.adaptive_lighting_den
          use_defaults: current
          include_config_in_attributes: true
          take_over_control: true
          adapt_only_on_bare_turn_on: true
          only_once: false
          initial_transition: 2
          transition: 2
          separate_turn_on_commands: true
          detect_non_ha_changes: false
      - action: adaptive_lighting.change_switch_settings
        data:
          entity_id: switch.adaptive_lighting_owner_suite
          use_defaults: current
          include_config_in_attributes: true
          take_over_control: true
          adapt_only_on_bare_turn_on: true
          only_once: false
          initial_transition: 2
          sleep_transition: 2
          transition: 5
          sleep_brightness: 1
          sleep_color_temp: 1000
          detect_non_ha_changes: false
      - action: adaptive_lighting.change_switch_settings
        data:
          entity_id: switch.adaptive_lighting_basement
          use_defaults: current
          include_config_in_attributes: true
          take_over_control: false
          adapt_only_on_bare_turn_on: false
          only_once: false
          initial_transition: 0
          sleep_transition: 1
          transition: 5
          min_brightness: 25
          max_brightness: 100
          min_color_temp: 2000
          max_color_temp: 5500
          sleep_brightness: 1
          sleep_color_temp: 1000
          detect_non_ha_changes: false
      - event: adaptive_lighting_startup_reconciled

  - id: apply_adaptive_lighting_on_arrival
    alias: apply_adaptive_lighting_on_arrival
    description: >
      Instantly correct color temperature and brightness for any lights that
      turn on as part of home-arrival automations. Fires for all transport
      modes (car, Uber, Lyft, walking) via the Bayesian presence sensor.
      A 2-second delay lets arrival-scene transitions begin before the
      adaptive apply fires. Empty-house arrivals can apply across all
      configured arrival switches; occupied-house arrivals only apply to
      configured lights that Adaptive Lighting has not marked as manually
      controlled. If the bed is occupied, only common-area arrival switches
      are eligible so the owner suite is not disturbed. Arrival only applies
      to switches that are already enabled; turn_on_lights=false keeps off
      lights undisturbed. Resolves #486.
    mode: single
    trigger:
      - trigger: zone
        id: bayesian-device-entered-home
        entity_id: device_tracker.bayesian_zeke_home
        zone: zone.home
        event: enter
      - trigger: state
        id: bayesian-presence-turned-on
        entity_id: binary_sensor.bayesian_zeke_home
        from: "off"
        to: "on"
    action:
      - variables:
          arrival_home_was_empty: >-
            {{
              (
                trigger.id == 'bayesian-presence-turned-on'
                and trigger.from_state is not none
                and trigger.from_state.state == 'off'
              )
              or
              (
                trigger.id == 'bayesian-device-entered-home'
                and is_state('binary_sensor.bayesian_zeke_home', 'off')
              )
            }}
          arrival_common_adaptive_switches:
            - switch.adaptive_lighting_kitchen
            - switch.adaptive_lighting_den
            - switch.adaptive_lighting_hallway
          arrival_owner_suite_adaptive_switches:
            - switch.adaptive_lighting_owner_suite
      - variables:
          arrival_adaptive_switches: >-
            {{
              arrival_common_adaptive_switches
              + (
                arrival_owner_suite_adaptive_switches
                if is_state('binary_sensor.bayesian_bed_occupancy', 'off')
                else []
              )
            }}
      - variables:
          arrival_enabled_adaptive_switches: >-
            {% set enabled = namespace(switches=[]) %}
            {% for adaptive_switch in arrival_adaptive_switches %}
              {% if is_state(adaptive_switch, 'on') %}
                {% set enabled.switches = enabled.switches + [adaptive_switch] %}
              {% endif %}
            {% endfor %}
            {{ enabled.switches }}
      - delay:
          seconds: 2
      - choose:
          - alias: "Apply globally when this arrival starts from an empty house"
            conditions:
              - condition: template
                value_template: "{{ arrival_home_was_empty and arrival_enabled_adaptive_switches | count > 0 }}"
            sequence:
              - action: adaptive_lighting.apply
                data:
                  entity_id: "{{ arrival_enabled_adaptive_switches }}"
                  adapt_brightness: true
                  adapt_color: true
                  turn_on_lights: false
                  transition: 1
        default:
          - repeat:
              for_each: "{{ arrival_enabled_adaptive_switches }}"
              sequence:
                - variables:
                    configured_arrival_lights: >-
                      {% set configuration = state_attr(repeat.item, 'configuration') or {} %}
                      {{ configuration.get('lights', []) }}
                    manual_controlled_lights: >-
                      {{ state_attr(repeat.item, 'manual_control') or [] }}
                    eligible_arrival_lights: >-
                      {{
                        configured_arrival_lights
                        | reject('in', manual_controlled_lights)
                        | list
                      }}
                - if:
                    - condition: template
                      value_template: "{{ eligible_arrival_lights | count > 0 }}"
                  then:
                    - action: adaptive_lighting.apply
                      data:
                        entity_id: "{{ repeat.item }}"
                        lights: "{{ eligible_arrival_lights }}"
                        adapt_brightness: true
                        adapt_color: true
                        turn_on_lights: false
                        transition: 1

  - id: nightly_adaptive_lighting_cycle_reset
    alias: nightly_adaptive_lighting_cycle_reset
    description: >
      Every 4 hours, cycle every main adaptive lighting switch off then back on
      to unstick color or brightness matching that has drifted. A startup trigger
      acts as a recovery path: if HA restarts during the 10-second off window the
      next boot immediately re-enables all switches so they are never stranded off.
      Control switches (sleep_mode, adapt_brightness, adapt_color) are excluded to
      preserve their settings.
    mode: single
    trigger:
      - trigger: time_pattern
        id: nightly-cycle
        hours: "/4"
      - trigger: homeassistant
        id: ha-start
        event: start
    variables:
      candidate_main_adaptive_switches:
        - switch.adaptive_lighting_basement
        - switch.adaptive_lighting_den
        - switch.adaptive_lighting_hallway
        - switch.adaptive_lighting_kitchen
        - switch.adaptive_lighting_office
        - switch.adaptive_lighting_owner_suite
        - switch.dining_room_adaptive_lighting_dining_room
        - switch.adaptive_control
      main_adaptive_switches: >-
        {% set ns = namespace(items=[]) %}
        {% for entity_id in candidate_main_adaptive_switches %}
          {% if states(entity_id) not in ['unknown', 'unavailable'] %}
            {% set ns.items = ns.items + [entity_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
    action:
      - if:
          - condition: trigger
            id: nightly-cycle
        then:
          - if:
              - condition: template
                value_template: "{{ main_adaptive_switches | count > 0 }}"
            then:
              - action: switch.turn_off
                target:
                  entity_id: "{{ main_adaptive_switches }}"
          - delay: "00:00:10"
      - if:
          - condition: template
            value_template: "{{ main_adaptive_switches | count > 0 }}"
        then:
          - action: switch.turn_on
            target:
              entity_id: "{{ main_adaptive_switches }}"

  - id: sync_selected_inovelli_led_bars_to_adaptive_lighting
    alias: sync_selected_inovelli_led_bars_to_adaptive_lighting
    description: >
      Keep the owner suite and office Inovelli LED bars aligned with Adaptive
      Lighting while still yielding to trip mode, sleep mode, and office guest
      privacy overrides. Startup sync waits for Adaptive Lighting baseline
      reconciliation so the shared script runs after room settings are
      restored. The shared script accepts room or rooms so additional rooms
      can opt in without duplicating the LED-bar mapping logic.
    mode: restart
    trigger:
      - trigger: event
        event_type: adaptive_lighting_startup_reconciled
      - trigger: state
        entity_id:
          - switch.sleep_mode
          - input_boolean.guest_mode
          - switch.adaptive_lighting_owner_suite
          - switch.adaptive_lighting_sleep_mode_owner_suite
      - trigger: time_pattern
        minutes: "/2"
    action:
      - action: script.turn_on
        target:
          entity_id: script.sync_inovelli_led_bars_to_adaptive_lighting
        data:
          variables:
            rooms:
              - owner suite
              - office

script:
  sync_inovelli_led_bars_to_adaptive_lighting:
    alias: sync_inovelli_led_bars_to_adaptive_lighting
    description: >
      Mirror Adaptive Lighting color temperature and brightness onto selected
      Inovelli LED bars. Rooms may provide a preferred Adaptive Lighting
      switch plus a fallback so guest-sensitive rooms can opt in gradually
      without breaking when a dedicated switch has not been created yet.
    icon: mdi:led-strip-variant
    mode: queued
    fields:
      room:
        description: Single room to sync.
        example: owner suite
      rooms:
        description: List of rooms to sync.
        example: "owner suite, office"
    variables:
      room_configs:
        owner_suite:
          preferred_adaptive_switch: switch.adaptive_lighting_owner_suite
          fallback_adaptive_switch: switch.adaptive_lighting_owner_suite
          led_color_on: number.owner_suite_fan_switch_ledcolorwhenon
          led_color_off: number.owner_suite_fan_switch_ledcolorwhenoff
          led_intensity_on: number.owner_suite_fan_switch_ledintensitywhenon
          led_intensity_off: number.owner_suite_fan_switch_ledintensitywhenoff
          guest_mode_blocks_sync: false
        office:
          preferred_adaptive_switch: switch.adaptive_lighting_office
          fallback_adaptive_switch: switch.adaptive_lighting_owner_suite
          led_color_on: number.office_fan_switch_ledcolorwhenon
          led_color_off: number.office_fan_switch_ledcolorwhenoff
          led_intensity_on: number.office_fan_switch_ledintensitywhenon
          led_intensity_off: number.office_fan_switch_ledintensitywhenoff
          guest_mode_blocks_sync: true
      requested_rooms: >-
        {% set raw_rooms = rooms if rooms is defined else room if room is defined else [] %}
        {% set items = raw_rooms.split(',') if raw_rooms is string else raw_rooms %}
        {% set ns = namespace(values=[]) %}
        {% for item in items %}
          {% set normalized = item | string | lower | replace('-', '_') | replace(' ', '_') %}
          {% if normalized == 'owner_suite_bedroom' %}
            {% set normalized = 'owner_suite' %}
          {% endif %}
          {% if normalized in room_configs and normalized not in ns.values %}
            {% set ns.values = ns.values + [normalized] %}
          {% endif %}
        {% endfor %}
        {{ ns.values }}
    sequence:
      - condition: state
        entity_id: input_boolean.trip
        state: "off"
      - condition: state
        entity_id: switch.sleep_mode
        state: "off"
      - repeat:
          for_each: "{{ requested_rooms }}"
          sequence:
            - variables:
                guest_mode_blocks_room: >-
                  {{
                    room_configs[repeat.item]['guest_mode_blocks_sync']
                    and is_state('input_boolean.guest_mode', 'on')
                  }}
                adaptive_lighting_entity: >-
                  {% set preferred = room_configs[repeat.item]['preferred_adaptive_switch'] %}
                  {% set fallback = room_configs[repeat.item]['fallback_adaptive_switch'] %}
                  {% if has_value(preferred) %}
                    {{ preferred }}
                  {% elif has_value(fallback) %}
                    {{ fallback }}
                  {% else %}
                    {{ '' }}
                  {% endif %}
                room_specific_sync_blocked: >-
                  {{
                    repeat.item == 'owner_suite'
                    and is_state('light.owner_suite_lamps', 'on')
                    and (now().hour >= 22 or now().hour < 6)
                  }}
            - if:
                - condition: template
                  value_template: >-
                    {{
                      not guest_mode_blocks_room
                      and not room_specific_sync_blocked
                      and adaptive_lighting_entity != ''
                    }}
              then:
                - variables:
                    adaptive_brightness_pct: >-
                      {{ state_attr(adaptive_lighting_entity, 'brightness_pct') | int(75) }}
                    adaptive_current_kelvin: >-
                      {{ state_attr(adaptive_lighting_entity, 'color_temp_kelvin') | int(3000) }}
                    adaptive_min_kelvin: >-
                      {{
                        (state_attr(adaptive_lighting_entity, 'configuration') or {})
                        .get('min_color_temp', 2000)
                        | int(2000)
                      }}
                    adaptive_max_kelvin: >-
                      {{
                        (state_attr(adaptive_lighting_entity, 'configuration') or {})
                        .get('max_color_temp', 5500)
                        | int(5500)
                      }}
                    adaptive_led_color: >-
                      {% set current_kelvin = adaptive_current_kelvin | int(3000) %}
                      {% set min_kelvin = adaptive_min_kelvin | int(2000) %}
                      {% set max_kelvin = adaptive_max_kelvin | int(5500) %}
                      {% set clamped_kelvin = [[current_kelvin, min_kelvin] | max, max_kelvin] | min %}
                      {% if max_kelvin <= min_kelvin %}
                        170
                      {% else %}
                        {{ (((clamped_kelvin - min_kelvin) / (max_kelvin - min_kelvin)) * 170) | round(0) | int }}
                      {% endif %}
                    adaptive_led_intensity_on: >-
                      {% set brightness_pct = adaptive_brightness_pct | int(75) %}
                      {{ [[brightness_pct, 1] | max, 100] | min }}
                - action: number.set_value
                  data:
                    entity_id: >-
                      {{ room_configs[repeat.item]['led_color_on'] }},
                      {{ room_configs[repeat.item]['led_color_off'] }}
                    value: "{{ adaptive_led_color }}"
                - action: number.set_value
                  data:
                    entity_id: "{{ room_configs[repeat.item]['led_intensity_on'] }}"
                    value: "{{ adaptive_led_intensity_on }}"
                - action: number.set_value
                  data:
                    entity_id: "{{ room_configs[repeat.item]['led_intensity_off'] }}"
                    value: 1

switch:
  - platform: group
    name: Adaptive Control
    entities:
      - switch.adaptive_lighting_basement
      - switch.adaptive_lighting_den
      - switch.adaptive_lighting_hallway
      - switch.adaptive_lighting_kitchen
      - switch.adaptive_lighting_owner_suite
      - switch.adaptive_lighting_owner_suite_vanity
      - switch.adaptive_lighting_laundry_room
      - switch.dining_room_adaptive_lighting_dining_room
