# Home Assistant package for cleaning appliances and housekeeping state.
# It infers washer, dryer, dishwasher, and vacuum-related status from sensors so chores can drive reminders and dashboard indicators.

################################################################
## Packages / Cleaning
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "cleaning"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Alarm Panels
    ################################################

    ################################################
    ## Automations
    ################################################

    ################################################
    ## Binary Sensors
    ################################################
    binary_sensor.dishwasher:
      <<: *customize
      icon: mdi:dishwasher
      device_class: vibration
      friendly_name: "Dishwasher Vibration"

    binary_sensor.dishwasher_running:
      <<: *customize
      icon: mdi:dishwasher
      device_class: vibration
      friendly_name: "Dishwasher Running"

    binary_sensor.dryer_running:
      <<: *customize
      icon: mdi:tumble-dryer
      device_class: vibration
      friendly_name: "Dryer Running"

    binary_sensor.washer:
      <<: *customize
      icon: mdi:washing-machine
      device_class: vibration
      friendly_name: "Washer Vibration"

    binary_sensor.laundry_room_washing_machine_door_contact:
      <<: *customize
      icon: mdi:washing-machine
      device_class: door
      friendly_name: "Washer Door"

    binary_sensor.washing_machine_running:
      <<: *customize
      icon: mdi:washing-machine
      device_class: vibration
      friendly_name: "Washer Running"

    ################################################
    ## Cameras
    ################################################

    ################################################
    ## Device Trackers
    ################################################

    ################################################
    ## Frontend
    ################################################

    ################################################
    ## Groups
    ################################################

    ################################################
    ## Input Boolean
    ################################################

    ################################################
    ## Input Numbers
    ################################################

    ################################################
    ## Input Select
    ################################################

    ################################################
    ## iOS
    ################################################

    ################################################
    ## Light
    ################################################

    ################################################
    ## Media Player
    ################################################

    ################################################
    ## Plant
    ################################################

    ################################################
    ## Scripts
    ################################################

    ################################################
    ## Sensors
    ################################################
    sensor.dishwasher:
      <<: *customize
      icon: mdi:dishwasher
      friendly_name: "Dishwasher Vibration"

    sensor.washer:
      <<: *customize
      icon: mdi:washer
      friendly_name: "Washer Vibration"

    input_select.washer_state:
      <<: *customize
      icon: mdi:washer
      friendly_name: "Washing Machine"

    ################################################
    ## Thermostats
    ################################################

    ################################################
    ## Zone
    ################################################

########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - id: washer_started
    alias: washer_started
    description: Mark the washer as actively running.
    trigger:
      - trigger: state
        entity_id: binary_sensor.washing_machine_running
        to: "on"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.washer_state
        data:
          option: CLEANING

  - id: wash_finished
    alias: wash_finished
    description: Notify when washer power drops back to standby long enough to count as a completed cycle.
    trigger:
      - trigger: state
        entity_id: binary_sensor.washing_machine_running
        from: "on"
        to: "off"
    action:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.washer_finished_at
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.washer_state
        data:
          option: CLEAN
      - action: notify.all
        data:
          message: "Washing machine finished! \U0001F9FA"

  - id: dryer_finished
    alias: dryer_finished
    description: Notify when dryer power drops back to standby long enough to count as a completed cycle.
    trigger:
      - trigger: state
        entity_id: binary_sensor.dryer_running
        from: "on"
        to: "off"
    action:
      - action: notify.all
        data:
          message: "Dryer finished! \U0001F9FA"

  - id: washer_reminder
    alias: washer_reminder
    description: Escalate a finished load to MUSTY when wet clothes stay in the closed washer for 24 hours after the cycle completes.
    trigger:
      - trigger: time_pattern
        minutes: "/10"
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_select.washer_state
        state: "CLEAN"
      - condition: state
        entity_id: binary_sensor.washing_machine_running
        state: "off"
      - condition: state
        entity_id: binary_sensor.laundry_room_washing_machine_door_contact
        state: "off"
      - condition: template
        value_template: >-
          {% set finished = states('input_datetime.washer_finished_at') %}
          {{ finished not in ['unknown', 'unavailable', 'none', '']
             and as_timestamp(now()) - as_timestamp(finished) >= 24 * 60 * 60 }}
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.washer_state
        data:
          option: MUSTY
      - action: notify.all
        data:
          message: "Wet clothes have been sitting in the washer too long and likely need a rewash. \U0001F9FA"

  - id: washer_cleared
    alias: washer_cleared
    description: Reset the washer back to IDLE once the door opens and the finished load is being handled.
    trigger:
      - trigger: state
        entity_id: binary_sensor.laundry_room_washing_machine_door_contact
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.washing_machine_running
        state: "off"
      - condition: or
        conditions:
          - condition: state
            entity_id: input_select.washer_state
            state: "CLEAN"
          - condition: state
            entity_id: input_select.washer_state
            state: "MUSTY"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.washer_state
        data:
          option: IDLE

########################
# Binary Sensors
########################
binary_sensor: []

########################
# Cameras
########################
camera: []

########################
# Device Trackers
########################
device_tracker: []

########################
# Frontend
########################
frontend: {}

########################
# Groups
########################
group: {}

########################
# Input Booleans
########################
input_boolean: {}

########################
# Input Datetime
########################
input_datetime:
  washer_finished_at:
    name: Washer Finished At
    has_date: true
    has_time: true

########################
# Input Numbers
########################
input_number: {}

########################
# Input Select
########################
input_select:
  washer_state:
    name: Washer State
    options:
      - IDLE
      - CLEANING
      - CLEAN
      - MUSTY
    icon: mdi:washing-machine
########################
# iOS
########################
ios: {}

########################
# Light
########################
light: []

########################
# Media Player
########################
media_player: []

########################
# Plant
########################
plant: {}

########################
# Scenes
########################
scene: []

########################
# Scripts
########################
script: {}

########################
# Sensor
########################
sensor: []

########################
# Switch
########################
switch: []

########################
# Template
########################
template:
  - binary_sensor:
      - delay_off: 0:10:00
        delay_on: 0:05:00
        default_entity_id: binary_sensor.dishwasher_running
        unique_id: dishwasher_running
        state: "{{ is_state('binary_sensor.dishwasher', 'on') }}"
        name: dishwasher_running
      # Dryers bounce around their heater cycles, so only stop after a short
      # sustained return to standby.
      - delay_off: 0:03:00
        delay_on: 0:02:00
        default_entity_id: binary_sensor.dryer_running
        unique_id: dryer_running
        availability: "{{ has_value('sensor.laundry_room_dryer_power') }}"
        state: "{{ states('sensor.laundry_room_dryer_power') | float(0) > 75 }}"
        name: dryer_running
      # Washers often have multi-minute pauses between phases, so keep the
      # cycle marked active until power stays near standby for a while.
      - delay_off: 0:08:00
        delay_on: 0:01:00
        default_entity_id: binary_sensor.washing_machine_running
        unique_id: washing_machine_running
        availability: "{{ has_value('sensor.laundry_room_washing_machine_power') }}"
        state: >-
          {{ states('sensor.laundry_room_washing_machine_power') | float(0) > 8 }}
        name: washing_machine_running
  - trigger:
      - trigger: state
        entity_id:
          - vacuum.valetudo_upstairs_vacuum
          - vacuum.valetudo_mainlevel
          - vacuum.valetudo_den
        to: "cleaning"
    sensor:
      - name: "Vacuum last ran"
        unique_id: vacuum_last_ran
        device_class: timestamp
        state: >-
          {{ now().isoformat() }}

########################
# Zone
########################
zone: {}
