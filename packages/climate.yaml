# Home Assistant package for HVAC control and environmental guardrails.
# Complex areas: it mixes thermostat control, open-window protection, and weather-derived pressure sensors that are reused by other packages.

################################################################
## Packages / Climate
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "climate"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################
    automation.turn_off_nest_when_windows_open:
      <<: *customize
      friendly_name: "Turn Off Nest When Egress Open"
      icon: mdi:window-open

    automation.turn_on_nest_when_windows_closed:
      <<: *customize
      friendly_name: "Turn On Nest When All Egresses Close"
      icon: mdi:window-closed

    automation.window_climate_action_handler:
      <<: *customize
      friendly_name: "Window Climate Action Handler"
      icon: mdi:thermostat-auto

    automation.window_climate_open_prompt:
      <<: *customize
      friendly_name: "Window Climate Pause Prompt"
      icon: mdi:window-open-variant

    automation.window_climate_resume_prompt:
      <<: *customize
      friendly_name: "Window Climate Resume Prompt"
      icon: mdi:window-closed-variant

    ################################################
    ## Binary Sensors
    ################################################
    binary_sensor.any_window_open:
      <<: *customize
      friendly_name: "Any window open"
      device_class: window

    binary_sensor.fresh_air_open:
      <<: *customize
      friendly_name: "Window open"
      device_class: window

    binary_sensor.ecobee_home:
      <<: *customize
      friendly_name: "Ecobee Home/Away/Sleep Mode"
      device_class: presence

    binary_sensor.pressure_falling:
      <<: *customize
      friendly_name: "Pressure Falling"
      device_class: pressure

    binary_sensor.pressure_falling_quickly:
      <<: *customize
      friendly_name: "Pressure Falling Quickly"
      device_class: pressure

    binary_sensor.pressure_falling_slowly:
      <<: *customize
      friendly_name: "Pressure Falling Slowly"
      device_class: pressure

    binary_sensor.pressure_falling_v_rapidly:
      <<: *customize
      friendly_name: "Pressure Falling Very Rapidly"
      device_class: pressure

    binary_sensor.pressure_rising:
      <<: *customize
      friendly_name: "Pressure Rising"
      device_class: pressure

    binary_sensor.pressure_rising_quickly:
      <<: *customize
      friendly_name: "Pressure Rising Quickly"
      device_class: pressure

    binary_sensor.pressure_rising_slowly:
      <<: *customize
      friendly_name: "Pressure Rising Slowly"
      device_class: pressure

    binary_sensor.pressure_rising_v_rapidly:
      <<: *customize
      friendly_name: "Pressure Rising Very Rapidly"
      device_class: pressure
    ################################################
    ## Groups
    ################################################
    group.vacation_climate:
      <<: *customize
      friendly_name: "Overall Climate"

    ################################################
    ## Input Boolean
    ################################################
    input_boolean.window_climate_paused_by_windows:
      <<: *customize
      friendly_name: "Climate paused by windows"
      icon: mdi:air-conditioner

    input_boolean.window_open_followup_2h:
      <<: *customize
      friendly_name: "Remind to pause climate after 2h"
      icon: mdi:timer-outline

    input_boolean.window_resume_followup_4h:
      <<: *customize
      friendly_name: "Remind to resume climate after 4h"
      icon: mdi:timer

    ################################################
    ## Input Text
    ################################################
    input_text.any_window_open_exclude_entities:
      <<: *customize
      friendly_name: "Window open exclusions"
      icon: mdi:filter-variant

    input_text.window_climate_restore_preset_mode:
      <<: *customize
      friendly_name: "Window climate restore preset"
      icon: mdi:thermostat-box

    ################################################
    ## Input Numbers
    ################################################

    ################################################
    ## Scripts
    ################################################

    ################################################
    ## Sensors
    ################################################
    sensor.basement_humidity:
      <<: *customize
      device_class: humidity

    sensor.garage_humidity:
      <<: *customize
      device_class: humidity

    sensor.hallway_thermostat_glycol_humidity:
      <<: *customize
      device_class: humidity

    sensor.average_house_temp:
      <<: *customize
      friendly_name: "Average House Temperature"
      device_class: temperature
      icon: mdi:thermometer

    sensor.average_house_humidity:
      <<: *customize
      friendly_name: "Average House Humidity"
      device_class: humidity
      icon: mdi:water-percent

    sensor.average_house_pressure:
      <<: *customize
      friendly_name: "Average House Pressure"
      device_class: pressure
      icon: mdi:gauge

    sensor.any_window_open_today_duration:
      <<: *customize
      friendly_name: "Window open today duration"
      icon: mdi:timer-outline

    ################################################
    ## Thermostats
    ################################################
    thermostat.hallwayglycol:
      <<: *customize
      friendly_name: "Nest Thermostat"
      icon: mdi:air-conditioner

################################################
## Automation
################################################
automation:
  - id: buy_more_air_filters
    alias: buy_more_air_filters
    trigger:
      - trigger: state
        entity_id: sensor.zeke_place
        attribute: place_name
        to:
          - "Home Depot"
          - "The Home Depot"
          - "Menards"
          - "Lowe's"
          - "Fleet Farm"
    condition:
      - alias: "Air Filter Inventory Low"
        condition: numeric_state
        entity_id: input_number.air_filters_at_home
        below: 1
    action:
      - action: notify.mobile_app_wethop
        data:
          title: "Buy Air Filters"
          message: >-
            "You only have {{states("input_number.air_filters_at_home")| int}} 16x25x1 air filters at home. How many did you buy?"
          data:
            actions:
              - action: "BOUGHT_AIR_FILTERS"
                title: "Purchased air filters"
                activationMode: background
                authenticationRequired: false
                destructive: false
                behavior: textInput
                textInputButtonTitle: Number of filters
                textInputPlaceholder: 2
                icon: sfsymbols:bag.badge.questionmark

  - id: air_filters_purchased
    alias: air_filters_purchased
    trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: BOUGHT_AIR_FILTERS
    condition: []
    action:
      - alias: Increase Number of air filters in inventory
        action: input_number.set_value
        entity_id: input_number.air_filters_at_home
        data:
          value: >-
            {{(states("input_number.air_filters_at_home")|int) + (trigger.event.data.reply_text | int)}}

    # TODO - make this work for all three bathrooms with showers
  - id: toggle_bathroom_fan_when_showering
    alias: toggle_bathroom_fan_when_showering
    mode: parallel
    trigger:
      - id: bathroom-humidity-high
        trigger: state
        entity_id: binary_sensor.bathroom_humidity_high
        to: "on"
        for:
          seconds: 20
      - id: basement-bathroom-humidity-high
        trigger: state
        entity_id: binary_sensor.basement_bathroom_humidity_high
        to: "on"
        for:
          seconds: 20
      - id: guest-bathroom-humidity-high
        trigger: state
        entity_id: binary_sensor.guest_bathroom_humidity_high
        to: "on"
        for:
          seconds: 20
      - id: bathroom-humidity-normal
        trigger: state
        entity_id: binary_sensor.bathroom_humidity_high
        to: "off"
        for:
          minutes: 10
      - id: basement-bathroom-humidity-normal
        trigger: state
        entity_id: binary_sensor.basement_bathroom_humidity_high
        to: "off"
        for:
          minutes: 10
      - id: guest-bathroom-humidity-normal
        trigger: state
        entity_id: binary_sensor.guest_bathroom_humidity_high
        to: "off"
        for:
          minutes: 10
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: bathroom-humidity-high
            sequence:
              - action: fan.turn_on
                data:
                  entity_id: fan.owner_suite_bathroom_exhaust
          - conditions:
              - condition: trigger
                id: bathroom-humidity-normal
            sequence:
              - action: fan.turn_off
                data:
                  entity_id: fan.owner_suite_bathroom_exhaust
          # basement bathroom
          - conditions:
              - condition: trigger
                id: basement-bathroom-humidity-high
            sequence:
              - action: fan.turn_on
                data:
                  entity_id: fan.basement_bathroom_exhaust
          - conditions:
              - condition: trigger
                id: basement-bathroom-humidity-normal
            sequence:
              - action: fan.turn_off
                data:
                  entity_id: fan.basement_bathroom_exhaust
          # guest bathroom
          - conditions:
              - condition: trigger
                id: guest-bathroom-humidity-high
            sequence:
              - action: fan.turn_on
                data:
                  entity_id: fan.guest_bathroom_exhaust
          - conditions:
              - condition: trigger
                id: guest-bathroom-humidity-normal
            sequence:
              - action: fan.turn_off
                data:
                  entity_id: fan.guest_bathroom_exhaust

  - id: window_climate_action_handler
    alias: window_climate_action_handler
    mode: queued
    trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: WINDOW_CLIMATE_PAUSE
        id: pause
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: WINDOW_CLIMATE_IGNORE
        id: ignore_open
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: WINDOW_CLIMATE_RESUME
        id: resume
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: WINDOW_CLIMATE_KEEP_PAUSED
        id: keep_paused
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: pause
              - condition: state
                entity_id: binary_sensor.ecobee_home
                state: "on"
            sequence:
              - action: input_text.set_value
                data:
                  entity_id: input_text.window_climate_restore_preset_mode
                  value: "{{ state_attr('climate.my_ecobee', 'preset_mode') | default('', true) }}"
              - action: input_boolean.turn_on
                data:
                  entity_id: input_boolean.window_climate_paused_by_windows
              - action: climate.set_preset_mode
                data:
                  entity_id: climate.my_ecobee
                  preset_mode: away_indefinitely
          - conditions:
              - condition: trigger
                id: resume
              - condition: state
                entity_id: input_boolean.window_climate_paused_by_windows
                state: "on"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >-
                          {% set preset = states('input_text.window_climate_restore_preset_mode') | lower %}
                          {{ preset in ['unknown', 'unavailable', 'none', ''] }}
                    sequence:
                      - action: ecobee.resume_program
                        data:
                          entity_id: climate.my_ecobee
                          resume_all: true
                  - conditions:
                      - condition: template
                        value_template: >-
                          {{ states('input_text.window_climate_restore_preset_mode') | length > 0 }}
                    sequence:
                      - action: climate.set_preset_mode
                        data:
                          entity_id: climate.my_ecobee
                          preset_mode: "{{ states('input_text.window_climate_restore_preset_mode') }}"
              - action: input_boolean.turn_off
                data:
                  entity_id: input_boolean.window_climate_paused_by_windows
              - action: input_text.set_value
                data:
                  entity_id: input_text.window_climate_restore_preset_mode
                  value: ""
      - action: notify.mobile_app_wethop
        data:
          message: clear_notification
          data:
            tag: window-climate-open
      - action: notify.mobile_app_wethop
        data:
          message: clear_notification
          data:
            tag: window-climate-resume

  - id: window_climate_open_prompt
    alias: window_climate_open_prompt
    mode: single
    trigger:
      - id: initial
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "on"
        for:
          minutes: 5
      - id: followup
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "on"
        for:
          hours: 2
    condition:
      - condition: state
        entity_id: binary_sensor.bayesian_zeke_home
        state: "on"
      - condition: state
        entity_id: input_boolean.trip
        state: "off"
      - condition: state
        entity_id: binary_sensor.any_window_open
        state: "on"
      - condition: state
        entity_id: binary_sensor.ecobee_home
        state: "on"
      - condition: state
        entity_id: input_boolean.window_climate_paused_by_windows
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: initial
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Windows open"
                  message: "A window has been open for 5 minutes. Pause the climate?"
                  data:
                    tag: window-climate-open
                    persistent: true
                    actions:
                      - action: WINDOW_CLIMATE_PAUSE
                        title: Pause climate
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: WINDOW_CLIMATE_IGNORE
                        title: Ignore
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
          - conditions:
              - condition: trigger
                id: followup
              - condition: state
                entity_id: input_boolean.window_open_followup_2h
                state: "on"
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Windows still open"
                  message: "A window is still open after 2 hours. Pause the climate?"
                  data:
                    tag: window-climate-open
                    persistent: true
                    actions:
                      - action: WINDOW_CLIMATE_PAUSE
                        title: Pause climate
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: WINDOW_CLIMATE_IGNORE
                        title: Ignore
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default

  - id: window_climate_resume_prompt
    alias: window_climate_resume_prompt
    mode: single
    trigger:
      - id: initial
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "off"
        for:
          minutes: 60
      - id: followup
        trigger: state
        entity_id: binary_sensor.any_window_open
        to: "off"
        for:
          hours: 4
    condition:
      - condition: state
        entity_id: binary_sensor.bayesian_zeke_home
        state: "on"
      - condition: state
        entity_id: input_boolean.trip
        state: "off"
      - condition: state
        entity_id: binary_sensor.any_window_open
        state: "off"
      - condition: state
        entity_id: input_boolean.window_climate_paused_by_windows
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: initial
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Windows closed"
                  message: "All windows have been closed for 1 hour. Resume the climate?"
                  data:
                    tag: window-climate-resume
                    persistent: true
                    actions:
                      - action: WINDOW_CLIMATE_RESUME
                        title: Resume climate
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: WINDOW_CLIMATE_KEEP_PAUSED
                        title: Keep paused
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
          - conditions:
              - condition: trigger
                id: followup
              - condition: state
                entity_id: input_boolean.window_resume_followup_4h
                state: "on"
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Windows still closed"
                  message: "Windows have been closed for 4 hours. Resume the climate?"
                  data:
                    tag: window-climate-resume
                    persistent: true
                    actions:
                      - action: WINDOW_CLIMATE_RESUME
                        title: Resume climate
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: WINDOW_CLIMATE_KEEP_PAUSED
                        title: Keep paused
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default

