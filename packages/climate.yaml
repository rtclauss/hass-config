################################################
## Templates
################################################
template:
  - binary_sensor:
      - default_entity_id: binary_sensor.bathroom_humidity_high
        unique_id: bathroom_humidity_high
        state: >-
          {% if (states('sensor.owner_suite_bathroom_tph_humidity')|float(default=0)) > (states('sensor.average_house_humidity')|float(default=0) + 10) %}
            True
          {% else %}
            False
          {% endif %}
        name: bathroom_humidity_high
      - default_entity_id: binary_sensor.basement_bathroom_humidity_high
        unique_id: basement_bathroom_humidity_high
        state: >-
          {% if(states('sensor.basement_bathroom_tph_humidity')|float(default=0))> (states('sensor.average_house_humidity')|float(default=0) + 10) %}
            True
          {% else %}
            False
          {% endif %}
        name: basement_bathroom_humidity_high
      - default_entity_id: binary_sensor.guest_bathroom_humidity_high
        unique_id: guest_bathroom_humidity_high
        state: >-
          {% if(states('sensor.guest_bathroom_tph_humidity')|float(default=0))> (states('sensor.average_house_humidity')|float(default=0) + 10) %}
            True
          {% else %}
            False
          {% endif %}
        name: guest_bathroom_humidity_high
      - device_class: heat
        default_entity_id: binary_sensor.ecobee_aux
        unique_id: ecobee_aux
        state: >-
          {% if 'aux' in state_attr('climate.my_ecobee', 'equipment_running') %}
            True
          {% else %}
            False
          {% endif %}
        name: ecobee_aux
      - device_class: presence
        default_entity_id: binary_sensor.ecobee_home
        unique_id: ecobee_home
        state: >-
          {% if is_state_attr('climate.my_ecobee', 'preset_mode', 'away_indefinitely') or is_state_attr('climate.my_ecobee', 'preset_mode', 'Away') %}
            False
          {% else %}
            True
          {% endif %}
        name: ecobee_home
      - device_class: window
        default_entity_id: binary_sensor.any_window_open
        unique_id: any_window_open
        state: >-
          {% set excluded = states('input_text.any_window_open_exclude_entities').replace('\n', ',').split(',') | map('trim') | reject('equalto', '') | list %}
          {% set matches = namespace(count=0) %}
          {% for sensor in states.binary_sensor %}
            {% set entity_id = sensor.entity_id %}
            {% if entity_id not in ['binary_sensor.any_window_open', 'binary_sensor.fresh_air_open'] %}
              {% set device_class = sensor.attributes.device_class | default('', true) | lower %}
              {% set did = device_id(entity_id) %}
              {% set model = '' %}
              {% if did is not none and did != '' %}
                {% set model = device_attr(did, 'model') | default('', true) | lower %}
              {% endif %}
              {% if sensor.state == 'on' and device_class in ['opening', 'window'] and 'parasoll' in model and entity_id not in excluded %}
                {% set matches.count = matches.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ matches.count > 0 }}
        name: any_window_open
      - device_class: window
        default_entity_id: binary_sensor.fresh_air_open
        unique_id: fresh_air_open
        state: >-
          {% set excluded = states('input_text.any_window_open_exclude_entities').replace('\n', ',').split(',') | map('trim') | reject('equalto', '') | list %}
          {% set matches = namespace(count=0) %}
          {% for sensor in states.binary_sensor %}
            {% set entity_id = sensor.entity_id %}
            {% if entity_id not in ['binary_sensor.any_window_open', 'binary_sensor.fresh_air_open'] %}
              {% set device_class = sensor.attributes.device_class | default('', true) | lower %}
              {% set did = device_id(entity_id) %}
              {% set model = '' %}
              {% if did is not none and did != '' %}
                {% set model = device_attr(did, 'model') | default('', true) | lower %}
              {% endif %}
              {% if sensor.state == 'on' and device_class in ['opening', 'window'] and 'parasoll' in model and entity_id not in excluded %}
                {% set matches.count = matches.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ matches.count > 0 }}
        name: fresh_air_open
  - sensor:
      - name: HVAC Activity
        unique_id: hvac_activity
        state: "{{ state_attr('climate.my_ecobee', 'hvac_action') }}"
      - device_class: temperature
        unit_of_measurement: °F
        default_entity_id: sensor.ecobee_temperature
        unique_id: ecobee_temperature
        availability: '{{ states("climate.my_ecobee") != None }}'
        state: "{{ state_attr('climate.my_ecobee', 'current_temperature') }}"
        name: ecobee_temperature
      - unit_of_measurement: °F/5 minute
        default_entity_id: sensor.rate_of_house_temp_change_5m
        unique_id: rate_of_house_temp_change_5m
        availability: >-
          {{ states("sensor.rate_of_house_temp_change_5m", "change_rate") != None }}
        state: >-
          {{ state_attr('sensor.house_temperature_stats_5m', 'change_rate')  |float(default=0)}}
        name: rate_of_house_temp_change_5m
      - unit_of_measurement: °F/5 minute
        default_entity_id: sensor.rate_of_house_temp_change_10m
        unique_id: rate_of_house_temp_change_10m
        availability: >-
          {{ states("sensor.rate_of_house_temp_change_10m", "change_rate") != None }}
        state: >-
          {{ state_attr('sensor.house_temperature_stats_10m', 'change_rate')|float(default=0) * 60.0 * 5.0 |float(default=0)}}
        name: rate_of_house_temp_change_10m
      - unit_of_measurement: °F/5 minute
        default_entity_id: sensor.rate_of_house_temp_change_1h
        unique_id: rate_of_house_temp_change_1h
        availability: >-
          {{ states("sensor.house_temperature_stats_1h", "change_rate") != None }}
        state: >-
          {{ state_attr('sensor.house_temperature_stats_1h', 'change_rate') * 60.0 * 5.0 |float(default=0)}}
        name: rate_of_house_temp_change_1h
      - unit_of_measurement: °F/5 minute
        default_entity_id: sensor.rate_of_house_temp_change_30m
        unique_id: rate_of_house_temp_change_30m
        availability: >-
          {{ states("sensor.house_temperature_stats_30m", "change_rate") != None }}
        state: >-
          {{ state_attr('sensor.house_temperature_stats_30m', 'change_rate') * 60.0 * 5.0 |float(default=0)}}
        name: rate_of_house_temp_change_30m
      - device_class: temperature
        unit_of_measurement: °F
        default_entity_id: sensor.ecobee_active_target_temperature
        unique_id: ecobee_active_target_temperature
        availability: "{{ states('climate.my_ecobee') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set action = states('sensor.hvac_activity') %}
          {% if action == 'heating' %}
            {% set target = state_attr('climate.my_ecobee', 'target_temp_low') %}
            {% if target is none %}
              {% set target = state_attr('climate.my_ecobee', 'temperature') %}
            {% endif %}
            {{ target if target is not none else state_attr('climate.my_ecobee', 'temperature') }}
          {% elif action == 'cooling' %}
            {% set target = state_attr('climate.my_ecobee', 'target_temp_high') %}
            {% if target is none %}
              {% set target = state_attr('climate.my_ecobee', 'temperature') %}
            {% endif %}
            {{ target if target is not none else state_attr('climate.my_ecobee', 'temperature') }}
          {% else %}
            {{ state_attr('climate.my_ecobee', 'temperature') }}
          {% endif %}
        name: ecobee_active_target_temperature
      - unit_of_measurement: °F/min
        default_entity_id: sensor.ecobee_modeled_rate_deg_per_min
        unique_id: ecobee_modeled_rate_deg_per_min
        availability: >-
          {{ has_value('sensor.outside_temperature') and has_value('sensor.rate_of_house_temp_change_10m') and states('sensor.hvac_activity') in ['heating', 'cooling'] }}
        state: >-
          {% set action = states('sensor.hvac_activity') %}
          {% set t_out = states('sensor.outside_temperature') | float(default=0) %}
          {% set recent_rate = (states('sensor.rate_of_house_temp_change_10m') | float(default=0)) / 5 %}

          {% if action == 'heating' %}
            {% if is_state('binary_sensor.ecobee_aux', 'on') %}
              {% set hist_rate = 0.011628 %}
            {% else %}
              {% set hist_rate = 0.0015 + (0.00026 * t_out) %}
              {% if hist_rate < 0.004 %}
                {% set hist_rate = 0.004 %}
              {% elif hist_rate > 0.014 %}
                {% set hist_rate = 0.014 %}
              {% endif %}
            {% endif %}
            {% if recent_rate > 0.002 %}
              {{ ((hist_rate * 0.6) + (recent_rate * 0.4)) | round(6) }}
            {% else %}
              {{ hist_rate | round(6) }}
            {% endif %}
          {% elif action == 'cooling' %}
            {% set hist_rate = -0.028 + (0.00023 * t_out) %}
            {% if hist_rate > -0.008 %}
              {% set hist_rate = -0.008 %}
            {% elif hist_rate < -0.016 %}
              {% set hist_rate = -0.016 %}
            {% endif %}
            {% if recent_rate < -0.002 %}
              {{ ((hist_rate * 0.6) + (recent_rate * 0.4)) | round(6) }}
            {% else %}
              {{ hist_rate | round(6) }}
            {% endif %}
          {% else %}
            {{ none }}
          {% endif %}
        attributes:
          model_version: db_cycle_p50_2026_02_16
          historical_source_table: public.thermostat
          historical_outside_sensor: sensor.outside_temperature
          historical_inside_sensor: sensor.average_house_temp
        name: ecobee_modeled_rate_deg_per_min
      - unit_of_measurement: min
        icon: mdi:timer-sand
        default_entity_id: sensor.ecobee_time_to_target_minutes
        availability: >-
          {{ has_value('sensor.average_house_temp') and has_value('sensor.ecobee_active_target_temperature') and has_value('sensor.ecobee_modeled_rate_deg_per_min') and states('sensor.hvac_activity') in ['heating', 'cooling'] }}
        state: >-
          {% set action = states('sensor.hvac_activity') %}
          {% set current_temp = states('sensor.average_house_temp') | float(default=0) %}
          {% set target_temp = states('sensor.ecobee_active_target_temperature') | float(default=0) %}
          {% set rate = states('sensor.ecobee_modeled_rate_deg_per_min') | float(default=0) %}

          {% if action == 'heating' and target_temp > current_temp and rate > 0 %}
            {% set minutes = (target_temp - current_temp) / rate %}
            {{ [([minutes, 0] | max), 480] | min | round(0) }}
          {% elif action == 'cooling' and target_temp < current_temp and rate < 0 %}
            {% set minutes = (target_temp - current_temp) / rate %}
            {{ [([minutes, 0] | max), 480] | min | round(0) }}
          {% else %}
            {{ 0 }}
          {% endif %}
        attributes:
          model_version: db_cycle_p50_2026_02_16
          current_temperature: "{{ states('sensor.average_house_temp') }}"
          target_temperature: "{{ states('sensor.ecobee_active_target_temperature') }}"
          hvac_action: "{{ states('sensor.hvac_activity') }}"
          modeled_rate_deg_per_min: "{{ states('sensor.ecobee_modeled_rate_deg_per_min') }}"
        name: ecobee_time_to_target_minutes
