        state: "{{ now().month == 5 and now().day == 4 }}"

      - name: minnesota_fishing_opener
        unique_id: minnesota_fishing_opener
        state: >-
          {% set memorial_day = strptime(now().year ~ '-05-31', '%Y-%m-%d').date() - timedelta(days=strptime(now().year ~ '-05-31', '%Y-%m-%d').date().weekday()) %}
          {% set opener = memorial_day - timedelta(days=16) %}
          {{ now().date() == opener }}

      - name: minnesota_statehood_day
        unique_id: minnesota_statehood_day
        state: "{{ now().month == 5 and now().day == 11 }}"

      - name: memorial_day
        unique_id: memorial_day
        state: "{{ now().month == 5 and now().weekday() == 0 and (now().date() + timedelta(days=7)).month != 5 }}"

      - name: juneteenth
        unique_id: juneteenth
        state: "{{ now().month == 6 and now().day == 19 }}"

      - name: independence_day
        unique_id: independence_day
        state: "{{ now().month == 7 and now().day == 4 }}"

      - name: labor_day
