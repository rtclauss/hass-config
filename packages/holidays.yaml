# Home Assistant package for holiday and seasonal scenes.
# It manages when seasonal lights, tabs, and reset scenes appear so holiday behavior can be enabled without touching everyday automations.

################################################################
## Packages / Holidays
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "holidays"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################

    automation.christmas_tree_on:
      <<: *customize
      friendly_name: "Turn on Christmas Tree"

    automation.christmas_tree_off_midnight:
      <<: *customize
      friendly_name: "Turn off Christmas Tree"

    automation.christmas_lights_off_bedroom_off:
      <<: *customize
      friendly_name: "Turn off Christmas Tree if bedroom lights turned off"

    automation.toggle_christmas_automations_on_season_change:
      <<: *customize
      friendly_name: "Display Christmas tab"

    automation.toggle_christmas_tab:
      <<: *customize
      friendly_name: "Display Christmas tab"

    automation.reset_after_holiday:
      <<: *customize
      friendly_name: "Reset lights after holiday"

    automation.st_andrews_day_light_loop:
      <<: *customize
      friendly_name: "St Andrews Day lights"

    automation.halloween_light_loop:
      <<: *customize
      friendly_name: "Halloween lights"

    binary_sensor.christmas_season:
      <<: *customize
      friendly_name: "Christmas Season"
      icon: mdi:calendar

    binary_sensor.st_andrews_day:
      <<: *customize
      friendly_name: "St Andrews Day"
      icon: mdi:calendar

    binary_sensor.halloween:
      <<: *customize
      friendly_name: "Halloween"
      icon: mdi:calendar

    ################################################
    ## Groups
    ################################################

    group.christmas_lights:
      <<: *customize
      friendly_name: "Christmas Sensors"

    group.christmas_automations:
      <<: *customize
      friendly_name: "Christmas Automations"

    ################################################
    ## Scripts
    ################################################

    script.toggle_christmas_automation_during_christmas_season:
      <<: *customize
      friendly_name: "Toggle Christmas Automation Based on Boolean Sensor"

    switch.christmas_tree:
      <<: *customize
      friendly_name: "Christmas Tree"
      icon: mdi:pine-tree

########################
# Automations
########################
automation:
  - id: christmas_tree_on
    alias: christmas_tree_on
    initial_state: false
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:45:00
    action:
      - action: switch.turn_on
        target:
          entity_id: switch.christmas_tree
      - action: light.turn_on
        target:
          entity_id: light.christmas_lights
      - action: notify.all
        data:
          message: Turning on Christmas Tree.

  - id: christmas_tree_off_midnight
    alias: christmas_tree_off_midnight
    initial_state: false
    trigger:
      - trigger: time
        at: 00:00:00
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.christmas_tree
      - action: light.turn_off
        target:
          entity_id: light.christmas_lights
      - action: notify.all
        data:
          message: Turning off Christmas Tree.

  - id: christmas_lights_off_bedroom_off
    alias: christmas_lights_off_bedroom_off
    initial_state: false
    trigger:
      - trigger: state
        entity_id: light.bedroom_lamp, light.bedroom_lamp_2
        to: "off"
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.christmas_tree
      - action: light.turn_off
        target:
          entity_id: light.christmas_lights

  - id: christmas_outside_light_loop_1
    alias: christmas_outside_light_loop_1
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:45:00
      - trigger: time_pattern
        minutes: "/1"
    condition:
      - alias: "Christmas-time"
        condition: state
        entity_id: binary_sensor.christmas_season
        state: "on"
      - condition: or
        conditions:
          - alias: "Sunset"
            condition: sun
            after: sunset
            after_offset: -00:45:00
          - alias: "Sunrise"
            condition: sun
            before: sunrise
            before_offset: 00:45:00
    action:
      - action: scene.turn_on
        data:
          transition: 30
          entity_id: scene.scene_christmas_outdoors_{{ now().minute % 4 + 1 | int }}

  - id: toggle_christmas_automations_on_season_change
    alias: toggle_christmas_automations_on_season_change
    trigger:
      - trigger: state
        entity_id: binary_sensor.christmas_season
      - trigger: homeassistant
        event: start
    condition:
      - alias: "It's christmas"
        condition: state
        entity_id: binary_sensor.christmas_season
        state: "on"
    action:
      - action: script.toggle_christmas_automation_during_christmas_season
        data:
          entity_id: automation.christmas_tree_on
      - action: script.toggle_christmas_automation_during_christmas_season
        data:
          entity_id: automation.christmas_tree_off_midnight
      - action: script.toggle_christmas_automation_during_christmas_season
        data:
          entity_id: automation.christmas_lights_off_bedroom_off
      - action: script.toggle_christmas_automation_during_christmas_season
        data:
          entity_id: automation.christmas_outside_light_loop_1

  - id: reset_after_holiday
    alias: reset_after_holiday
    trigger:
      - trigger: sun
        event: sunrise
        offset: +00:45:00
    action:
      - action: scene.turn_on
        data:
          entity_id: scene.reset_front_lights
      - delay:
          seconds: 15
      - action: light.turn_off
        data:
          entity_id: light.outside_front_hue

  - id: st_andrews_day_light_loop
    alias: st_andrews_day_light_loop
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:45:00
      - trigger: time_pattern
        minutes: "/2"
    condition:
      - alias: "St Andrews Day"
        condition: state
        entity_id: binary_sensor.st_andrews_day
        state: "on"
      - condition: or
        conditions:
          - alias: "Sunset"
            condition: sun
            after: sunset
            after_offset: -00:45:00
          - alias: "Sunrise"
            condition: sun
            before: sunrise
            before_offset: 00:45:00
    action:
      - action: scene.turn_on
        data:
          transition: 30
          entity_id: scene.scene_st_andrews_day_outdoors_{{ now().minute % 4 + 1 | int }}

  - id: halloween_light_loop
    alias: halloween_light_loop
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:45:00
      - trigger: time_pattern
        minutes: "/2"
    condition:
      - alias: "Halloween"
        condition: state
        entity_id: binary_sensor.halloween
        state: "on"
      - condition: or
        conditions:
          - alias: "Sunset"
            condition: sun
            after: sunset
            after_offset: -00:45:00
          - alias: "Sunrise"
            condition: sun
            before: sunrise
            before_offset: 00:45:00
    action:
      - action: scene.turn_on
        data:
          transition: 30
          entity_id: scene.scene_halloween_outdoors_{{ now().minute % 4 + 1 | int }}

  - alias: Garbage Holiday Update
    id: garbage_holiday_update
    trigger:
      - trigger: event
        event_type: garbage_collection_loaded
        event_data:
          entity_id: sensor.waste_management
    action:
      - variables:
          holiday_entity: calendar.mn_holidays
      - alias: "Iterate through the dates"
        repeat:
          for_each: "{{ trigger.event.data.collection_dates }}"
          sequence:
            - alias: "Is there a public holiday on the week?"
              condition: template
              value_template: >-
                {%- set collection_date = as_datetime(repeat.item) %}
                {%- set ns = namespace(found=false) %}
                {%- for i in range(collection_date.weekday()+1) %}
                  {%- set d = ( collection_date + timedelta( days=-i) ) | as_timestamp | timestamp_custom("%Y-%m-%d") %}
                  {%- if d in state_attr(holiday_entity,'holidays') %}
                    {%- set ns.found = true %}
                  {%- endif %}
                {%- endfor %}
                {{ ns.found }}
            - alias: "Move the date"
              action: garbage_collection.offset_date
              data:
                entity_id: "{{ trigger.event.data.entity_id }}"
                date: "{{ repeat.item }}"
                offset: >-
                  {%- set collection_date = as_datetime(repeat.item) %}
                  {%- set ns = namespace(found_free=false, offset=0) %}
                  {# Count holidays in the week, increase offset for each found public holiday #}
                  {%- for i in range(collection_date.weekday()+1) %}
                    {%- set d = ( collection_date + timedelta( days=-i) ) | as_timestamp | timestamp_custom("%Y-%m-%d") %}
                    {%- if d in state_attr(holiday_entity,'holidays') %}
                      {%- set ns.offset = ns.offset + 1 %}
                    {%- endif %}
                  {%- endfor %}
                  {# Increase offset until we find a date that is not public holiday #}
                  {%- for _ in range(7) if not ns.found_free %}
                    {%- set d = ( collection_date + timedelta( days=ns.offset) ) | as_timestamp | timestamp_custom("%Y-%m-%d") %}
                    {%- if d in state_attr(holiday_entity,'holidays') %}
                      {%- set ns.offset = ns.offset + 1 %}
                    {% else %}
                      {%- set ns.found_free = true %}
                    {%- endif %}
                  {% endfor %}
                  {{ ns.offset }}
      - alias: "Update the garbage_collection entity"
        action: garbage_collection.update_state
        data:
          entity_id: "{{ trigger.event.data.entity_id }}"

########################
# Binary Sensors
########################
binary_sensor: []

########################
# Groups
########################
group:
  christmas_lights:
    entities:
      - switch.christmas_tree
      - light.christmas_lights
  christmas_automations:
    entities:
      - automation.christmas_tree_on
      - automation.christmas_tree_off_midnight
      - automation.christmas_lights_off_bedroom_off

