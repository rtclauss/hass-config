          facade_palette: "{{ holiday.facade_palette | default([], true) }}"
          ambient_palette: "{{ holiday.ambient_palette | default([], true) }}"
          path_palette: "{{ holiday.path_palette | default([], true) }}"
          scene_count: "{{ holiday.scene_count | default(facade_palette | count, true) | int }}"
          fast_window_active: >-
            {% set fast = holiday.midnight_window | default(none, true) %}
            {% if fast is mapping %}
              {{ now().hour == (fast.start_hour | int) and now().minute >= (fast.start_minute | int) }}
            {% else %}
              false
            {% endif %}
          cadence_minutes: >-
            {% set fast = holiday.midnight_window | default(none, true) %}
            {% if fast_window_active in [true, 'true', 'True', 'on'] and fast is mapping %}
              {{ fast.cadence_minutes | int }}
            {% else %}
              {{ holiday.cadence_minutes | default(2) | int }}
            {% endif %}
          scene_position: >-
            {% if (scene_count | int) > 0 %}
              {{ ((now().minute // (cadence_minutes | int)) % (scene_count | int)) | int }}
            {% else %}
              0
            {% endif %}
          facade_entities: "{{ holiday_target_groups.facade_rgb_lights | default([], true) }}"
          ambient_entities: "{{ holiday_target_groups.front_ambient_light | default([], true) }}"
          path_entities: "{{ holiday_target_groups.accent_path_lights | default([], true) }}"
          scene_entities: >-
            {% set ns = namespace(entities={}) %}
            {% if holiday is mapping and (facade_palette | count) > 0 and (ambient_palette | count) > 0 %}
              {% for entity_id in facade_entities %}
                {% set attrs = facade_palette[((loop.index0 + (scene_position | int)) % (facade_palette | count))] | combine({'state': 'on'}, recursive=True) %}
                {% set ns.entities = ns.entities | combine({entity_id: attrs}, recursive=True) %}
              {% endfor %}
              {% set ambient_attrs = ambient_palette[(scene_position | int) % (ambient_palette | count)] | combine({'state': 'on'}, recursive=True) %}
              {% for entity_id in ambient_entities %}
                {% set ns.entities = ns.entities | combine({entity_id: ambient_attrs}, recursive=True) %}
              {% endfor %}
              {% if (path_palette | count) > 0 %}
                {% for entity_id in path_entities %}
                  {% set attrs = path_palette[((loop.index0 + (scene_position | int)) % (path_palette | count))] | combine({'state': 'on'}, recursive=True) %}
                  {% set ns.entities = ns.entities | combine({entity_id: attrs}, recursive=True) %}
                {% endfor %}
              {% endif %}
            {% endif %}
            {{ ns.entities }}
      - condition: template
        value_template: >-
          {{ holiday is mapping and (scene_count | int) > 0 and (scene_entities | count) > 0 }}
      - action: scene.apply
        data:
          transition: "{{ holiday.transition_seconds | default(40) | int }}"
          entities: "{{ scene_entities }}"

########################
# Template
########################
template:
  - binary_sensor:
      - default_entity_id: binary_sensor.christmas_season
        state: '{{ now().strftime("%m") |int in [12] }}'
        name: christmas_season

      - name: st_andrews_day
        unique_id: st_andrews_day
        state: "{{ now().month == 11 and now().day == 30 }}"

      - name: halloween
        unique_id: halloween
