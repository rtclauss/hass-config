        state: "{{ now().month == 9 and now().weekday() == 0 and 1 <= now().day <= 7 }}"

      - name: sealand_independence_day
        unique_id: sealand_independence_day
        state: "{{ now().month == 9 and now().day == 2 }}"

      - name: talk_like_a_pirate_day
        unique_id: talk_like_a_pirate_day
        state: "{{ now().month == 9 and now().day == 19 }}"

      - name: veterans_day
        unique_id: veterans_day
        state: "{{ now().month == 11 and now().day == 11 }}"

      - name: thanksgiving
        unique_id: thanksgiving
        state: "{{ now().month == 11 and now().weekday() == 3 and 22 <= now().day <= 28 }}"

      - name: hogmanay
        unique_id: hogmanay
        state: "{{ now().month == 12 and now().day == 31 }}"

  - sensor:
      - name: active_outdoor_holiday
        unique_id: active_outdoor_holiday
        state: >-
          {%- if is_state('binary_sensor.hogmanay', 'on') -%}
            hogmanay
          {%- elif is_state('binary_sensor.halloween', 'on') -%}
            halloween
          {%- elif is_state('binary_sensor.st_andrews_day', 'on') -%}
            st_andrews_day
          {%- elif is_state('binary_sensor.burns_night', 'on') -%}
            burns_night
          {%- elif is_state('binary_sensor.national_curling_month', 'on') -%}
            national_curling_month
          {%- elif is_state('binary_sensor.groundhog_day', 'on') -%}
            groundhog_day
          {%- elif is_state('binary_sensor.presidents_day', 'on') -%}
            presidents_day
          {%- elif is_state('binary_sensor.leap_day', 'on') -%}
            leap_day
          {%- elif is_state('binary_sensor.pi_day', 'on') -%}
            pi_day
          {%- elif is_state('binary_sensor.tartan_day', 'on') -%}
            tartan_day
          {%- elif is_state('binary_sensor.star_wars_day', 'on') -%}
            star_wars_day
          {%- elif is_state('binary_sensor.minnesota_fishing_opener', 'on') -%}
            minnesota_fishing_opener
          {%- elif is_state('binary_sensor.minnesota_statehood_day', 'on') -%}
            minnesota_statehood_day
          {%- elif is_state('binary_sensor.memorial_day', 'on') -%}
            memorial_day
          {%- elif is_state('binary_sensor.juneteenth', 'on') -%}
            juneteenth
          {%- elif is_state('binary_sensor.independence_day', 'on') -%}
            independence_day
          {%- elif is_state('binary_sensor.sealand_independence_day', 'on') -%}
            sealand_independence_day
          {%- elif is_state('binary_sensor.labor_day', 'on') -%}
            labor_day
          {%- elif is_state('binary_sensor.talk_like_a_pirate_day', 'on') -%}
            talk_like_a_pirate_day
          {%- elif is_state('binary_sensor.veterans_day', 'on') -%}
            veterans_day
          {%- elif is_state('binary_sensor.thanksgiving', 'on') -%}
            thanksgiving
          {%- elif is_state('binary_sensor.christmas_season', 'on') -%}
            christmas_season
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          friendly_label: >-
            {% set labels = {
              'none': 'No holiday lighting',
              'christmas_season': 'Christmas Season',
              'st_andrews_day': "St Andrew's Day",
              'halloween': 'Halloween',
              'hogmanay': "Hogmanay",
              'burns_night': "Burns Night",
              'national_curling_month': "National Curling Month",
              'groundhog_day': "Groundhog Day",
              'presidents_day': "Presidents' Day",
              'leap_day': "Leap Day",
              'pi_day': "Pi Day",
              'tartan_day': "Tartan Day",
              'star_wars_day': "Star Wars Day",
              'minnesota_fishing_opener': "Minnesota Fishing Opener",
              'minnesota_statehood_day': "Minnesota Statehood Day",
              'memorial_day': "Memorial Day",
              'juneteenth': "Juneteenth",
              'independence_day': "Independence Day",
              'sealand_independence_day': "Sealand Independence Day",
              'labor_day': "Labor Day",
              'talk_like_a_pirate_day': "Talk Like a Pirate Day",
              'veterans_day': "Veterans Day",
              'thanksgiving': "Thanksgiving"
            } %}
            {% set active = states('sensor.active_outdoor_holiday') | trim %}
            {{ labels.get(active, active | replace('_', ' ') | title) }}
          notification_message: >-
            {% set active = states('sensor.active_outdoor_holiday') | trim %}
            {% if active in ['none', 'unknown', 'unavailable', ''] %}
              {{ '' }}
            {% elif active == 'christmas_season' %}
              Today's special lighting is Christmas Season. The tree and palette-driven outdoor Christmas scenes will start before sunset.
            {% elif active == 'halloween' %}
              Today's special lighting is Halloween. The palette-driven outdoor holiday scenes will start before sunset.
            {% elif active == 'st_andrews_day' %}
              Today's special lighting is St Andrew's Day. The palette-driven outdoor holiday scenes will start before sunset.
            {% else %}
              Today's special lighting is {{ state_attr('sensor.active_outdoor_holiday', 'friendly_label') | default(active | replace('_', ' ') | title, true) }}. The palette-driven outdoor holiday scenes will start before sunset.
            {% endif %}

  - trigger:
      - trigger: homeassistant
        event: start
      - trigger: time
        at: "00:05:00"
      - trigger: time
        at: "12:05:00"
      - trigger: state
        entity_id: calendar.mn_holidays
    action:
      - variables:
          today: "{{ now().date().isoformat() }}"
          today_weekday: "{{ now().weekday() }}"
          is_wed: "{{ today_weekday | int == 2 }}"
          after_pickup_time: "{{ now().hour >= 12 }}"
          days_until_wed: >
            {% set d = 2 - (today_weekday | int) %}
            {% if d < 0 %}{% set d = d + 7 %}{% endif %}
            {{ d }}
          base_wed: >
            {% set today_date = strptime(today, '%Y-%m-%d').date() %}
            {% if is_wed and not after_pickup_time %}
              {{ today }}
            {% else %}
              {{ (today_date + timedelta(days=(days_until_wed | int) if (not is_wed) else 7)).isoformat() }}
            {% endif %}
          week_mon: >
            {% set base_wed_date = strptime(base_wed, '%Y-%m-%d').date() %}
            {{ (base_wed_date - timedelta(days=base_wed_date.weekday())).isoformat() }}
          range_start: "{{ week_mon }}T00:00:00"
          range_end: >
            {% set base_wed_date = strptime(base_wed, '%Y-%m-%d').date() %}
            {{ (base_wed_date + timedelta(days=1)).isoformat() }}T23:59:59
      - action: calendar.get_events
        target:
          entity_id: calendar.mn_holidays
        data:
          start_date_time: "{{ range_start }}"
          end_date_time: "{{ range_end }}"
        response_variable: hols
      - variables:
          holiday_events: "{{ hols.events | default([]) }}"
          holiday_mon_to_wed: >
            {% set ws = strptime(week_mon, '%Y-%m-%d').date() %}
            {% set we = strptime(base_wed, '%Y-%m-%d').date() %}
            {% set ns = namespace(hit=false) %}
            {% for e in holiday_events %}
              {% set d = as_datetime(e.start).date() %}
              {% if d >= ws and d <= we %}
                {% set ns.hit = true %}
              {% endif %}
            {% endfor %}
            {{ ns.hit }}
          pickup_date: >
            {% if holiday_mon_to_wed in [true, 'true', 'True', 'on'] %}
              {{ (strptime(base_wed, '%Y-%m-%d').date() + timedelta(days=1)).isoformat() }}
            {% else %}
              {{ base_wed }}
            {% endif %}
    sensor:
      - name: Garbage pickup date
        unique_id: garbage_pickup_date_apple_valley
        state: "{{ pickup_date }}"
        attributes:
          base_wednesday: "{{ base_wed }}"
          holiday_shift_applied: "{{ holiday_mon_to_wed in [true, 'true', 'True', 'on'] }}"
          holiday_events_in_range: "{{ holiday_events | map(attribute='summary') | list }}"

