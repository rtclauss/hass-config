########################
# Scripts
########################
script:
  toggle_christmas_automation_during_christmas_season:
    sequence:
      - if:
          - condition: state
            entity_id: binary_sensor.christmas_season
            state: "on"
        then:
          - action: automation.turn_on
            target:
              entity_id: "{{ entity_id }}"
        else:
          - action: automation.turn_off
            target:
              entity_id: "{{ entity_id }}"

  apply_outdoor_holiday_scene:
    mode: queued
    fields:
      holiday_key:
        description: Holiday key from sensor.active_outdoor_holiday.
        example: burns_night
    sequence:
      - variables:
          # Keep palette metadata in JSON so pytest can validate the scene engine
          # without adding a YAML parser dependency to the ephemeral uv test env.
          holiday_target_groups_json: >-
            {
              "facade_rgb_lights": [
                "light.outside_front_door",
                "light.outside_north_west_garage",
                "light.outside_south_west_garage"
              ],
              "front_ambient_light": [
                "light.outside_front_hue"
              ],
              "accent_path_lights": []
            }
          holiday_definitions_json: >-
            {
              "christmas_season": {
                "label": "Christmas Season",
                "cadence_minutes": 1,
                "transition_seconds": 30,
                "scene_count": 4,
                "target_behaviors": {
                  "facade_rgb_lights": "Classic red and green Christmas facade loop.",
                  "front_ambient_light": "Warm white porch glow with subtle holiday red and green accents.",
                  "accent_path_lights": "Warm white base with alternating red and green accents when path lights exist."
                },
                "facade_palette": [
                  {"rgb_color": [0, 255, 0], "brightness": 255},
                  {"rgb_color": [255, 0, 0], "brightness": 255},
                  {"rgb_color": [0, 255, 0], "brightness": 255},
                  {"rgb_color": [255, 0, 0], "brightness": 255}
                ],
                "ambient_palette": [
                  {"color_temp_kelvin": 2500, "brightness": 155},
                  {"rgb_color": [255, 90, 90], "brightness": 135},
                  {"rgb_color": [90, 220, 120], "brightness": 135},
                  {"color_temp_kelvin": 2400, "brightness": 160}
                ],
                "path_palette": [
                  {"color_temp_kelvin": 2600, "brightness": 112},
                  {"rgb_color": [255, 0, 0], "brightness": 108},
                  {"rgb_color": [0, 255, 0], "brightness": 108},
                  {"color_temp_kelvin": 2600, "brightness": 112}
                ]
              },
              "st_andrews_day": {
