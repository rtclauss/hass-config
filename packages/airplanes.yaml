########################
# Alarm Panel
########################
alarm_control_panel: []

########################
## Automation
########################
automation:
  - alias: "ADSB: Refresh REST lookups when closest aircraft HEX changes"
    id: adsb_refresh_rest_on_hex_change
    mode: restart
    trace:
      stored_traces: 100
    trigger:
      - trigger: state
        entity_id: sensor.closest_aircraft_overhead
        attribute: hex
    action:
      - delay:
          seconds: 2
      - action: homeassistant.update_entity
        target:
          entity_id:
            - sensor.closest_aircraft_routeset
            - sensor.closest_aircraft_route_raw

            - sensor.closest_aircraft_photo_raw
            - sensor.closest_aircraft_photo

########################
# Binary Sensors
########################
binary_sensor: []

########################
# Cameras
########################
camera: []

########################
