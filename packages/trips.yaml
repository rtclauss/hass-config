# Home Assistant package for trip and vacation orchestration.
# Complex areas: it combines presence, calendars, lighting simulation, and Ecobee vacation sync so long trips flip the house into the correct away-mode behavior.

################################################################
## Packages / Trips
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "trips"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################

    automation.trip_mode_manager:
      <<: *customize
      friendly_name: "Trip Mode Manager"
      icon: mdi:bag-suitcase

    automation.trip_mode_startup_reconcile:
      <<: *customize
      friendly_name: "Trip Mode Startup Reconcile"
      icon: mdi:restart-alert

    automation.sync_ecobee_calendar_vacation:
      <<: *customize
      friendly_name: "Sync Ecobee Calendar Vacation"
      icon: mdi:calendar-sync

    automation.log_calendar_vacation_plan_diagnostics:
      <<: *customize
      friendly_name: "Log Calendar Vacation Diagnostics"
      icon: mdi:clipboard-text-clock

    automation.trip_mode_watchdog_home_1h:
      <<: *customize
      friendly_name: "Trip Mode Watchdog"
      icon: mdi:home-clock

    automation.random_off_time:
      <<: *customize
      friendly_name: "Set random turn off time"

    automation.send_nest_airport_home_eta:
      <<: *customize
      friendly_name: "Send Nest ETA from MSP airport to home"
      icon: mdi:airplane-landing

    automation.vacation_lights_on:
      <<: *customize
      friendly_name: "Turn on lights when I am away"

    automation.vacation_lights_off:
      <<: *customize
      friendly_name: "Turn off lights at night when I am away"

    automation.vacuum_flying_home:
      <<: *customize
      friendly_name: "Vacuum house when flying home"

    ################################################
    ## Binary Sensors
    ################################################
    binary_sensor.sensed_trip:
      <<: *customize
      friendly_name: "Sensed a Trip"
      icon: mdi:airplane-takeoff

    binary_sensor.planned_vacation_calendar:
      <<: *customize
      friendly_name: "Scheduled Vacation Day"
      icon: mdi:airplane-takeoff

    binary_sensor.planned_work_trip_calendar:
      <<: *customize
      friendly_name: "Scheduled Work Trip Day"
      icon: mdi:airplane-takeoff

    binary_sensor.flying_home_today:
      <<: *customize
      friendly_name: "Flying Home Now"
      icon: mdi:airplane-landing

    ################################################
    ## Groups
    ################################################
    group.trip_status_card:
      <<: *customize
      friendly_name: "Trip Status"
      icon: mdi:beach

    group.vacation_group_card_1:
      <<: *customize
      friendly_name: "Vacation Group 1"

    group.vacation_group_card_2:
      <<: *customize
      friendly_name: "Vacation Group 2"

    group.vacation_group_card_3:
      <<: *customize
      friendly_name: "Vacation Group 3"

    group.vacation_group_card_4:
      <<: *customize
      friendly_name: "Vacation Group 4"

    ################################################
    ## Input Boolean
    ################################################

    input_boolean.trip:
      <<: *customize
      friendly_name: "On a Trip"
      hidden: true

    ################################################
    ## Input Numbers
    ################################################

    input_number.random_vacation_light_group:
      <<: *customize
      friendly_name: "Random Group of Lights to Turn on"
    input_number.trip_trigger_radius_miles:
      <<: *customize
      friendly_name: "Trip Trigger Radius"
    input_number.ecobee_calendar_vacation_heat:
      <<: *customize
      friendly_name: "Ecobee Calendar Vacation Heat"
    input_number.ecobee_calendar_vacation_cool:
      <<: *customize
      friendly_name: "Ecobee Calendar Vacation Cool"

    ################################################
    ## Sensors
    ################################################
    sensor.me_to_home:
      <<: *customize
      friendly_name: "Time to Home"
    sensor.ecobee_calendar_vacation_schedule:
      <<: *customize
      friendly_name: "Ecobee Calendar Vacation Schedule"

########################
# Automations
########################
automation:
  # - id: init_vacation
  #   alias: initialize_vacation_items
  #   trigger:
  #   - platform: homeassistant
  #     event: start
  #   action:
  #   - delay: '00:00:{{ (range(1,90)|random|int) }}'
  #   - action: script.vacation_group_visibility

  - id: trip_mode_startup_reconcile
    alias: trip_mode_startup_reconcile
    mode: restart
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - delay:
          seconds: 30
      - variables:
          trip_mode_on: "{{ is_state('input_boolean.trip', 'on') }}"
          vacation_sim_on: "{{ is_state('switch.vacation_simulation', 'on') }}"
          states_mismatch: "{{ trip_mode_on != vacation_sim_on }}"
          notification_tag: "trip-mode-startup-reconcile"
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.bayesian_zeke_home
                state: "on"
              - condition: template
                value_template: "{{ trip_mode_on or vacation_sim_on }}"
            sequence:
              # Emit an event so trip_mode_manager stays the single owner of trip-state writes.
              - event: trip_mode_resolution_requested
                event_data:
                  desired_state: "off"
                  reason: startup_reconcile
          - conditions:
              - condition: state
                entity_id: binary_sensor.bayesian_zeke_home
                state: "off"
              - condition: template
                value_template: "{{ states_mismatch }}"
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Trip Mode Needs Confirmation"
                  message: >-
                    Home Assistant restarted while you were away and trip mode is out of sync.
                    Should trip mode be enabled?
                  data:
                    tag: "{{ notification_tag }}"
                    persistent: true
                    actions:
                      - action: "TRIP_STARTUP_ENABLE"
                        title: "Enable"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: "TRIP_STARTUP_DISABLE"
                        title: "Disable"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
              - action: notify.mobile_app_faro
                data:
                  title: "Trip Mode Needs Confirmation"
                  message: >-
                    Home Assistant restarted while you were away and trip mode is out of sync.
                    Should trip mode be enabled?
                  data:
                    tag: "{{ notification_tag }}"
                    persistent: true
                    actions:
                      - action: "TRIP_STARTUP_ENABLE"
                        title: "Enable"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: "TRIP_STARTUP_DISABLE"
                        title: "Disable"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
              - wait_for_trigger:
                  - trigger: event
                    id: startup_enable
                    event_type: mobile_app_notification_action
                    event_data:
                      action: TRIP_STARTUP_ENABLE
                  - trigger: event
                    id: startup_disable
                    event_type: mobile_app_notification_action
                    event_data:
                      action: TRIP_STARTUP_DISABLE
                timeout:
                  hours: 4
                continue_on_timeout: true
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >-
                          {{
                            wait.completed
                            and wait.trigger is not none
                            and wait.trigger.id == 'startup_disable'
                          }}
                    sequence:
                      - event: trip_mode_resolution_requested
                        event_data:
                          desired_state: "off"
                          reason: startup_reconcile
                  - conditions:
                      - condition: template
                        value_template: >-
                          {{
                            not wait.completed
                            or (wait.trigger is not none and wait.trigger.id == 'startup_enable')
                          }}
                    sequence:
                      - event: trip_mode_resolution_requested
                        event_data:
                          desired_state: "on"
                          reason: startup_reconcile
              - action: notify.mobile_app_wethop
                data:
                  message: "clear_notification"
                  data:
                    tag: "{{ notification_tag }}"
              - action: notify.mobile_app_faro
                data:
                  message: "clear_notification"
                  data:
                    tag: "{{ notification_tag }}"

  - id: trip_mode_manager
    alias: trip_mode_manager
    mode: single
    trigger:
      - trigger: event
        id: startup_reconcile_enable
        event_type: trip_mode_resolution_requested
        event_data:
          desired_state: "on"
          reason: startup_reconcile
      - trigger: event
        id: startup_reconcile_disable
        event_type: trip_mode_resolution_requested
        event_data:
          desired_state: "off"
          reason: startup_reconcile
      - trigger: state
        id: away_for_20h
        entity_id: binary_sensor.bayesian_zeke_home
        to: "off"
        for:
          hours: 20
      - trigger: template
        id: away_over_radius_mi
        value_template: >-
          {% set lat = state_attr('device_tracker.bayesian_zeke_home', 'latitude') %}
          {% set lon = state_attr('device_tracker.bayesian_zeke_home', 'longitude') %}
          {% set home_lat = state_attr('zone.home', 'latitude') %}
          {% set home_lon = state_attr('zone.home', 'longitude') %}
          {% set trip_radius_mi = states('input_number.trip_trigger_radius_miles') | float(120) %}
          {{
            lat is not none and lon is not none and home_lat is not none and home_lon is not none
            and (distance(lat, lon, home_lat, home_lon) * 0.621371) > trip_radius_mi
            and is_state('binary_sensor.bayesian_zeke_home', 'off')
          }}
      - trigger: state
        id: planned_work_trip
        entity_id: binary_sensor.planned_work_trip_calendar
        to: "on"
      - trigger: state
        id: planned_vacation
        entity_id: binary_sensor.planned_vacation_calendar
        to: "on"
      - trigger: calendar
        id: calendar_trip
        entity_id: calendar.ryan_claussen
        event: start
        offset: -00:50:00
      - trigger: state
        id: manual_trip_on
        entity_id: input_boolean.trip
        to: "on"
      - trigger: state
        id: manual_trip_off
        entity_id: input_boolean.trip
        to: "off"
      - trigger: state
        id: return_home
        entity_id: binary_sensor.bayesian_zeke_home
        to: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: startup_reconcile_enable
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.trip
              - action: script.house_transition
                data:
                  mode: "{{ states('input_select.house_mode') }}"
                  reason: startup_reconcile_enable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "Trip mode enabled."
          - conditions:
              - condition: trigger
                id: startup_reconcile_disable
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.trip
              - action: script.house_transition
                data:
                  mode: "{{ states('input_select.house_mode') }}"
                  reason: startup_reconcile_disable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "Back from trip. \U0001F4BA"
          - conditions:
              - condition: trigger
                id:
                  - away_for_20h
                  - away_over_radius_mi
                  - planned_work_trip
                  - planned_vacation
              - condition: state
                entity_id: binary_sensor.bayesian_zeke_home
                state: "off"
              - condition: state
                entity_id: input_boolean.trip
                state: "off"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.trip
              - action: script.house_transition
                data:
                  mode: away
                  reason: automatic_trip_enable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "You're on a trip! \U0001F6EC"
          - conditions:
              - condition: trigger
                id: calendar_trip
              - condition: state
                entity_id: binary_sensor.bayesian_zeke_home
                state: "off"
              - condition: state
                entity_id: input_boolean.trip
                state: "off"
              - condition: template
                value_template: >-
                  {% set summary = trigger.calendar_event.summary | default('', true) | string %}
                  {% set description = trigger.calendar_event.description | default('', true) | string %}
                  {% set location = trigger.calendar_event.location | default('', true) | string %}
                  {% set summary_lower = summary | lower %}
                  {% set location_lower = location | lower %}
                  {% set trip_text = [summary, description, location] | join(' ') | lower %}
                  {% set route_summary = '→' in summary %}
                  {% set named_flight = summary_lower.startswith('flight to ') or (summary_lower.startswith('flight: ') and ' to ' in summary_lower) %}
                  {% set itinerary_marker = 'synced by flighty' in trip_text or 'created from an email you received in gmail' in trip_text or 'booking code:' in trip_text or 'flight time ' in trip_text %}
                  {% set looks_like_flight = route_summary or named_flight or itinerary_marker %}
                  {% set origin_code = '' %}
                  {% set destination_code = '' %}
                  {% if route_summary %}
                    {% set origin_code = summary.split('→', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
                    {% set destination_code = summary.split('→', 1)[1].split('•', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
                  {% elif summary_lower.startswith('flight to ') %}
                    {% set destination_code = summary_lower[10:].split(' (', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
                  {% elif summary_lower.startswith('flight: ') and ' to ' in summary_lower %}
                    {% set flight_tail_lower = summary_lower[8:] %}
                    {% set destination_code = flight_tail_lower.split(' to ', 1)[1].split(' (', 1)[0].split(' •', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
                  {% endif %}
                  {% set is_msp_departure = (
                    origin_code == "MSP"
                    or location_lower == "minneapolis-st paul intl/wold-chamberlain"
                    or "msp airport" in location_lower
                    or "minneapolis msp" in location_lower
                    or ("minneapolis" in location_lower and ("saint paul" in location_lower or "st paul" in location_lower))
                    or "wold-chamberlain" in location_lower
                  ) %}
                  {{
                    looks_like_flight
                    and is_msp_departure
                    and destination_code not in ["", "MSP", "RST", "MINNEAPOLIS", "MINNEAPOLISSTPAUL", "ROCHESTER", "MINNESOTA"]
                    and "friend" not in trip_text
                  }}
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.trip
              - action: script.house_transition
                data:
                  mode: away
                  reason: calendar_trip_enable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "You're on a trip! \U0001F6EC"
          - conditions:
              - condition: trigger
                id: manual_trip_on
            sequence:
              - action: script.house_transition
                data:
                  mode: "{{ states('input_select.house_mode') }}"
                  reason: manual_trip_enable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "Trip mode enabled."
          - conditions:
              - condition: trigger
                id: manual_trip_off
              - condition: state
                entity_id: input_boolean.trip
                state: "off"
            sequence:
              - action: script.house_transition
                data:
                  mode: "{{ states('input_select.house_mode') }}"
                  reason: manual_trip_disable
                  apply_lights: false
                  apply_security: false
                  apply_climate: false
                  apply_media: false
                  apply_trip_policy: true
              - action: notify.all
                data:
                  message: "Back from trip. \U0001F4BA"
      - if:
          - condition: trigger
            id: return_home
          - condition: state
            entity_id: input_boolean.trip
            state: "on"
        then:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.trip
          - action: script.house_transition
            data:
              mode: "{{ states('input_select.house_mode') }}"
              reason: return_home_trip_disable
              apply_lights: false
              apply_security: false
              apply_climate: false
              apply_media: false
              apply_trip_policy: true
          - action: notify.all
            data:
              message: "Back from trip. \U0001F4BA"

  - id: sync_ecobee_calendar_vacation
    alias: sync_ecobee_calendar_vacation
    mode: restart
    trigger:
      - trigger: state
        id: schedule_changed
        entity_id: sensor.ecobee_calendar_vacation_schedule
      - trigger: time
        id: daily_refresh
        at: "03:05:00"
    variables:
      vacation_name: >-
        {% set planned_name = state_attr('sensor.ecobee_calendar_vacation_schedule', 'vacation_name') | default('', true) | trim %}
        {{ planned_name[:12] if planned_name else 'CalAutoVac' }}
      delete_vacation_name: >-
        {% set previous_name = '' %}
        {% if trigger is defined and trigger.platform == 'state' and trigger.from_state is not none %}
          {% set previous_name = trigger.from_state.attributes.vacation_name | default('', true) | trim %}
        {% endif %}
        {% set current_name = state_attr('sensor.ecobee_calendar_vacation_schedule', 'vacation_name') | default('', true) | trim %}
        {% set delete_name = previous_name if previous_name else current_name %}
        {{ delete_name[:12] if delete_name else 'CalAutoVac' }}
      vacation_state: "{{ states('sensor.ecobee_calendar_vacation_schedule') }}"
      schedule_start: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'start') }}"
      schedule_end: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'end') }}"
      heat_temp: "{{ states('input_number.ecobee_calendar_vacation_heat') | float(60) }}"
      cool_temp: "{{ states('input_number.ecobee_calendar_vacation_cool') | float(82) }}"
    action:
      - action: ecobee.delete_vacation
        continue_on_error: true
        data:
          entity_id: climate.my_ecobee
          vacation_name: "{{ delete_vacation_name }}"
      - if:
          - condition: template
            value_template: >-
              {{
                vacation_state != 'off'
                and schedule_start not in [none, '', 'unknown', 'unavailable']
                and schedule_end not in [none, '', 'unknown', 'unavailable']
              }}
        then:
          - action: ecobee.create_vacation
            data:
              entity_id: climate.my_ecobee
              vacation_name: "{{ vacation_name }}"
              heat_temp: "{{ heat_temp }}"
              cool_temp: "{{ cool_temp }}"
              start_date: "{{ (schedule_start | as_datetime | as_local).date().isoformat() }}"
              start_time: "{{ (schedule_start | as_datetime | as_local).strftime('%H:%M:%S') }}"
              end_date: "{{ (schedule_end | as_datetime | as_local).date().isoformat() }}"
              end_time: "{{ (schedule_end | as_datetime | as_local).strftime('%H:%M:%S') }}"

  - id: log_calendar_vacation_plan_diagnostics
    alias: log_calendar_vacation_plan_diagnostics
    mode: restart
    trigger:
      - trigger: state
        entity_id: sensor.ecobee_calendar_vacation_schedule
      - trigger: state
        entity_id: sensor.ecobee_calendar_vacation_schedule
        attribute: decision_code
    variables:
      decision_summary: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'decision_summary') | default('No travel decision recorded.', true) | string | trim }}"
      outbound_summary: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'outbound_summary') | default('', true) | string | trim }}"
      return_summary: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'return_summary') | default('', true) | string | trim }}"
      fallback_summary: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'fallback_summary') | default('', true) | string | trim }}"
      fallback_source: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'fallback_source') | default('', true) | string | trim }}"
      destination_name: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'destination_name') | default('', true) | string | trim }}"
      ignored_reason: "{{ state_attr('sensor.ecobee_calendar_vacation_schedule', 'ignored_reason') | default('', true) | string | trim }}"
    action:
      - action: logbook.log
        data:
          entity_id: sensor.ecobee_calendar_vacation_schedule
          domain: sensor
          name: Travel detection
          message: >-
            {{ decision_summary }}{% if outbound_summary %} Outbound: {{ outbound_summary }}.{% endif %}{% if return_summary %} Return: {{ return_summary }}.{% endif %}{% if fallback_summary %} Fallback{% if fallback_source %} ({{ fallback_source }}){% endif %}: {{ fallback_summary }}.{% endif %}{% if destination_name %} Destination: {{ destination_name }}.{% endif %}{% if ignored_reason and ignored_reason != decision_summary %} Ignored: {{ ignored_reason }}.{% endif %}

  - id: trip_mode_watchdog_home_1h
    alias: trip_mode_watchdog_home_1h
    trigger:
      - trigger: state
        entity_id: binary_sensor.bayesian_zeke_home
        to: "on"
        for:
          hours: 1
    condition:
      - condition: state
        entity_id: input_boolean.trip
        state: "on"
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.vacation_simulation
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.trip
      - action: input_number.set_value
        data:
          entity_id: input_number.random_vacation_light_group
          value: "{{ (0|int) }}"
      - action: notify.all
        data:
          message: "Trip mode watchdog cleared vacation mode after 1 hour at home."

  - id: garage_opened_on_a_trip
    alias: Garage Door Opened while on a Trip
    mode: restart
    trigger:
      - trigger: state
        entity_id: cover.garage_door
        to: open
        id: door_opened_while_gone
      - trigger: homeassistant
        event: start
        id: door_opened_while_gone
      - trigger: event
        event_type: mobile_app_notification_action
        id: close_garage_mobile_trigger
        event_data:
          action: CLOSE_GARAGE
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.trip
          state: "on"
        - condition: state
          entity_id: binary_sensor.bayesian_zeke_home
          state: "off"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: door_opened_while_gone
            sequence:
              - action: notify.mobile_app_wethop
                data:
                  title: "Garage opened while on a trip"
                  # Fixed: `message` is a required field for all HA notify services.
                  # Removing the comment restores the field that was accidentally
                  # commented out, preventing the "required key not provided" error.
                  message: "Close the door?"
                  data:
                    tag: "garage-opened-on-trip"
                    persistent: true
                    actions:
                      - action: "CLOSE_GARAGE"
                        title: "Close the door now"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
                      - action: "IGNORE_GARAGE"
                        title: "Ignore for 5 minutes"
                        activationMode: background
                        authenticationRequired: false
                        destructive: false
                        behavior: default
          - conditions:
              - condition: trigger
                id: close_garage_mobile_trigger
            sequence:
              - action: cover.close_cover
                target:
                  entity_id: cover.garage_door
      - delay:
          minutes: 5
      - condition: state
        entity_id: input_boolean.trip
        state: "on"
      - condition: state
        entity_id: binary_sensor.bayesian_zeke_home
        state: "off"
      - action: notify.all
        data:
          message: Closing garage door while you're on a trip.
      - action: cover.close_cover
        target:
          entity_id: cover.garage_door

  - id: random_off_time
    alias: random_off_time
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time
        at: "12:00:00"
      - trigger: state
        entity_id: input_boolean.trip
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.trip
        state: "on"
    action:
      - action: input_datetime.set_datetime
        data:
          entity_id: input_datetime.random_vacation_lights_off
          time: "{{ (range(22, 24)|random|int ~ ':' ~ range(0, 59)|random|int ~ ':' ~ range(0, 59)|random|int) }}"
      - action: input_number.set_value
        data:
          entity_id: input_number.random_vacation_light_group
          value: "{{ (range(1, 5)|random|int) }}" #one more than group, max not included
      - action: notify.all
        data:
          message: Turning on group {{states("input_number.random_vacation_light_group")|int }}, lights out at {{ states("input_datetime.random_vacation_lights_off") }}

  # TODO is this still needed with Vacation Mode?
  - id: return_home_from_parents
    alias: return_home_from_parents
    trigger:
      - trigger: zone
        entity_id: device_tracker.bayesian_zeke_home
        zone: zone.parents
        event: leave
      # - platform: state
      #   entity_id: device_tracker.bayesian_zeke_home
      #   from: 'Parents'
    condition:
      condition: time
      weekday:
        - sun
    action:
      # - action: nest.set_eta
      #   data_template:
      #     eta: '{{states.sensor.time_to_home.state}}'
      #     trip_id: "{{ states.input_select.trip_origin.state }}"
      # - action: climate.set_preset_mode
      #   entity_id: climate.my_ecobee
      #   data:
      #     preset_mode: "Away"
      - action: ecobee.resume_program
        data:
          resume_all: true
          entity_id: climate.my_ecobee
      - action: notify.all
        data:
          data:
            url: "/ryan-new-mushroom/climate"
          message: >-
            Turning off Ecobee away while driving home from parents

  - id: send_nest_airport_home_eta
    alias: send_nest_airport_home_eta
    trigger:
      - trigger: zone
        entity_id: device_tracker.bayesian_zeke_home
        zone: zone.msp
        event: leave
    condition:
      - condition: state
        entity_id: binary_sensor.flying_home_today
        state: "on"
    action:
      # - action: nest.set_eta
      #   data_template:
      #     eta: '{{states.sensor.time_to_home.state}}'
      #     trip_id: "{{ states.input_select.trip_origin.state }}"
      # - action: climate.set_preset_mode
      #   entity_id: climate.my_ecobee
      #   data:
      #     preset_mode: "Home"
      - action: ecobee.resume_program
        data:
          resume_all: true
          entity_id: climate.my_ecobee
      - action: notify.all
        data:
          data: url:"/ryan-new-mushroom/climate"
          message: >-
            Turning off Ecobee Away mode while driving home from MSP

  - id: vacation_lights_on
    alias: vacation_lights_on
    trigger:
      - trigger: sun
        event: sunset
        offset: -00:30:00
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.trip
          state: "on"
        - condition: state
          entity_id: binary_sensor.bayesian_zeke_home
          state: "off"
    action:
      - delay: 00:{{ (range(5,45)|random|int) }}:00
      - action: scene.turn_on
        data:
          target: scene.vacation_group_{{ states("input_number.random_vacation_light_group")|int }}
      - action: notify.all
        data:
          message: Turning on lights while you're away.

  - id: vacation_lights_off
    alias: vacation_lights_off
    trigger:
      - trigger: time
        at: input_datetime.random_vacation_lights_off
    #- platform: template
    #value_template: "{{ states('sensor.time') == (state_attr('input_datetime.random_vacation_lights_off', 'timestamp') | int | timestamp_custom('%H:%M', True)) }}"
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.trip
          state: "on"
        - condition: state
          entity_id: binary_sensor.bayesian_zeke_home
          state: "off"
    action:
      - action: script.lights_off_except
        data:
          exclude_lights:
            - light.outside_front_hue
            - light.outside_north_west_garage
            - light.outside_south_west_garage
            - light.outside_front_door
          transition: 240
      # - action: light.turn_off
      #   entity_id: "all"
      - action: fan.turn_off
        target:
          entity_id: "all"
      - action: notify.all
        data:
          message: Lights off while you're away.
      - delay: 25
      - action: scene.turn_on
        target:
          entity_id: scene.leave_home

  - id: vacuum_on_trip
    alias: vacuum_on_trip
    description: Run one full-floor pass on the main and upstairs levels during trips.
    trigger:
      - trigger: time
        at: "13:00:00"
    condition:
      condition: and
      conditions:
        - alias: "on a trip"
          condition: state
          entity_id: input_boolean.trip
          state: "on"
        - alias: "not home"
          condition: state
          entity_id: binary_sensor.bayesian_zeke_home
          state: "off"
        - alias: "guest mode off"
          condition: state
          entity_id: input_boolean.guest_mode
          state: "off"
    action:
      - action: script.vacuum_main_and_upstairs_levels
      - action: notify.all
        data:
          data:
            url: "/ryan-new-mushroom/cleaning"
          message: "Vacuuming the main and upstairs levels while you're away \U0001F4BA"

  - id: vacuum_flying_home
    alias: vacuum_flying_home
    description: Run one full-floor pass on the main and upstairs levels before Ryan flies home.
    trigger:
      - entity_id: binary_sensor.flying_home_today
        from: "off"
        trigger: state
        to: "on"
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.trip
          state: "on"
        - condition: state
          entity_id: binary_sensor.bayesian_zeke_home
          state: "off"
        - condition: state
          entity_id: input_boolean.guest_mode
          state: "off"
    action:
      - action: script.vacuum_main_and_upstairs_levels
      - action: notify.all
        data:
          data:
            url: "/ryan-new-mushroom/cleaning"
          message: "Vacuuming the main and upstairs levels while you fly home \U0001F4BA"

