                {% set start_ts = as_timestamp(start_dt) %}
                {% set end_ts = as_timestamp(end_dt) %}
                {% if end_ts > now_ts %}
                  {% if ns.match is none or start_ts < ns.match.start_ts %}
                    {% set ns.match = {
                      'message': summary,
                      'start_time': (start_dt | as_local).isoformat(),
                      'end_time': (end_dt | as_local).isoformat(),
                      'location': location,
                      'description': description,
                      'all_day': ('T' not in (start_raw | string)),
                      'active': (start_ts <= now_ts and end_ts > now_ts),
                      'start_ts': start_ts
                    } %}
                  {% endif %}
                {% endif %}
