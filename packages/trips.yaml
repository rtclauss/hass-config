              {% endif %}
            {% endfor %}
            {% set ns.fallback_event = ns.curling_event %}
            {% if ns.lodging_event is not none and (ns.fallback_event is none or ns.lodging_event.start_ts < ns.fallback_event.start_ts) %}
              {% set ns.fallback_event = ns.lodging_event %}
            {% endif %}
            {% if ns.personal_trip_event is not none and (ns.fallback_event is none or ns.personal_trip_event.start_ts < ns.fallback_event.start_ts) %}
              {% set ns.fallback_event = ns.personal_trip_event %}
            {% endif %}
            {% if ns.flight_trip is not none %}
              {{
                {
                  'reason': ns.flight_trip.reason,
                  'summary': ns.flight_trip.summary,
                  'start': ns.flight_trip.start,
                  'end': ns.flight_trip.end,
                  'return_summary': ns.flight_trip.return_summary,
                  'vacation_name': ns.flight_trip.vacation_name
                } | to_json
              }}
            {% elif ns.fallback_event is not none %}
              {{
                {
                  'reason': ns.fallback_event.reason,
                  'summary': ns.fallback_event.summary,
                  'start': ns.fallback_event.start,
                  'end': ns.fallback_event.end,
                  'return_summary': ns.fallback_event.return_summary,
                  'vacation_name': ns.fallback_event.vacation_name
                } | to_json
              }}
            {% else %}
              {{ {'reason': 'off', 'summary': '', 'start': '', 'end': '', 'return_summary': '', 'vacation_name': ''} | to_json }}
            {% endif %}
