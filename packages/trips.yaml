########################
# Sensors
########################
sensor: []

################################################
## Templates
################################################
template:
  - binary_sensor:
      - default_entity_id: binary_sensor.sensed_trip
        unique_id: sensed_trip
        state: >-
          {% if is_state("input_boolean.trip", 'on') %}
            True
          {% else %}
            False
          {% endif %}
        name: sensed_trip
      - default_entity_id: binary_sensor.planned_vacation_calendar
        unique_id: planned_vacation_calendar
        state: >-
          {% set start = state_attr('sensor.ecobee_calendar_vacation_schedule', 'start') %}
          {% set end = state_attr('sensor.ecobee_calendar_vacation_schedule', 'end') %}
          {% if start in [none, '', 'unknown', 'unavailable'] or end in [none, '', 'unknown', 'unavailable'] %}
            false
          {% else %}
            {% set start_dt = as_datetime(start) %}
            {% set end_dt = as_datetime(end) %}
            {{
              start_dt is not none
              and end_dt is not none
              and now() >= (start_dt | as_local)
              and now() < (end_dt | as_local)
            }}
          {% endif %}
        name: planned_vacation_calendar
      - default_entity_id: binary_sensor.planned_work_trip_calendar
        unique_id: planned_work_trip_calendar
        state: >-
          {% if is_state("binary_sensor.work_trip_today", 'on') %}
            true
          {% else %}
            false
          {% endif %}
        name: planned_work_trip_calendar
      - delay_off: "3:00:00"
        default_entity_id: binary_sensor.flying_home_today
        unique_id: flying_home_today
        state: >-
          {% if is_state("binary_sensor.flight_to_msp_today", 'on') or is_state("binary_sensor.flight_to_rst_today",'on')  %}
            true
          {% else %}
            false
          {% endif %}
        name: flying_home_today
  - trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/15"
      - trigger: state
        entity_id:
          - calendar.curling
          - calendar.ryan_claussen
          - calendar.work_trip
    action:
      - variables:
          lookahead_start: >-
            {{ now().replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}
          lookahead_end: >-
            {{ (now() + timedelta(days=180)).replace(hour=23, minute=59, second=59, microsecond=0).isoformat() }}
      - action: calendar.get_events
        target:
          entity_id: calendar.curling
        data:
          start_date_time: "{{ lookahead_start }}"
          end_date_time: "{{ lookahead_end }}"
        response_variable: curling_event_window
      - action: calendar.get_events
        target:
          entity_id: calendar.ryan_claussen
        data:
          start_date_time: "{{ lookahead_start }}"
          end_date_time: "{{ lookahead_end }}"
        response_variable: personal_event_window
      - action: calendar.get_events
        target:
          entity_id: calendar.work_trip
        data:
          start_date_time: "{{ lookahead_start }}"
          end_date_time: "{{ lookahead_end }}"
        response_variable: work_trip_event_window
      - variables:
          curling_events: >-
            {% if curling_event_window is mapping and curling_event_window.events is defined %}
              {{ curling_event_window.events | to_json }}
            {% elif curling_event_window is mapping and curling_event_window['calendar.curling'] is defined and curling_event_window['calendar.curling'].events is defined %}
              {{ curling_event_window['calendar.curling'].events | to_json }}
            {% else %}
              {{ [] | to_json }}
            {% endif %}
          personal_events: >-
            {% if personal_event_window is mapping and personal_event_window.events is defined %}
              {{ personal_event_window.events | to_json }}
            {% elif personal_event_window is mapping and personal_event_window['calendar.ryan_claussen'] is defined and personal_event_window['calendar.ryan_claussen'].events is defined %}
              {{ personal_event_window['calendar.ryan_claussen'].events | to_json }}
            {% else %}
              {{ [] | to_json }}
            {% endif %}
          work_trip_events: >-
            {% if work_trip_event_window is mapping and work_trip_event_window.events is defined %}
              {{ work_trip_event_window.events | to_json }}
            {% elif work_trip_event_window is mapping and work_trip_event_window['calendar.work_trip'] is defined and work_trip_event_window['calendar.work_trip'].events is defined %}
              {{ work_trip_event_window['calendar.work_trip'].events | to_json }}
            {% else %}
              {{ [] | to_json }}
            {% endif %}
          curling_events_list: >-
            {{ (curling_events | default('[]', true) | string | trim | from_json) }}
          personal_events_list: >-
            {{ (personal_events | default('[]', true) | string | trim | from_json) }}
          work_trip_events_list: >-
            {{ (work_trip_events | default('[]', true) | string | trim | from_json) }}
          curling_vacation_match_json: >-
            {% set now_ts = as_timestamp(now()) %}
            {% set ns = namespace(match=None) %}
            {% for event in curling_events_list %}
              {% set summary = event.summary | default('', true) | string %}
              {% set description = event.description | default('', true) | string %}
              {% set location = event.location | default('', true) | string %}
              {% set text = [summary, description, location] | join(' ') | lower %}
              {% set start_raw = event.start.dateTime | default(event.start.date, true) | default(event.start, true) %}
              {% set end_raw = event.end.dateTime | default(event.end.date, true) | default(event.end, true) %}
              {% set start_dt = as_datetime(start_raw) %}
              {% set end_dt = as_datetime(end_raw) %}
              {% if '#vacation' in text and start_dt is not none and end_dt is not none %}
                {% set start_ts = as_timestamp(start_dt) %}
                {% set end_ts = as_timestamp(end_dt) %}
                {% if end_ts > now_ts %}
                  {% if ns.match is none or start_ts < ns.match.start_ts %}
                    {% set ns.match = {
                      'message': summary,
                      'start_time': (start_dt | as_local).isoformat(),
                      'end_time': (end_dt | as_local).isoformat(),
                      'location': location,
                      'description': description,
                      'all_day': ('T' not in (start_raw | string)),
                      'active': (start_ts <= now_ts and end_ts > now_ts),
                      'start_ts': start_ts
                    } %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.match is none %}
              {{ {'message': '', 'start_time': '', 'end_time': '', 'location': '', 'description': '', 'all_day': false, 'active': false} | to_json }}
            {% else %}
              {{
                {
                  'message': ns.match.message,
                  'start_time': ns.match.start_time,
                  'end_time': ns.match.end_time,
                  'location': ns.match.location,
                  'description': ns.match.description,
                  'all_day': ns.match.all_day,
                  'active': ns.match.active
                } | to_json
              }}
            {% endif %}
          personal_vacation_match_json: >-
            {% set now_ts = as_timestamp(now()) %}
            {% set ns = namespace(match=None) %}
            {% for event in personal_events_list %}
              {% set summary = event.summary | default('', true) | string %}
              {% set description = event.description | default('', true) | string %}
              {% set location = event.location | default('', true) | string %}
              {% set text = [summary, description, location] | join(' ') | lower %}
              {% set start_raw = event.start.dateTime | default(event.start.date, true) | default(event.start, true) %}
              {% set end_raw = event.end.dateTime | default(event.end.date, true) | default(event.end, true) %}
              {% set start_dt = as_datetime(start_raw) %}
              {% set end_dt = as_datetime(end_raw) %}
              {% if '#vacation' in text and start_dt is not none and end_dt is not none %}
                {% set start_ts = as_timestamp(start_dt) %}
                {% set end_ts = as_timestamp(end_dt) %}
                {% if end_ts > now_ts %}
                  {% if ns.match is none or start_ts < ns.match.start_ts %}
                    {% set ns.match = {
                      'message': summary,
                      'start_time': (start_dt | as_local).isoformat(),
                      'end_time': (end_dt | as_local).isoformat(),
                      'location': location,
                      'description': description,
                      'all_day': ('T' not in (start_raw | string)),
                      'active': (start_ts <= now_ts and end_ts > now_ts),
                      'start_ts': start_ts
                    } %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.match is none %}
              {{ {'message': '', 'start_time': '', 'end_time': '', 'location': '', 'description': '', 'all_day': false, 'active': false} | to_json }}
            {% else %}
              {{
                {
                  'message': ns.match.message,
                  'start_time': ns.match.start_time,
                  'end_time': ns.match.end_time,
                  'location': ns.match.location,
                  'description': ns.match.description,
                  'all_day': ns.match.all_day,
                  'active': ns.match.active
                } | to_json
              }}
            {% endif %}
          # Only explicit flight summaries qualify here. Generic calendar locations like
          # "United States" or "Rochester" must not be treated as flights.
          flight_to_msp_match_json: >-
            {% set now_ts = as_timestamp(now()) %}
            {% set ns = namespace(match=None) %}
            {% for event in personal_events_list %}
              {% set summary = event.summary | default('', true) | string %}
              {% set description = event.description | default('', true) | string %}
              {% set location = event.location | default('', true) | string %}
              {% set summary_lower = summary | lower %}
              {% set text = [summary, description, location] | join(' ') | lower %}
              {% set route_summary = '→' in summary %}
              {% set named_flight = summary_lower.startswith('flight to ') or (summary_lower.startswith('flight: ') and ' to ' in summary_lower) %}
              {% set itinerary_marker = 'synced by flighty' in text or 'created from an email you received in gmail' in text or 'booking code:' in text or 'flight time ' in text %}
              {% set looks_like_flight = route_summary or named_flight or itinerary_marker %}
              {% set is_friend_itinerary = 'friend' in text %}
              {% set start_raw = event.start.dateTime | default(event.start.date, true) | default(event.start, true) %}
              {% set end_raw = event.end.dateTime | default(event.end.date, true) | default(event.end, true) %}
              {% set start_dt = as_datetime(start_raw) %}
              {% set end_dt = as_datetime(end_raw) %}
              {% set destination_code = '' %}
              {% set named_destination = '' %}
              {% if route_summary %}
                {% set destination_code = summary.split('→', 1)[1].split('•', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
              {% elif summary_lower.startswith('flight to ') %}
                {% set named_destination = summary[10:] %}
              {% elif summary_lower.startswith('flight: ') and ' to ' in summary_lower %}
                {% set flight_tail = summary[8:] %}
                {% set flight_tail_lower = summary_lower[8:] %}
                {% set to_index = flight_tail_lower.find(' to ') %}
                {% if to_index != -1 %}
                  {% set named_destination = flight_tail[to_index + 4:] %}
                {% endif %}
              {% endif %}
              {% if named_destination != '' %}
                {% set destination_code = named_destination.split(' (', 1)[0].split(' •', 1)[0] | regex_replace('[^A-Za-z]', '') | upper %}
              {% endif %}
              {% if looks_like_flight and not is_friend_itinerary and destination_code in ['MSP', 'MINNEAPOLIS', 'MINNEAPOLISSTPAUL', 'MINNESOTA'] and start_dt is not none and end_dt is not none %}
                {% set start_ts = as_timestamp(start_dt) %}
                {% set end_ts = as_timestamp(end_dt) %}
                {% if end_ts > now_ts %}
                  {% if ns.match is none or start_ts < ns.match.start_ts %}
                    {% set ns.match = {
                      'message': summary,
                      'start_time': (start_dt | as_local).isoformat(),
                      'end_time': (end_dt | as_local).isoformat(),
                      'location': location,
                      'description': description,
                      'all_day': ('T' not in (start_raw | string)),
                      'active': (start_ts <= now_ts and end_ts > now_ts),
                      'start_ts': start_ts
                    } %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.match is none %}
              {{ {'message': '', 'start_time': '', 'end_time': '', 'location': '', 'description': '', 'all_day': false, 'active': false} | to_json }}
            {% else %}
              {{
                {
                  'message': ns.match.message,
                  'start_time': ns.match.start_time,
                  'end_time': ns.match.end_time,
                  'location': ns.match.location,
                  'description': ns.match.description,
                  'all_day': ns.match.all_day,
                  'active': ns.match.active
                } | to_json
              }}
            {% endif %}
          flight_to_rst_match_json: >-
