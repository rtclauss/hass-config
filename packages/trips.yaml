            {% set raw_plan = (vacation_plan_json | default('', true) | string | trim) %}
            {% set raw_plan_state = raw_plan | lower %}
            {% if raw_plan == '' or raw_plan_state in ['unknown', 'unavailable', 'none', 'null'] %}
