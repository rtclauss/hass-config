# Home Assistant package for TV activity scenes and playback state handling.
# It wraps on, off, pause, and resume behaviors so other automations can react to TV usage without embedding low-level media-player logic everywhere.

################################################################
## Packages / TV
################################################################

################################################
## Customize
################################################

homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: "tv"

      expose: &expose
        <<: *customize
        haaska_hidden: false
        homebridge_hidden: false

    ################################################
    ## Automations
    ################################################

    ################################################
    ## Scenes
    ################################################

    ################################################
    ## Scripts
    ################################################

################################################
## Automation
################################################

automation:
  - id: tv_off
    alias: tv_off
    trigger:
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "on"
        to: "off"
        for:
          seconds: 15
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "on"
        to: "unavailable"
        for:
          seconds: 15
    action:
      - action: scene.turn_on
        target:
          entity_id: scene.scene_reset_basement
        data:
          transition: 4
      - action: light.turn_off
        target:
          entity_id: light.basement_tv_bias
        data:
          transition: 4

  - id: tv_on
    alias: tv_on
    trigger:
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        to: "on"
        for:
          seconds: 10
    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: binary_sensor.bayesian_bed_occupancy
          state: "off"
    action:
      - action: light.turn_on
        target:
          entity_id: light.basement_tv_bias
      - delay:
          seconds: 2
      - action: script.music_assistant_pause_house_audio

  - id: tv_off_at_night_bed_prep
    alias: tv_off_at_night_bed_prep
    trigger:
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "on"
        to: "off"
        for:
          seconds: 20
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "on"
        to: "unavailable"
        for:
          seconds: 20
      - trigger: event
        event_type: zha_event
        event_data:
          device_ieee: "00:15:8d:00:02:12:fc:ff"
          command: "attribute_updated"
      - trigger: state
        entity_id:
          - sensor.hall_button_action
        to: "single"
    condition:
      condition: and
      conditions:
        - condition: time
          after: "20:00:00"
          before: "04:00:00"
        - condition: state
          entity_id: input_boolean.guest_mode
          state: "off"
        - condition: state
          entity_id: binary_sensor.bayesian_bed_occupancy
          state: "off"
    action:
      - action: cover.close_cover
        target:
          entity_id:
            - cover.garage_door
      - action: media_player.turn_off
        data:
          entity_id: media_player.lg_webos_smart_tv
      - action: media_player.volume_set
        data:
          entity_id:
            - media_player.bedroom_sonos_2
            - media_player.bathroom_sonos_2
          volume_level: 0.02
      - action: scene.turn_on
        target:
          entity_id: scene.bedroom_prep
        data:
          transition: 60
      - action: script.turn_on
        target:
          entity_id: script.spotify_bedtime
      - delay: "00:20:00"
      - action: switch.turn_off
        target:
          entity_id: switch.sleep_mode

  - id: tv_paused
    alias: tv_paused
    initial_state: true
    trigger:
      - trigger: state
        entity_id: media_player.basement
        from: "playing"
        to: "paused"
        for:
          seconds: 5
      - trigger: state
        entity_id: media_player.plex_basement_apple_tv
        from: "playing"
        to: "paused"
        for:
          seconds: 5
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "playing"
        to: "paused"
        for:
          seconds: 2
    condition:
      condition: and
      conditions:
        - condition: time
          after: "19:30:00"
          before: "23:59:00"
        - condition: state
          entity_id: input_boolean.guest_mode
          state: "off"
    action:
      - action: scene.turn_on
        target:
          entity_id: scene.tv_paused
        data:
          transition: 4

  - id: tv_watching_scotland
    alias: tv_watching_scotland
    initial_state: true
    trigger:
      - trigger: state
        entity_id: media_player.basement
        to: "playing"
        for:
          seconds: 5
      - trigger: state
        entity_id: media_player.plex_basement_apple_tv
        to: "playing"
        for:
          seconds: 5
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        from: "playing"
        to: "paused"
        for:
          seconds: 2
    condition:
      condition: and
      conditions:
        - >-
          {{ 'Scotland' in (state_attr('media_player.basement', 'media_title') or '')
          or 'Scotland' in
          (state_attr('media_player.plex_basement_apple_tv', 'media_title') or '') }}
    action:
      - action: light.turn_on
        target:
          entity_id: light.basement_tv_bias
        data:
          rgb_color:
            - 254
            - 11
            - 255

  - id: tv_resumed
    alias: tv_resumed
    initial_state: true
    trigger:
      - trigger: state
        entity_id: media_player.lg_webos_smart_tv
        to: "playing"
        for:
          seconds: 10
      - trigger: state
        entity_id: media_player.basement
        to: "playing"
        for:
          seconds: 5
      - trigger: state
        entity_id: media_player.plex_basement_apple_tv
        to: "playing"
        for:
          seconds: 5
    condition:
      condition: and
      conditions:
        - condition: time
          after: "19:30:00"
          before: "23:59:00"
        - condition: state
          entity_id: input_boolean.guest_mode
          state: "off"
    action:
      - action: media_player.media_pause
        data:
          entity_id:
            - media_player.office_sonos_2
            - media_player.den_sonos_2
      - action: script.lights_off_except
        data:
          exclude_lights:
            - light.outside_front_hue
            - light.outside_north_west_garage
            - light.outside_south_west_garage
            - light.outside_front_door
            - light.basement_tv_bias
          transition: 15
      - action: script.turn_on
        target:
          entity_id: script.night_tv_mode_switches
      - action: media_player.media_pause
        data:
          entity_id:
            - media_player.den_sonos_2
      - action: script.music_assistant_pause_house_audio

################################################
## Scenes
################################################

scene:
  - name: tv_paused
    entities:
      light.basement_great_room:
        state: "on"
        brightness: 128
      light.kitchen_sink_overhead:
        state: "on"
        brightness: 255
      light.den_floods:
        state: "on"
        brightness: 255

  - name: tv_resumed
    entities:
      light.basement_great_room:
        state: "off"
      light.kitchen_all:
        state: "off"
      light.hall_all:
        state: "off"
      light.den_all:
        state: "off"
      light.office_all:
        state: "off"
      light.office_floor_lamp_1:
        state: "off"
      light.office_floor_lamp_2:
        state: "off"
      light.deck_string:
        state: "off"

################################################
## Scripts
################################################

script:
  wait_for_basement_media_player_ready:
    alias: "Wait for Basement Media Player"
    mode: parallel
    sequence:
      - if:
          - condition: not
            conditions:
              - condition: state
                entity_id: media_player.basement
                state: "off"
        then:
          - stop: Basement player already ready
      - repeat:
          sequence:
            - wait_for_trigger:
                - trigger: state
                  entity_id: media_player.basement
                  from: "off"
              timeout: "00:00:01"
              continue_on_timeout: true
          until:
            - condition: not
              conditions:
                - condition: state
                  entity_id: media_player.basement
                  state: "off"

  wait_for_basement_plex_client_ready:
    alias: "Wait for Basement Plex Client"
    mode: parallel
    sequence:
      - if:
          - condition: not
            conditions:
              - condition: state
                entity_id: media_player.plex_basement_apple_tv
                state: "unavailable"
        then:
          - stop: Plex client already ready
      - repeat:
          count: 10
          sequence:
            - wait_for_trigger:
                - trigger: state
                  entity_id: media_player.plex_basement_apple_tv
                  from: "unavailable"
              timeout: "00:00:01"
              continue_on_timeout: true
            - if:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: media_player.plex_basement_apple_tv
                      state: "unavailable"
              then:
                - stop: Plex client ready
      - condition: not
        conditions:
          - condition: state
            entity_id: media_player.plex_basement_apple_tv
            state: "unavailable"

  watch_tv:
    alias: "Watch TV"
    sequence:
      - action: media_player.turn_on
        data:
          entity_id: media_player.basement
      - action: script.wait_for_basement_media_player_ready
      - delay:
          seconds: 10
      - action: media_player.select_source
        data:
          entity_id: media_player.lg_webos_smart_tv
          source: "HDMI 3"
      - action: media_player.select_source
        data:
          entity_id: media_player.basement
          source: "YouTube TV"

  watch_youtube:
    alias: "Watch YouTube"
    sequence:
      - action: media_player.turn_on
        data:
          entity_id: media_player.basement
      - action: script.wait_for_basement_media_player_ready
