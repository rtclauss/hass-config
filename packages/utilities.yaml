########################
frontend: {}

########################
# Groups
########################
group: {}

########################
# Input Booleans
########################
input_boolean: {}

########################
# Input DateTime
########################
input_datetime:
  summer_energy:
    has_date: true
    has_time: false
  non_summer_energy:
    has_date: true
    has_time: false

########################
# Input Numbers
########################
input_number:
  electrical_rate:
    name: Electrical Rate
    min: .00008
    max: .20000
    step: 0.00001
    mode: box
    # TODO update the unit of measure
    unit_of_measurement: USD/kWh
  ev_electrical_rate:
    name: EV Electrical Rate
    min: .00001
    max: 1.00000
    step: 0.00001
    mode: box
    unit_of_measurement: USD/kWh
  # Seeded from the current Woodbury, MN regular "Week Ago Avg." value on
  # https://www.way.com/gas/prices/minnesota/woodbury and used as a manual
  # fallback if the live scrape ever fails. Woodbury is the city for ZIP 55125.
  weekly_regular_gas_price_55125_fallback:
    name: 55125 Weekly Gas Price Fallback
    min: 0.50000
    max: 8.00000
    step: 0.01000
    mode: box
    unit_of_measurement: USD/gal
    initial: 3.76

########################
# Input Select
########################
input_select: {}

########################
# iOS
########################
ios: {}

########################
# Light
########################
light: []

########################
# Media Player
########################
media_player: []

########################
# Notify
########################
notify: []

########################
# Octoprint
########################
# YAML Deprecated 2022.2
# octoprint:

########################
# Plant
########################
plant: {}

########################
# REST Command
########################
rest_command:
  turn_on_watermeter_light:
    url: http://watermeter.iot.rtclauss.org/lighton
    method: GET
  turn_off_watermeter_light:
    url: http://watermeter.iot.rtclauss.org/lightoff
    method: GET
  trigger_flow_watermeter_light:
    url: http://watermeter.iot.rtclauss.org/flow_start
    method: GET

########################
# REST
########################
rest:
  - resource: https://www.way.com/gas/prices/minnesota/woodbury
    scan_interval: 43200
    timeout: 30
    headers:
      Accept: text/html
      User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:146.0) Gecko/20100101 Firefox/146.0
    sensor:
      - name: Woodbury Weekly Regular Gas Price Live
        unique_id: woodbury_weekly_regular_gas_price_live
        icon: mdi:gas-station
        unit_of_measurement: USD/gal
        value_template: >-
          {% set matches = value | regex_findall('Week Ago Avg\\.\\s*\\$([0-9]+\\.[0-9]+)') %}
          {% if matches | count > 0 %}
            {{ matches[0] | float(default=0) | round(2) }}
          {% else %}
            {{ none }}
          {% endif %}

########################
# Scenes
########################
scene: []

########################
# Scripts
########################
script: {}

########################
# Sensor
########################
sensor:
  # Sometimes the raw value will drop to zero so filter out the large swings
  - platform: filter
    name: filtered_raw_electrical_sensor
    entity_id: sensor.raw_house_electrical_meter
    #device_class: energy
    filters:
      - filter: outlier
        window_size: 10
        radius: 50
  - platform: history_stats
    name: Sump Pump Time On past 24 hours
    entity_id: binary_sensor.sump_pump_on
    state: "on"
    type: time
    end: "{{ now() }}"
    duration:
      days: 1
  - platform: history_stats
    name: Sump Runs
    entity_id: binary_sensor.sump_pump_on
    state: "on"
    type: count
    end: "{{ now() }}"
    duration:
      days: 1

########################
# Switch
########################
switch: []

########################
# Template
########################
template:
  - sensor:
      - name: house_electrical_meter
        unique_id: house_electrical_meter
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: kWh
        availability: >
          {{ states('sensor.filtered_raw_electrical_sensor') not in ['unknown', 'unavailable', 'none', 'None', ''] }}
        state: >-
          {% if states('sensor.filtered_raw_electrical_sensor') in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {{ none }}
          {% else %}
            {{ (states('sensor.filtered_raw_electrical_sensor') | float(default=0)) / 100.0 }}
          {% endif %}
      - name: house_electrical_meter_non_ev
        unique_id: house_electrical_meter_non_ev
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: kWh
        availability: >
          {{
            states('sensor.house_electrical_meter') not in ['unavailable', 'unknown', 'Unavailable', 'Unknown']
            and (
              states('device_tracker.nigori_location_tracker') | default('', true) | lower != 'home'
              or states('sensor.nigori_energy_added') not in ['unavailable', 'unknown', 'Unavailable', 'Unknown']
            )
          }}
        state: >-
          {% set house_kwh = states('sensor.house_electrical_meter') | float(default=0) %}
          {% set ev_kwh = states('sensor.nigori_energy_added') | float(default=0) %}
          {% set home_charging = (states('device_tracker.nigori_location_tracker') | default('', true) | lower) == 'home' %}
          {% set calculated = house_kwh - ev_kwh if home_charging else house_kwh %}
          {% set calculated = [calculated, 0] | max %}
          {% set previous = this.state | float(default=calculated) %}
          {{ [calculated, previous] | max | round(3) }}
      - name: house_electrical_rate
        unique_id: house_electrical_rate
        icon: mdi:currency-usd
        state_class: measurement
        unit_of_measurement: USD/kWh
        state: "{{ states('input_number.electrical_rate') }}"
      - name: tariff_under_15k_water
        unique_id: tariff_under_15k_water
        icon: mdi:cash-minus
        unit_of_measurement: $/gal
        state: "0.00486"
      - name: tariff_between_16k_30K_gal
        unique_id: tariff_between_16k_30K_gal
        icon: mdi:cash-minus
        unit_of_measurement: $/gal
        state: "0.00497"
      - name: ev_charging_tariff
        unique_id: ev_charging_tariff
        icon: mdi:cash-clock
        state: >-
          {% set tariff = states('select.daily_ev_charging') %}
          {% if tariff in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set tariff = states('select.hourly_ev_charging') %}
          {% endif %}
          {% set labels = {
            'off_peak': 'Off-Peak',
            'mid_peak': 'Mid-Peak',
            'on_peak': 'On-Peak'
          } %}
          {{ labels.get(tariff, 'Unknown') }}
      - name: ev_charging_tariff_rate
        unique_id: ev_charging_tariff_rate
        icon: mdi:currency-usd
        state_class: measurement
        unit_of_measurement: USD/kWh
        state: "{{ states('input_number.ev_electrical_rate') }}"
      - name: daily_ev_charging_energy
        unique_id: daily_ev_charging_energy
        icon: mdi:car-electric
        device_class: energy
        unit_of_measurement: kWh
        state: >-
          {{
            (
              states('sensor.daily_ev_charging_off_peak') | float(default=0)
              + states('sensor.daily_ev_charging_mid_peak') | float(default=0)
              + states('sensor.daily_ev_charging_on_peak') | float(default=0)
            ) | round(2)
          }}
      - name: monthly_ev_charging_energy
        unique_id: monthly_ev_charging_energy
        icon: mdi:car-electric
        device_class: energy
        unit_of_measurement: kWh
        state: >-
          {{
            (
              states('sensor.monthly_ev_charging_off_peak') | float(default=0)
              + states('sensor.monthly_ev_charging_mid_peak') | float(default=0)
              + states('sensor.monthly_ev_charging_on_peak') | float(default=0)
            ) | round(2)
          }}
      - name: daily_ev_charging_cost
        unique_id: daily_ev_charging_cost
        icon: mdi:cash
        unit_of_measurement: USD
        state: >-
          {% set season = states('select.daily_electricity') %}
          {% if season in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set season = 'summer' if now().month in [6, 7, 8, 9] else 'non-summer' %}
          {% endif %}
          {% set off_peak_kwh = states('sensor.daily_ev_charging_off_peak') | float(default=0) %}
          {% set mid_peak_kwh = states('sensor.daily_ev_charging_mid_peak') | float(default=0) %}
          {% set on_peak_kwh = states('sensor.daily_ev_charging_on_peak') | float(default=0) %}
          {% set mid_peak_rate = 0.1377 if season == 'summer' else 0.1238 %}
          {{
            (
              (off_peak_kwh * 0.0755)
              + (mid_peak_kwh * mid_peak_rate)
              + (on_peak_kwh * 0.4420)
            ) | round(2)
          }}
      - name: monthly_ev_charging_cost
        unique_id: monthly_ev_charging_cost
        icon: mdi:cash-multiple
        unit_of_measurement: USD
        state: >-
          {% set season = states('select.daily_electricity') %}
          {% if season in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set season = 'summer' if now().month in [6, 7, 8, 9] else 'non-summer' %}
          {% endif %}
          {% set off_peak_kwh = states('sensor.monthly_ev_charging_off_peak') | float(default=0) %}
          {% set mid_peak_kwh = states('sensor.monthly_ev_charging_mid_peak') | float(default=0) %}
          {% set on_peak_kwh = states('sensor.monthly_ev_charging_on_peak') | float(default=0) %}
          {% set mid_peak_rate = 0.1377 if season == 'summer' else 0.1238 %}
          {{
            (
              (off_peak_kwh * 0.0755)
              + (mid_peak_kwh * mid_peak_rate)
              + (on_peak_kwh * 0.4420)
            ) | round(2)
          }}
      - name: weekly_ev_charging_cost
        unique_id: weekly_ev_charging_cost
        icon: mdi:cash-clock
        unit_of_measurement: USD
        state: >-
          {% set season = states('select.daily_electricity') %}
          {% if season in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set season = 'summer' if now().month in [6, 7, 8, 9] else 'non-summer' %}
          {% endif %}
          {% set off_peak_kwh = states('sensor.weekly_ev_charging_off_peak') | float(default=0) %}
          {% set mid_peak_kwh = states('sensor.weekly_ev_charging_mid_peak') | float(default=0) %}
          {% set on_peak_kwh = states('sensor.weekly_ev_charging_on_peak') | float(default=0) %}
          {% set mid_peak_rate = 0.1377 if season == 'summer' else 0.1238 %}
          {{
            (
              (off_peak_kwh * 0.0755)
              + (mid_peak_kwh * mid_peak_rate)
              + (on_peak_kwh * 0.4420)
            ) | round(2)
          }}
      - name: average_daily_ev_charging_cost
        unique_id: average_daily_ev_charging_cost
        icon: mdi:cash-fast
        state_class: measurement
        unit_of_measurement: USD/day
        state: >-
          {% set elapsed_days = [now().weekday() + 1, 1] | max %}
          {% set weekly_cost = states('sensor.weekly_ev_charging_cost') | float(default=0) %}
          {{ (weekly_cost / elapsed_days) | round(2) }}
      - name: weekly_regular_gas_price_55125
        unique_id: weekly_regular_gas_price_55125
        icon: mdi:gas-station
        state_class: measurement
        unit_of_measurement: USD/gal
        attributes:
          source: >-
            {% set live = states('sensor.woodbury_weekly_regular_gas_price_live') %}
            {% if live not in ['unknown', 'unavailable', 'none', 'None', ''] %}
              live
            {% else %}
              fallback
            {% endif %}
          source_url: https://www.way.com/gas/prices/minnesota/woodbury
          coverage_area: Woodbury, Minnesota (ZIP 55125 local market)
        state: >-
          {% set live = states('sensor.woodbury_weekly_regular_gas_price_live') %}
          {% if live not in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {{ live | float(default=0) | round(2) }}
          {% else %}
            {{ states('input_number.weekly_regular_gas_price_55125_fallback') | float(default=0) | round(2) }}
          {% endif %}
      - name: average_daily_vehicle_miles
        unique_id: average_daily_vehicle_miles
        icon: mdi:map-marker-distance
        state_class: measurement
        unit_of_measurement: mi/day
        state: >-
          {% set elapsed_days = [now().weekday() + 1, 1] | max %}
          {% set weekly_miles = states('sensor.weekly_vehicle_mileage') | float(default=0) %}
          {{ (weekly_miles / elapsed_days) | round(1) }}
      - name: average_daily_gas_car_cost_30mpg
        unique_id: average_daily_gas_car_cost_30mpg
        icon: mdi:gas-station-outline
        state_class: measurement
        unit_of_measurement: USD/day
        state: >-
          {% set daily_miles = states('sensor.average_daily_vehicle_miles') | float(default=0) %}
          {% set gas_price = states('sensor.weekly_regular_gas_price_55125') | float(default=0) %}
          {{ ((daily_miles / 30) * gas_price) | round(2) }}
      - name: average_daily_ev_savings_vs_30mpg
        unique_id: average_daily_ev_savings_vs_30mpg
        icon: mdi:piggy-bank
        state_class: measurement
        unit_of_measurement: USD/day
        state: >-
          {% set gas_cost = states('sensor.average_daily_gas_car_cost_30mpg') | float(default=0) %}
          {% set ev_cost = states('sensor.average_daily_ev_charging_cost') | float(default=0) %}
          {{ (gas_cost - ev_cost) | round(2) }}

########################
# Utility Meter
########################
utility_meter:
  hourly_electricity:
    source: sensor.house_electrical_meter
    cycle: hourly
    tariffs:
      - non-summer
      - summer
  daily_electricity:
    source: sensor.house_electrical_meter
    cycle: daily
    tariffs:
      - non-summer
      - summer
  monthly_electricity:
    source: sensor.house_electrical_meter
    cycle: monthly
    tariffs:
      - non-summer
      - summer
  # Dakota Electric EV TOU is modeled from the Tesla integration's cumulative
  # energy-added sensor. This tracks energy added to the car battery, not
  # utility-side wall losses, but it is the best EV-specific counter available
  # in the current configuration.
  hourly_ev_charging:
    source: sensor.nigori_energy_added
    cycle: hourly
    tariffs:
      - off_peak
      - mid_peak
      - on_peak
  daily_ev_charging:
    source: sensor.nigori_energy_added
    cycle: daily
    tariffs:
      - off_peak
      - mid_peak
      - on_peak
  weekly_ev_charging:
    source: sensor.nigori_energy_added
    cycle: weekly
    tariffs:
      - off_peak
      - mid_peak
      - on_peak
  monthly_ev_charging:
    source: sensor.nigori_energy_added
    cycle: monthly
    tariffs:
      - off_peak
      - mid_peak
      - on_peak
  weekly_vehicle_mileage:
    source: sensor.nigori_odometer
    cycle: weekly
