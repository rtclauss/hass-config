alarm_control_panel: []

########################
## Automation
########################
automation:
  - alias: restart_water_meter
    id: restart_water_meter
    trigger:
      - trigger: time_pattern
        hours: "/1"
    condition: []
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.basement_water_meter_plug
      - delay:
          seconds: 20
      - action: switch.turn_on
        target:
          entity_id: switch.basement_water_meter_plug

        # in the wintertime the humidifier causes the meter to think there is a leak, throwing up a persistent error message that we need
        # to get past.
  - alias: trigger_winter_watermeter_flow
    id: trigger_winter_watermeter_flow
    trigger:
      - trigger: time_pattern
        minutes: "/23"
    condition:
      - alias: "winter month"
        condition: template
        value_template: "{{now().month in [1,2,10,11,12]}}"
    action:
      - action: rest_command.turn_off_watermeter_light
      - delay:
          seconds: 1
      - action: rest_command.turn_on_watermeter_light
      - delay:
          seconds: 2
      - action: rest_command.turn_off_watermeter_light
      - delay:
          seconds: 3
      - action: rest_command.turn_on_watermeter_light
      - delay:
          seconds: 3
      - action: rest_command.trigger_flow_watermeter_light
      - delay:
          minutes: 4
      - action: rest_command.turn_off_watermeter_light

  - alias: check_non_responding_entities
    id: check_non_responding_entities
    trigger:
      - trigger: time_pattern
        hours: "/12"
    action:
      - action: persistent_notification.create
        data:
          title: Stale Entities
          message: >-
            The following entities have not updated in 24 hours:
            {%- for item in expand(states.binary_sensor, states.device_tracker, states.fan, states.light, states.lock, states.media_player, states.sensor, states.switch, states.vacuum) if (
              not is_state_attr(item.entity_id, 'hidden', true)
              and (now()-as_local(item.last_updated) > timedelta(hours=12))
              and not (item.entity_id | lower).find('update') != -1
              and not (item.entity_id | lower).find('heading') != -1
              and not (item.entity_id | lower).find('alert') != -1
              and not (item.entity_id | lower).find('season') != -1
              and not (item.entity_id | lower).endswith('microphone')
              and not (item.entity_id | lower).endswith('hacs')
              and not (item.entity_id | lower).find('sonos') != -1
            )-%}
              {{ item.entity_id }}
            {% if not loop.last %}, {% endif %}
            {%- endfor -%}

  - id: switch_electrical_tariff
    alias: switch_electrical_tariff
    trigger:
      - trigger: template
        value_template: >-
          {{ now().month == 6 and now().day == 1}}
        id: summer_rate
        variables:
          tariff: "summer"
      - trigger: template
        value_template: >-
          {{ now().month == 10 and now().day == 1}}
        id: nonsummer_rate
        variables:
          tariff: "non-summer"
      # - platform: time
      #   at: input_datetime.summer_energy
      #   id: summer
      # - platform: time
      #   at: input_datetime.non_summer_energy
      #   id: nonsummer
    action:
      - action: select.select_option
        target:
          entity_id: select.hourly_electricity
        data:
          option: "{{ tariff }}"
      - action: select.select_option
        target:
          entity_id: select.daily_electricity
        data:
          option: "{{ tariff }}"
      - action: select.select_option
        target:
          entity_id: select.monthly_electricity
        data:
          option: "{{ tariff }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.electrical_rate
        data:
          value: >-
            {% if trigger.id == "nonsummer_rate" %}
              .1397
            {% else %}
              .1258
            {% endif %}

  - id: switch_ev_charging_tariff
    alias: switch_ev_charging_tariff
    description: >
      Keep the EV charging utility meters on Dakota Electric's time-of-use
      schedule. Weekends and holidays stay off-peak all day.
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: binary_sensor.workday_sensor
      - trigger: time
        at: "00:05:00"
      - trigger: time
        at: "08:00:00"
      - trigger: time
        at: "16:00:00"
      - trigger: time
        at: "21:00:00"
    variables:
      ev_season: >-
        {% set seasonal_tariff = states('select.daily_electricity') %}
        {% if seasonal_tariff in ['summer', 'non-summer'] %}
          {{ seasonal_tariff }}
        {% elif now().month in [6, 7, 8, 9] %}
          summer
        {% else %}
          non-summer
        {% endif %}
      ev_tariff: >-
        {% if is_state('binary_sensor.workday_sensor', 'off') %}
          off_peak
        {% elif now().hour < 8 or now().hour >= 21 %}
          off_peak
        {% elif now().hour < 16 %}
          mid_peak
        {% else %}
          on_peak
        {% endif %}
      ev_rate: >-
        {% if ev_tariff == 'off_peak' %}
          0.0755
        {% elif ev_tariff == 'on_peak' %}
          0.4420
        {% elif ev_season == 'summer' %}
          0.1377
        {% else %}
          0.1238
        {% endif %}
    action:
      - action: select.select_option
        target:
          entity_id: select.hourly_ev_charging
        data:
          option: "{{ ev_tariff }}"
      - action: select.select_option
        target:
          entity_id: select.daily_ev_charging
        data:
          option: "{{ ev_tariff }}"
      - action: select.select_option
        target:
          entity_id: select.monthly_ev_charging
        data:
          option: "{{ ev_tariff }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_electrical_rate
        data:
          value: "{{ ev_rate }}"

  - id: switch_water_tariff
    alias: switch_water_tariff
    trigger:
      []
      # - platform: time
      #   at: "09:00:00"
      #   variables:
      #     tariff: "peak"
      # - platform: time
      #   at: "21:00:00"
      #   variables:
      #     tariff: "offpeak"
    action:
      - action: select.select_option
        target:
          entity_id: select.daily_energy
        data:
          option: "{{ tariff }}"
      - action: select.select_option
        target:
          entity_id: select.monthly_energy
        data:
          option: "{{ tariff }}"

  - alias: Restart AppDaemon on HA Startup or load cells unavailable
    description: When HA starts up, or bed load cells are unavailable restart AppDaemon
    id: restart_appdaemon_on_ha_startup
    trigger:
      - trigger: homeassistant
        event: start

      # action:
      #   - action: notify.mobile_app_wethop
      #     data:
      #       message: >-
      #         Restarting AppDaemon. Check the Automation Log
    action:
      - action: hassio.addon_restart
        data:
          addon: a0d7b954_appdaemon

  - alias: Restart Music Assistant every 12.17 hours
    description: >
      Restart the Music Assistant add-on on a self-rescheduling loop to work
      around Sonos DNS issues.
    id: restart_music_assistant_every_12_17_hours
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - repeat:
          while:
            - condition: template
              value_template: "{{ true }}"
          sequence:
            # 12.17 hours interpreted as decimal hours: 12 hours, 10 minutes, 12 seconds.
            - delay: "12:10:12"
            - action: hassio.addon_restart
              data:
                addon: d5369777_music_assistant

  - alias: Turn Sump Back On
    id: turn_sump_back_on
    trigger:
      - trigger: state
        entity_id:
          - switch.basement_sump_pump
        to: "off"
      - trigger: state
        entity_id:
          - switch.basement_sump_pump
        not_to: "on"
      - trigger: homeassistant
        event: start
    action:
      - action: switch.turn_on
        target:
          entity_id:
            - switch.basement_sump_pump

  - alias: Turn Laundry Plugs Back On
    id: turn_laundry_plugs_back_on
    trigger:
      - trigger: state
        entity_id:
          - switch.laundry_room_washing_machine
          - switch.laundry_room_dryer
        to: "off"
      - trigger: state
        entity_id:
          - switch.laundry_room_washing_machine
          - switch.laundry_room_dryer
        not_to: "on"
      - trigger: homeassistant
        event: start
    action:
      - action: switch.turn_on
        target:
          entity_id:
            - switch.laundry_room_washing_machine
            - switch.laundry_room_dryer

  - alias: Notify Sump Pit Getting Full
    id: notify_sump_pit_getting_full
    trigger:
      - trigger: numeric_state
        entity_id: sensor.sump_fill
        below: 0.3
    action:
      - action: notify.all
        data:
          message: >-
            "Sump pit is getting full! Check the sump pump!"

  - alias: Notify Sump Pit Full
    id: notify_sump_pit_full
    trigger:
      - trigger: numeric_state
        entity_id: sensor.sump_fill
        below: 0.2
    action:
      - action: notify.all
        data:
          message: >-
            "Sump pit is getting very full! Check the sump pump!"

  - alias: Notify Sump Runs
    id: notify_sump_runs
    description: Notify number of times the sump pump runs
    trigger:
      - trigger: time
        at: "12:30:00"
    condition:
      - alias: "Number of times the sump ran"
        condition: numeric_state
        entity_id: sensor.sump_runs
        above: 0
    action:
      - action: notify.all
        data:
          message: >-
            {% set sump_runtime = states("sensor.sump_pump_time_on_past_24_hours")|float * 60 *60 %}

            {%- macro phrase(name, divisor, mod=None) %}
              {%- if name == 's' and (sump_runtime < 60) %}
                {{-'{}{}'.format(sump_runtime, name)}}
              {%- else %}
                {%- set value = ((sump_runtime // divisor) % (mod if mod else divisor)) | int %}
                {{- '{}{}'.format(value, name) if value | int > 0 else '' }}
              {%- endif %}
            {%- endmacro %}

            {%- set values = [
                      phrase('w', 60*60*24*7),
                      phrase('d', 60*60*24, 7),
                      phrase('h', 60*60, 24),
                      phrase('m', 60),
                      phrase('s', 1),
                  ] | select('!=','')| list %}

            The sump pump ran {{states("sensor.sump_runs")}}x for {{ values | join(',') }} in the last 24 hours.

  - alias: Notify Garbage
    id: notify_garbage_day
    description: Notify garbage day
    trigger:
      - trigger: time
        at: "14:30:00"
    condition:
      - condition: template
        value_template: "{{ states('sensor.garbage_pickup_date') not in ['unknown', 'unavailable', 'none', 'None', ''] }}"
    action:
      - choose:
          - conditions:
              - alias: Only on Tuesdays (Day before Garbage Day/Wednesday)
                condition: time
                weekday:
                  - tue
              - alias: Pickup shifted to Thursday this week
                condition: template
                value_template: >-
                  {% set pickup_date = as_datetime(states('sensor.garbage_pickup_date')).date() %}
                  {{ pickup_date == (now().date() + timedelta(days=2)) }}
            sequence:
              - action: notify.all
                data:
                  message: DO NOT put out bins tonight. Garbage day has changed!
          - conditions:
              - alias: Pickup is tomorrow
                condition: template
                value_template: >-
                  {% set pickup_date = as_datetime(states('sensor.garbage_pickup_date')).date() %}
                  {{ pickup_date == (now().date() + timedelta(days=1)) }}
            sequence:
              - action: notify.all
                data:
                  message: >-
                    Put out bins tonight. Garbage tomorrow.

  - alias: Restart CPAP
    id: restart_cpap
    description: Restart CPAP so Bluetooth keeps working
    trigger:
      - trigger: time
        at: "15:30:00"
    condition:
      - alias: "Restart Days"
        condition: time
        weekday:
          - mon
          - wed
          - fri
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.owner_suite_cpap_plug
      - delay: 0:20
      - action: switch.turn_on
        target:
          entity_id: switch.owner_suite_cpap_plug

  - alias: Turn CPAP Back On
    id: turn_CPAP_back_on
    trigger:
      - trigger: state
        entity_id:
          - switch.owner_suite_cpap_plug
        to: "off"
        for:
          minutes: 20
      - trigger: state
        entity_id:
          - switch.owner_suite_cpap_plug
        not_to: "on"
        for:
          minutes: 20
      - trigger: homeassistant
        event: start
    action:
      - action: switch.turn_on
        target:
          entity_id:
            - switch.owner_suite_cpap_plug

