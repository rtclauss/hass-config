# Outdoor tile include for the main Lovelace dashboard.
# It is intended for exterior lights, entry points, and other outside-facing controls that belong together operationally.

type: custom:vertical-stack-in-card
title: Outside
cards:
  - type: horizontal-stack
    cards:
      - type: entity-button
        entity: switch.front_door
        state_color: true
        name: "Front Door"
        tap_action:
          action: toggle
      - type: entity-button
        entity: switch.deck
        state_color: true
        name: "Deck"
        tap_action:
          action: toggle
        hold_action:
          action: more-info
      - type: entity-button
        entity: light.deck_string
        state_color: true
        icon: mdi:led-strip
        name: "Deck String"
        tap_action:
          action: toggle
        hold_action:
          action: more-info
