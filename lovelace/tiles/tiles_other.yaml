# Catch-all tile include for secondary indoor spaces.
# Use this section for controls that do not justify a dedicated room tile but should still appear on the Home dashboard.

type: custom:vertical-stack-in-card
title: Other
cards:
  - type: horizontal-stack
    cards:
      - type: entity-button
        entity: light.hallway_light
        state_color: true
        name: "Hallway"
        tap_action:
          action: toggle
        hold_action:
          action: more-info
      - type: entity-button
        entity: light.hall_stairway
        state_color: true
        name: " "
        tap_action:
          action: toggle
      - type: entity-button
        entity: light.basement_lamp
        state_color: true
        name: "Basement Lamp"
        tap_action:
          action: toggle

  - type: entities
    title: Tiki Room
    show_header_toggle: false
    entities:
      - entity: light.tiki_room_lights_tiki_room_strip
        name: Strip
      - entity: select.tiki_room_lights_tiki_room_strip_effect
        name: Effect
      - entity: number.tiki_room_lights_tiki_room_strip_animation_speed
        name: Animation Speed

  - type: entities
    title: Water Softener
    show_header_toggle: false
    entities:
      - entity: sensor.water_softener_forecast_status
        name: Forecast
      - entity: sensor.water_softener_days_until_low_salt
        name: Days until low
      - entity: sensor.water_softener_salt_level
        name: Salt level
      - entity: input_number.bags_of_salt_at_home
        name: Salt bags

  - type: custom:mini-media-player
    entity: media_player.bedroom_sonos_2
    name: Music
    icon: mdi:music-note
    hide:
      #volume: true
      source: true
