# Office tile include for the main Lovelace dashboard.
# Besides lights and fan controls, this section also surfaces standing-desk controls that belong with the office room context.

type: custom:vertical-stack-in-card
title: Office
cards:
  - type: horizontal-stack
    cards:
      - type: entity-button
        entity: light.office_ceiling
        state_color: true
        name: "Office"
        tap_action:
          action: toggle
        hold_action:
          action: more-info
      - type: entity-button
        entity: light.office_floor_lamp
        state_color: true
        name: "Office Lamp"
        tap_action:
          action: toggle
        hold_action:
          action: more-info

      - type: entity-button
        entity: light.office_red_lava_lamp
        state_color: true
        name: "Lava Lamp"
        tap_action:
          action: toggle
        hold_action:
          action: more-info

  - type: horizontal-stack
    cards:
      - type: custom:mini-graph-card
        name: Temp
        group: false
        align_state: center
        entities:
          - sensor.office_temperature
        color_thresholds:
          - value: 68
            color: "red"
          - value: 65
            color: "orange"
          - value: 62
            color: "yellow"
          - value: 55
            color: "blue"
        graph: line
        show:
          name: false
      - type: custom:mini-graph-card
        name: Humidity
        align_state: center
        entities:
          - sensor.office_humidity
        graph: line
        show:
          name: false

  - type: custom:mini-media-player
    entity: media_player.office_sonos_2
    hide:
      #volume: true
      source: true
    speaker_group:
      platform: sonos
      show_group_count: true
      entities: !include /config/lovelace/speaker_group.yaml

  - type: entities
    title: Desk
    entities:
      - entity: sensor.uplift_desk_75b205_height
        name: Current Height
        icon: mdi:arrow-expand-vertical

  - type: horizontal-stack
    cards:
      - type: entity-button
        entity: script.uplift_desk_manual_move_preset_1
        name: Sit
        icon: mdi:chair-rolling
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.uplift_desk_manual_move_preset_1
        hold_action:
          action: more-info
      - type: entity-button
        entity: script.uplift_desk_manual_move_preset_2
        name: Stand
        icon: mdi:human-handsup
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.uplift_desk_manual_move_preset_2
        hold_action:
          action: more-info
      - type: entity-button
        entity: script.uplift_desk_manual_move_max
        name: Max
        icon: mdi:arrow-up-bold-box
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.uplift_desk_manual_move_max
        hold_action:
          action: more-info

  - type: horizontal-stack
    cards:
      - type: entity-button
        entity: script.uplift_desk_manual_move_min
        name: Min
        icon: mdi:arrow-down-bold-box
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.uplift_desk_manual_move_min
        hold_action:
          action: more-info
      - type: entity-button
        entity: script.uplift_desk_manual_stop
        name: Stop
        icon: mdi:stop-circle
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.uplift_desk_manual_stop
        hold_action:
          action: more-info
