# Tesla charging status tile include.
# It summarizes live charging state, estimates, and helper information that support the vehicle dashboard and departure-planning automations.

#####
## Tile Template
##
## Check out:
##   https://github.com/akmolina28/HomeAssistantConfig/tree/master/lovelace/tiles
##   https://github.com/search?q=tiles+lovelace&type=Code
#####
---
type: vertical-stack
cards:
  - type: custom:vertical-stack-in-card
    title: Charging
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:mini-graph-card
            name: Range
            group: false
            #align_state: center
            entities:
              - sensor.nigori_battery
            color_thresholds:
              - value: 6
                color: "red"
              - value: 19
                color: "orange"
              - value: 100
                color: "blue"
            graph: line
            show:
              name: true
          - type: custom:mini-graph-card
            name: Range
            group: false
            #align_state: center
            entities:
              - sensor.nigori_range
            color_thresholds:
              - value: 60
                color: "red"
              - value: 75
                color: "orange"
              - value: 100
                color: "blue"
            graph: line
            show:
              name: true
          - type: custom:mini-graph-card
            name: Rate
            group: false
            #align_state: center
            entities:
              - sensor.nigori_charging_rate
            color_thresholds:
              - value: 60
                color: "red"
              - value: 75
                color: "orange"
              - value: 100
                color: "blue"
            graph: line
            show:
              name: true

      - type: horizontal-stack
        title:
        show_header_toggle: false
        cards:
          - type: markdown
            entity_id: sensor.charge_complete
            title: "Estimated Completion Time"
            content: >-
              {% if state_attr('sensor.nigori_charging_rate','time_left') > 0 %}
                ### {{ states('sensor.charge_complete')|as_timestamp(default=now()) | timestamp_custom('%b %d at %H:%M %Z') }}
              {% else %}
                ### Charging Complete
              {% endif %}
          # - type: entity
          #   entity: sensor.charge_complete
          #   name: "Estimated Completion Time"
          #   #icon: mdi:battery-charging-100
          #   #show_state: false

      - type: horizontal-stack
        title:
        show_header_toggle: false
        cards:
          - type: button
            entity: input_boolean.long_range_travel
            name: "Max Range Override"
            icon: mdi:backup-restore
            show_state: false
            state_color: true
            tap_action:
              action: call-service
              service: input_boolean.turn_on
              service_data:
                entity_id: input_boolean.long_range_travel
          - type: button
            entity: input_boolean.long_range_travel
            name: "Use Daily Plan"
            icon: mdi:ev-station
            show_state: false
            tap_action:
              action: call-service
              service: input_boolean.turn_off
              service_data:
                entity_id: input_boolean.long_range_travel
          - type: markdown
            entity_id: binary_sensor.upcoming_trip_charging
            title: "Reason"
            content: >-
              {% set trip_start_raw = state_attr('binary_sensor.upcoming_trip_charging', 'start_time') %}
              {% set has_calendar_departure = trip_start_raw not in [none, '', 'None'] %}
              {% if is_state('input_boolean.long_range_travel', 'on') %}
                ### Max-range override is active
                #### Charge limit pinned to 100% until you return to the daily plan
              {% elif has_calendar_departure %}
                ### {{ state_attr('binary_sensor.upcoming_trip_charging', 'entry') }}
                #### Departure plan: {{ trip_start_raw }}
                #### Distance: {{ state_attr("sensor.waze_next_trip_distance", "distance")| int(0) }} mi
              {% else %}
                ### Daily planner is active
                #### Charge limit and preconditioning follow tomorrow's trip, alarm, weather, and EV tariff inputs
              {% endif %}

      - type: horizontal-stack
        title:
        show_header_toggle: false
        cards:
          - type: markdown
            title: "Planner Decision"
            content: >-
              {% set tariff = states('sensor.ev_charging_tariff') %}
              {% set rate = states('sensor.ev_charging_tariff_rate') | float(default=0) %}
              {% set charge_limit = states('number.nigori_charge_limit') | int(default=80) %}
              {% set alarm_enabled = is_state('input_boolean.weekday_alarm_on', 'on') or is_state('input_boolean.weekend_alarm_on', 'on') %}
              {% set trip_start_raw = state_attr('binary_sensor.upcoming_trip_charging', 'start_time') %}
              {% set has_calendar_departure = trip_start_raw not in [none, '', 'None'] %}
              ### {{ charge_limit }}% target
              {% if is_state('input_boolean.long_range_travel', 'on') %}
                #### Manual override is forcing max range
              {% elif is_state('binary_sensor.upcoming_trip_charging', 'on') %}
                #### Planner is following the next trip
              {% elif has_calendar_departure %}
                #### Planner is following the next calendar departure
              {% elif alarm_enabled %}
                #### Planner is following tomorrow's alarm with cabin preconditioning enabled
              {% else %}
                #### No next-day departure plan is active
              {% endif %}
              #### Current EV tariff: {{ tariff }} at ${{ '%.4f' | format(rate) }}/kWh
          - type: entities
            title: "EV TOU"
            show_header_toggle: false
            entities:
              - entity: sensor.ev_charging_tariff
                name: Current Tariff
              - entity: sensor.ev_charging_tariff_rate
                name: Current Rate
              - entity: sensor.daily_ev_charging_energy
                name: Today's EV Energy
              - entity: sensor.daily_ev_charging_cost
                name: Today's EV Cost
              - entity: sensor.monthly_ev_charging_energy
                name: This Month EV Energy
              - entity: sensor.monthly_ev_charging_cost
                name: This Month EV Cost
