name: Enforce Main Promotion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  enforce-main-promotion:
    name: Enforce Main Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Require develop as the PR head
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "PRs into main must come from develop. Current head: ${{ github.head_ref }}"
            exit 1
          fi
