name: Validate Home Assistant Config

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Home Assistant 2026.4.0 regressed `check_config` for trigger-based automation,
  # script, and template validation. Keep this pinned until upstream fixes
  # home-assistant/core#167066 in a stable release.
  HOME_ASSISTANT_CHECK_CONFIG_IMAGE: ghcr.io/home-assistant/home-assistant:2026.3.4

concurrency:
  group: validate-home-assistant-config-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Run pytest
        run: uv run --with pytest pytest

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install lint and support checks
        run: python -m pip install --upgrade pip yamllint

      - name: Verify pinned Python tracks latest Home Assistant support
        run: python scripts/check_ha_python_support.py --python-version-file .python-version

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, empty-lines: disable, truthy: disable}}" \
            configuration.yaml \
            automations.yaml \
            blueprints \
            esphome \
            packages \
            zigbee2mqtt

  detect-esphome-changes:
    name: Detect ESPHome Config Changes
    runs-on: ubuntu-latest
    outputs:
      esphome_changed: ${{ steps.detect.outputs.esphome_changed }}
      esphome_configs: ${{ steps.detect.outputs.esphome_configs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed ESPHome configs
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags origin "$BASE_REF"
            diff_output=$(git diff --name-only "origin/$BASE_REF...HEAD")
          elif [[ "$EVENT_NAME" == "push" ]]; then
            if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
              diff_output=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")
            else
              diff_output=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
            fi
          else
            echo "esphome_changed=false" >> "$GITHUB_OUTPUT"
            echo "esphome_configs=" >> "$GITHUB_OUTPUT"
            echo "ESPHome build skipped for $EVENT_NAME events."
            exit 0
          fi

          changed_esphome_files=$(printf '%s\n' "$diff_output" | grep -E '^esphome/.*\.ya?ml$' | sort -u || true)

          config_files=()
          package_change=false

          while IFS= read -r config; do
            [[ -z "$config" ]] && continue

            if [[ "$config" =~ ^esphome/[^/]+\.ya?ml$ ]]; then
              if [[ -f "$config" ]]; then
                config_files+=("$config")
              else
                echo "Skipping removed ESPHome config: $config"
              fi
              continue
            fi

            package_change=true
          done <<< "$changed_esphome_files"

          if [[ "$package_change" == "true" ]]; then
            while IFS= read -r config; do
              [[ -z "$config" ]] && continue
              config_files+=("$config")
            done < <(grep -l "^packages:" esphome/*.yaml || true)
          fi

          if [[ ${#config_files[@]} -gt 0 ]]; then
            mapfile -t config_files < <(printf '%s\n' "${config_files[@]}" | sort -u)
          fi

          if [[ ${#config_files[@]} -eq 0 ]]; then
            echo "esphome_changed=false" >> "$GITHUB_OUTPUT"
            echo "esphome_configs=" >> "$GITHUB_OUTPUT"
            echo "No ESPHome config changes detected."
            exit 0
          fi

          echo "esphome_changed=true" >> "$GITHUB_OUTPUT"
          {
            echo "esphome_configs<<EOF"
            printf '%s\n' "${config_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed ESPHome configs:"
          printf '  - %s\n' "${config_files[@]}"

  esphome-build:
    name: ESPHome Build
    runs-on: ubuntu-latest
    if: ${{ needs.detect-esphome-changes.outputs.esphome_changed == 'true' }}
    needs:
      - yaml-lint
      - detect-esphome-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install ESPHome
        run: python -m pip install --upgrade pip esphome

      - name: Prepare ESPHome secrets for CI
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import re

          secret_pattern = re.compile(r"!secret\s+([A-Za-z0-9_]+)")
          key_pattern = re.compile(r"^\s*([A-Za-z0-9_]+)\s*:")

          config_dir = Path("esphome")
          secrets_path = config_dir / "secrets.yaml"

          referenced = set()
          for file_path in config_dir.glob("*.yaml"):
            if file_path.name == "secrets.yaml":
              continue
            content = file_path.read_text(encoding="utf-8", errors="ignore")
            referenced.update(secret_pattern.findall(content))

          existing = set()
          if secrets_path.exists():
            for line in secrets_path.read_text(encoding="utf-8", errors="ignore").splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                continue
              match = key_pattern.match(line)
              if match:
                existing.add(match.group(1))

          missing = sorted(referenced - existing)
          if missing:
            with secrets_path.open("a", encoding="utf-8") as file:
              for key in missing:
                file.write(f"{key}: ci_placeholder\n")
          PY

      - name: Validate and compile changed ESPHome configs
        env:
          ESPHOME_CONFIGS: ${{ needs.detect-esphome-changes.outputs.esphome_configs }}
        run: |
          set -euo pipefail

          if [[ -z "$ESPHOME_CONFIGS" ]]; then
            echo "No changed ESPHome configs were provided."
            exit 1
          fi

          while IFS= read -r config; do
            [[ -z "$config" ]] && continue
            echo "::group::ESPHome config check: $config"
            esphome config "$config"
            echo "::endgroup::"

            echo "::group::ESPHome compile: $config"
            esphome compile "$config"
            echo "::endgroup::"
          done <<< "$ESPHOME_CONFIGS"

  home-assistant-check-config:
    name: Home Assistant Check Config
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare test secrets
        run: |
          if [[ -f travis_secrets.yaml ]]; then
            cp travis_secrets.yaml secrets.yaml
          else
            touch secrets.yaml
          fi

      - name: Fill missing secrets with CI placeholders
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import re

          secret_pattern = re.compile(r"!secret\s+([A-Za-z0-9_]+)")
          key_pattern = re.compile(r"^\s*([A-Za-z0-9_]+)\s*:")

          files = [Path("configuration.yaml"), Path("automations.yaml")]

          for directory in (Path("packages"), Path("blueprints")):
            if directory.exists():
              files.extend(directory.rglob("*.yaml"))
              files.extend(directory.rglob("*.yml"))

          referenced = set()
          for file_path in files:
            if not file_path.is_file():
              continue
            content = file_path.read_text(encoding="utf-8", errors="ignore")
            referenced.update(secret_pattern.findall(content))

          secrets_path = Path("secrets.yaml")
          existing = set()
          for line in secrets_path.read_text(encoding="utf-8", errors="ignore").splitlines():
            line = line.strip()
            if not line or line.startswith("#"):
              continue
            match = key_pattern.match(line)
            if match:
              existing.add(match.group(1))

          missing = sorted(referenced - existing)
          if missing:
            with secrets_path.open("a", encoding="utf-8") as file:
              for key in missing:
                file.write(f"{key}: ci_placeholder\n")
          PY

      - name: Run Home Assistant config check
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${{ github.workspace }}:/config" \
            "$HOME_ASSISTANT_CHECK_CONFIG_IMAGE" \
            python -m homeassistant --config /config --script check_config 2>&1 | tee check-config.log

          if grep -Eq "(Failed config|ERROR:homeassistant\\.config:Invalid config|ERROR:homeassistant\\.config:Error loading)" check-config.log; then
            echo "Home Assistant reported configuration errors."
            exit 1
          fi
