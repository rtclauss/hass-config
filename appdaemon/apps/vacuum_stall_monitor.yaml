vacuum_stall_monitor_mainlevel:
  module: vacuum_stall_monitor
  class: VacuumStallMonitor
  vacuum_entity: vacuum.valetudo_mainlevel
  map_camera_entity: camera.valetudo_mainlevel_map_data
  area_sensor: sensor.valetudo_mainlevel_current_statistics_area
  segments_sensor: sensor.valetudo_mainlevel_map_segments
  friendly_name: Ground Floor Vacuum
  sample_interval_sec: 90
  history_size: 12
  stall_samples: 6
  notify_service: notify/all
  dashboard_url: /ryan-new-mushroom/cleaning-v2

