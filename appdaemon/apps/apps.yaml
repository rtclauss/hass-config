thermostat_stats:
  module: thermostat_stats
  class: ThermostatStats
  outside_temp_feels_like: sensor.tomorrow_io_the_brewery_feels_like
  outside_temp: sensor.outside_temperature
  outside_humidity: sensor.outside_humidity
  outside_cloud_cover: sensor.tomorrow_io_the_brewery_cloud_cover
  occupancy: binary_sensor.ecobee_home
  window_open: binary_sensor.fresh_air_open
  # Optional wind entities for better HVAC ETA modeling:
  # wind_speed: sensor.tomorrow_io_the_brewery_wind_speed
  # wind_gust: sensor.tomorrow_io_the_brewery_wind_gust
  # wind_bearing: sensor.tomorrow_io_the_brewery_wind_direction
  # Optional humidifier entities:
  humidifier: humidifier.my_ecobee
  thermostat_db: !secret thermostat_recorder_db_url
  thermostat: climate.my_ecobee
  house_average_temp: sensor.average_house_temp
  house_average_humidity: sensor.average_house_humidity
  sun: sun.sun

