---
auto_fan_speed_owner_suite:
  module: auto_fan_speed
  class: AutoFanSpeed
  temp_sensor: sensor.owner_suite_tph_temperature
  fan: fan.owner_suite
  sun: sun.sun
  speeds:
    low: 63
    medium: 67
    high: 73
    sun_offset: 0
  time:
    start: "21:00:00"
    end: "12:30:00"
    turn_off_at_end_time: True
  debug: true

