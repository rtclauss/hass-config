secrets: /homeassistant/secrets.yaml
app_dir: /homeassistant/appdaemon/apps/
#log:
#  logfile: /config/logs/appdaemon.log
#  errorfile: /config/logs/appdaemon_error.log
logs:
  main_log:
    filename: /homeassistant/logs/appdaemon.log
    log_level: DEBUG
  error_log:
    filename: /homeassistant/logs/appdaemon_error.log
  # chatgpt_bed_log:
  #   filename: /homeassistant/logs/chatgpt_bed_occupancy.log
  #   log_level: DEBUG
appdaemon:
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  elevation: !secret home_elevation
  time_zone: America/Chicago
  thread_duration_warning_threshold: 240
  internal_function_timeout: 240
  plugins:
    HASS:
      type: hass
      #timewarp: 100
      token: !env_var SUPERVISOR_TOKEN
http:
  url: http://0.0.0.0:5050
# hadashboard:
api:
admin:
